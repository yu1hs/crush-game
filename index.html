<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>暗恋这件小事</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Noto Sans SC', 'Poppins', system-ui, sans-serif;
    }
    body {
      background: linear-gradient(145deg, #f3e8ed 0%, #f9f0f4 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .game-container {
      max-width: 620px;
      width: 100%;
      background: #fffcfd;
      border-radius: 48px;
      box-shadow: 0 20px 35px rgba(130, 90, 110, 0.15);
      overflow: hidden;
      border: 1px solid #f0c4d5;
      position: relative;
    }
    .top-bar {
      background: #fbc8da;
      padding: 12px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      color: #9e4468;
      font-weight: bold;
      position: relative;
    }
    .clock {
      background: #fff0f5;
      padding: 5px 14px;
      border-radius: 40px;
      font-size: 0.8rem;
    }
    .save-btns {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .save-btns button {
      background: #ffffffd0;
      border: none;
      padding: 5px 12px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 0.7rem;
      color: #b04e70;
      cursor: pointer;
    }
    .phone-icon {
      background: #ffffffd0;
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 4px;
      position: relative;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      transition: 0.15s;
    }
    .phone-icon:active {
      transform: scale(0.92);
    }
    .phone-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: #ff5e8a;
      color: white;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 0.65rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    .content-panel {
      padding: 20px 22px 18px;
    }
    .round-header {
      background: #fff0f5;
      border-radius: 28px;
      padding: 10px 18px;
      border-left: 6px solid #f09db9;
      font-weight: 700;
      color: #a55272;
      font-size: 0.85rem;
      margin-bottom: 18px;
    }
    .story-box {
      background: #fef5f8;
      border-radius: 32px;
      padding: 24px;
      line-height: 1.8;
      color: #3a2f34;
      box-shadow: 0 3px 10px #f7d2e0;
      white-space: pre-wrap;
      margin-bottom: 14px;
      font-size: 0.95rem;
      min-height: 180px;
    }
    .relation-box {
      background: #ffeaf2;
      border-radius: 32px;
      padding: 10px 16px;
      font-weight: 600;
      color: #b86082;
      text-align: center;
      margin-bottom: 18px;
    }
    .choices {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 8px;
    }
    .choice-btn {
      background: #fff2f7;
      border: 1.5px solid #f6b7ce;
      padding: 12px 18px;
      border-radius: 60px;
      font-weight: 700;
      color: #b35477;
      cursor: pointer;
      font-size: 0.85rem;
      transition: 0.1s;
      text-align: center;
      flex: 1 0 auto;
      max-width: 260px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.03);
    }
    .choice-btn:active {
      background: #fcd6e4;
      transform: scale(0.97);
    }
    .choice-btn:disabled {
      opacity: 0.6;
      pointer-events: none;
    }
    .chat-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      backdrop-filter: blur(2px);
    }
    .chat-popup {
      background: #fff7fa;
      border-radius: 36px;
      padding: 22px 24px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 15px 30px rgba(180, 90, 120, 0.25);
      border: 1px solid #f5a5c0;
      font-size: 1rem;
      line-height: 1.6;
      animation: fadeIn 0.25s ease;
    }
    .chat-screen-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      backdrop-filter: blur(3px);
    }
    .chat-phone {
      background: #fffbfd;
      border-radius: 40px;
      max-width: 420px;
      width: 95%;
      height: 620px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 50px rgba(100, 60, 80, 0.3);
      overflow: hidden;
      border: 2px solid #f0c4d5;
    }
    .chat-phone-header {
      background: #fbc8da;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #9e4468;
      font-weight: bold;
    }
    .chat-phone-header .back-btn {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: #9e4468;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fff5f8;
    }
    .chat-bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      line-height: 1.5;
      word-break: break-word;
      animation: fadeIn 0.2s ease;
    }
    .chat-bubble.left {
      background: #fff0f5;
      align-self: flex-start;
      border-bottom-left-radius: 6px;
      color: #4a2f38;
    }
    .chat-bubble.right {
      background: #fbc8da;
      align-self: flex-end;
      border-bottom-right-radius: 6px;
      color: #3a2028;
    }
    .chat-options {
      padding: 12px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      border-top: 1px solid #f5d0e0;
      background: #fffafc;
    }
    .chat-option-btn {
      background: #fff2f7;
      border: 1px solid #f6b7ce;
      padding: 8px 14px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.8rem;
      color: #b35477;
      cursor: pointer;
      flex: 1 0 auto;
      text-align: center;
    }
    .chat-option-btn:active {
      background: #fcd6e4;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .ending-screen {
      text-align: center;
      padding: 28px 20px;
      background: #fff4f8;
      border-radius: 42px;
    }
    .reset-btn {
      background: #f7a2be;
      border: none;
      margin-top: 20px;
      padding: 10px 28px;
      border-radius: 60px;
      font-weight: bold;
      color: white;
      cursor: pointer;
    }
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fceff4fb;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }
    .create-card {
      background: #fffafd;
      max-width: 480px;
      width: 100%;
      border-radius: 56px;
      padding: 28px;
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.08);
    }
    .create-card h2 {
      color: #b75a7c;
      text-align: center;
    }
    .input-row {
      margin-bottom: 14px;
    }
    .input-row label {
      font-weight: 700;
      color: #a04568;
      font-size: 0.8rem;
      display: block;
      margin-bottom: 4px;
    }
    .input-row input,
    .input-row select {
      width: 100%;
      padding: 10px 14px;
      border-radius: 40px;
      border: 1px solid #f2b7cc;
      background: #fff5f9;
      font-size: 0.9rem;
    }
    .start-main-btn {
      background: #fdafc7;
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      font-weight: bold;
      color: white;
      margin-top: 20px;
      cursor: pointer;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="game-container" id="gameRoot">
    <div class="top-bar">
      <div class="clock" id="liveClock">🌸 --:--:--</div>
      <div class="save-btns">
        <button id="saveGameBtn">💾</button>
        <button id="loadGameBtn">📂</button>
        <button class="phone-icon" id="chatPhoneBtn" title="消息">💬<span class="phone-badge" id="chatBadge" style="display:none;">!</span></button>
      </div>
    </div>
    <div class="content-panel" id="dynamicContent"></div>
  </div>
  <script>
    (function() {
      let player = { name: "", age: "", classInfo: "", identity: "", appearance: "", personality: "", hobby: "" };
      let affection = 20;
      let stage = "陌生";
      let turn = 1;
      const MAX_TURNS = 13;
      let gameFinished = false;
      let usedEventIds = [];
      let usedChatIds = [];
      let currentEventObj = null;
      let currentOptions = [];
      let isChoosing = false;
      let chatUsedThisTurn = false;
      let hasNewMessage = false;
      let chatMessages = [];
      let currentChatStep = 0;
      let chatSequence = null;
      let pendingAutoMessage = null;

      function updateStage() {
        if (affection >= 82) stage = "暧昧期";
        else if (affection >= 68) stage = "心动";
        else if (affection >= 55) stage = "好朋友";
        else if (affection >= 42) stage = "熟悉";
        else if (affection >= 28) stage = "认识";
        else if (affection >= 15) stage = "知道对方";
        else stage = "陌生";
      }

      const EVENT_POOL = [];
      EVENT_POOL.push(
        { id:1, title:"清晨的琴房", desc:"早上七点十分，整栋教学楼还笼罩在淡淡的晨曦里。你因为要补交作业提前到校，经过三楼音乐教室时，忽然听到一阵清澈的钢琴声。门虚掩着，你透过缝隙看到李羲承坐在那架老旧的黑色钢琴前，修长的手指在琴键上流淌出《River Flows in You》的旋律。晨光从窗户斜斜地打在他的侧脸上，他微微闭着眼睛，仿佛完全沉浸在自己的世界里。空气中飘着淡淡的灰尘和音符，你不由自主地停下了脚步，连呼吸都放轻了。", opts:[
          {txt:"悄悄站在门口听完，不忍心打扰", eff:3, fb:"他弹完最后一个音，缓缓睁开眼睛，转头时恰好对上了你的视线。他微微一愣，然后露出一个有些腼腆的笑容，手指从琴键上轻轻抬起。“早啊，”他说，“这么早就来了？”"},
          {txt:"推门走进去，鼓掌说“真好听，是你自己编的吗”", eff:5, fb:"他被突然的掌声吓了一跳，耳朵尖微微泛红。他不好意思地挠了挠后脑勺，小声说：“只是随便弹弹……不过后半段是我自己加的。”你看到他眼睛里有光，那是一种被认可后的喜悦。"},
          {txt:"怕被发现，屏住呼吸悄悄转身离开", eff:0, fb:"你小心翼翼地后退，生怕发出一点声响。走下楼梯时，琴声似乎停顿了几秒，但很快又继续响起。你后来经常后悔，如果当时走进去，会不会一切都不一样。"},
          {txt:"拿出手机想录下来，但忘了关闪光灯", eff:-2, fb:"咔嚓一声，闪光灯在昏暗的走廊里格外刺眼。琴声戛然而止，他转过头，眉头微微皱起，语气有些冷淡：“请删掉，我不喜欢被偷拍。”你窘得满脸通红，连道歉都说不利索。"}
        ]},
        { id:2, title:"食堂的泡菜锅", desc:"中午十二点，食堂里人声鼎沸。你端着餐盘在人群中穿梭，几乎所有的座位都坐满了人。正当你不知所措时，看到角落靠窗的位置上，李羲承独自一人坐在那里，面前放着一份泡菜锅和一碗米饭。他抬头时正好与你四目相对，便自然地朝你招了招手：“这儿有空位，过来坐吧。”", opts:[
          {txt:"开心地坐过去，自然地聊起今天的菜色", eff:4, fb:"你坐下后，他把自己碗里仅有的几片牛肉轻轻夹到了你的盘子里。“你太瘦了，多吃点。”他说话时没有看你，只是低头扒饭，但耳朵又红了。"},
          {txt:"害羞地点点头，坐得离他远远的", eff:1, fb:"你坐在了他斜对角最远的位置。他看了你一眼，欲言又止，最终只是安静地吃着自己面前的泡菜锅。"},
          {txt:"道谢后，端着餐盘去了朋友那一桌", eff:0, fb:"你朝他笑了笑说“谢谢”，然后转身走向了朋友的桌子。坐下后你忍不住回头看了一眼，他正低着头，用筷子轻轻戳着碗里的豆腐。"},
          {txt:"摇头说“我在找人，不好意思”", eff:-1, fb:"他举在半空中的手顿了顿，然后慢慢放下。“哦，好。”他的声音很轻，重新低下头继续吃饭。你后来发现他那天其实是一个人吃完的。"}
        ]},
        { id:3, title:"暴雨中的共享伞", desc:"下午最后一节课快结束时，窗外突然下起了瓢泼大雨。你没带伞，站在教学楼一楼的走廊上。雨水溅湿了你的帆布鞋，风一吹，有点冷。李羲承撑着一把深蓝色的长柄伞走了出来，把伞往你这边递了递：“一起走吧，我正好去校门口坐公交。”", opts:[
          {txt:"接过伞柄，尽量把伞往他那边倾斜", eff:5, fb:"你努力把伞举高，但身高差让你有些吃力。他发现后轻轻握住了伞柄的上方，结果他自己的半边肩膀完全暴露在雨中。你着急地说“你都淋湿了”，他却只是笑：“没事，我喜欢雨。”"},
          {txt:"低着头，一路沉默地走到校门口", eff:1, fb:"雨声很大，打在伞面上噼里啪啦。到校门口时，他把伞收了收，轻声说：“路上小心，别感冒了。”然后转身走进了雨里。"},
          {txt:"提议先去旁边的便利店等雨小一点", eff:4, fb:"你们小跑进便利店，他买了两罐热咖啡，把其中一罐贴了贴你的脸颊：“暖和一下。”你们就站在玻璃窗前，看着外面的雨，聊着刚考完的月考。"},
          {txt:"后退一步说“不用了，我等我妈来接”", eff:-1, fb:"他拿着伞的手停在半空，然后慢慢收了回去。“嗯，那别站在风口。”他独自撑开伞，走进了大雨里。你后来等了很久，妈妈并没有来。"}
        ]},
        { id:4, title:"自习课的耳机", desc:"周三的自习课，教室里安静得只剩下翻书和写字的沙沙声。你忽然感觉后背被轻轻戳了一下。回头，看到李羲承手里捏着一只白色的耳机，正朝你眨眼睛。他凑近一点，压低声音说：“我刚写好的一段旋律，帮我听听？”他的眼神里有种小心翼翼的期待。", opts:[
          {txt:"接过耳机，和他一人一只，认真听完", eff:6, fb:"是一段很温柔的钢琴旋律。听完后你在草稿纸上写：“这段副歌特别好听，像春天的风。”他看完后，把那张草稿纸小心地折起来，放进了自己的笔袋里。"},
          {txt:"紧张地摇头说“老师会发现的”", eff:0, fb:"你小声拒绝了，他点点头，收回了耳机。但你余光看到他一个人把耳机塞进耳朵，趴在桌上，用笔在本子上写写画画。那节课你再也没法集中注意力。"},
          {txt:"听完后，在本子上认真写了一段反馈递给他", eff:4, fb:"你写了整整半页纸。他看得很认真，嘴角慢慢扬起。然后他在你的本子上回了一句话：“这是我第一次给别人听demo，谢谢你的建议。”"},
          {txt:"不小心扯掉了耳机线，音乐外放了出来", eff:-2, fb:"一段钢琴曲突然在安静的教室里响起，前排的同学纷纷回头。他手忙脚乱地关掉手机，脸涨得通红。老师看了你们一眼，没说什么，但他那节课再也没抬过头。"}
        ]},
        { id:5, title:"体育课的篮球", desc:"周四下午的体育课，老师宣布自由活动。你正和闺蜜说着话，突然一颗篮球蹦跳着滚到了你的脚边。你抬头，看到李羲承正朝你这边跑来，额头上还带着亮晶晶的汗珠。他今天穿了件白色的运动T恤，跑起来的时候头发被风吹起来，露出好看的额头。", opts:[
          {txt:"捡起球，用力扔给他，并喊道“投得不错嘛”", eff:4, fb:"他单手稳稳接住球，朝你笑了笑。“要不要过来一起打？”他指了指球场。旁边的男生开始起哄。"},
          {txt:"把球踢到一边，继续和闺蜜聊天", eff:-1, fb:"球滚到了更远的地方。他跑过来捡球时，脚步明显慢了一下，看了你一眼，然后抱着球默默跑回了球场。"},
          {txt:"抱着球跑过去，说“加我一个”", eff:5, fb:"他明显有些意外，但很快笑了起来，把球传给你。你们临时组了队，他防守时故意放水让你投进了好几个。每次你进球，他都比你还开心。"},
          {txt:"站在原地没动，等他过来自己拿", eff:1, fb:"他小跑到你面前，微微喘着气，弯腰捡起球。“谢了。”他简短地说了一句，然后跑回去。你注意到他转身时，似乎想说什么。"}
        ]},
        { id:6, title:"月考后的安慰", desc:"月考成绩单贴在走廊的公告栏上，你数学考砸了，比上次退步了二十多名。你趴在课桌上，把脸埋进手臂里。有人轻轻敲了敲你的桌子。你抬起头，看到李羲承站在你旁边，手里拿着自己的成绩单。“我上次数学也考得很差，后来发现是方法不对。要不要我帮你看看错题？”他的声音很平静。", opts:[
          {txt:"抬起头，挤出一个笑容说“好，谢谢你”", eff:4, fb:"他拉过旁边空着的椅子，在你身边坐下。他一道一道地帮你分析错题，用笔在草稿纸上画图讲解。那天放学后，他又给你发了一份自己整理的公式总结。"},
          {txt:"继续趴着，摇了摇头不理他", eff:-2, fb:"他站了一会儿，没有再说话。等你终于抬起头时，发现桌角多了一颗草莓糖，下面压着一张便签纸，上面写着：“下次会好的。——羲承”。"},
          {txt:"红着眼睛抱怨“数学真的太变态了”", eff:2, fb:"他听完后竟然笑了一下，说：“我也这么觉得。但你知道吗，我现在每天多花半小时做数学，上次就及格了。”他拿出自己的笔记本给你看，上面密密麻麻全是错题整理。"},
          {txt:"逞强地坐直身体说“我没事，就是昨晚没睡好”", eff:1, fb:"他没有戳穿你的逞强，只是点了点头。他走开后，你的手机亮了一下，是他发来的消息：“熬夜不好，下次考前一起复习吧。”"}
        ]},
        { id:7, title:"深夜的短信", desc:"晚上十点四十七分，你刚洗完澡准备睡觉，手机屏幕突然亮了起来。是李羲承发来的消息：“睡了吗？新写了一段副歌，卡住了，想问问你的感觉。”下面紧跟着一个音频文件。你点开，是一段有些忧郁的钢琴旋律。", opts:[
          {txt:"秒回“快发来，我正好醒着”", eff:5, fb:"他很快发来了音频。你戴上耳机认真听了几遍，然后发了一段长长的语音分析。他听完后回了一句话：“你是我见过最懂我音乐的人。”然后他又补了一句：“晚安，明天见。”"},
          {txt:"回复“太晚了，明天再帮你听”", eff:0, fb:"消息发出去后，他回复了一个“嗯”字，然后头像就灰了。第二天你看到他，他似乎想问你什么，但最终只是打了个招呼。"},
          {txt:"开玩笑说“可以啊，咨询费一次一杯奶茶”", eff:3, fb:"他回了一长串省略号，然后发来一个捂脸的表情。“成交。明天午休，老地方，我请你喝香芋味的。”后来你真的在抽屉里发现了一杯温热的香芋奶茶。"},
          {txt:"太困了，看了一眼消息就睡着了", eff:-1, fb:"第二天早上你才看到消息，赶紧回复道歉。他回了一个“没关系”的表情包，但整个上午都没怎么说话。"}
        ]},
        { id:8, title:"音乐课的点名", desc:"音乐课，崔老师忽然看向你：“上次你写的音乐鉴赏不错，今天上来唱一首？”你还没来得及拒绝，李羲承忽然举手：“老师，我可以帮她伴奏。”全班瞬间安静，然后爆发出一阵起哄声。他拿着吉他，已经走到了钢琴旁边，耳朵有点红。", opts:[
          {txt:"大方地走上台，选了一首慢板抒情曲", eff:4, fb:"你开口的时候声音有些抖，但李羲承的吉他声稳稳地托住了你。唱到最后一段，你们的声音和琴声完全融合在一起。崔老师带头鼓掌：“你们两个的声音很搭啊。”"},
          {txt:"紧张得声音发抖，几乎唱不下去", eff:1, fb:"你唱到一半差点忘词。李羲承放慢了节奏，用吉他轻轻带着你。他在间奏时小声说：“没关系，跟着我。”你勉强唱完，下去后他把水递给你：“下次多练练就好了。”"},
          {txt:"灵机一动说“老师，我能请李羲承和我合唱吗”", eff:6, fb:"全班再次沸腾。他愣了一下，然后笑着点了点头。你们合唱了一首《Some》，副歌部分他甚至帮你和了高音。唱完后他小声对你说：“我第一次在课堂上唱歌，你是第一个敢拉我上台的人。”"},
          {txt:"摇头坚决不上台", eff:0, fb:"气氛有点尴尬。崔老师打圆场让你下节课再补。李羲承收起吉他，回到座位上时看了你一眼，眼神里有点遗憾。下课后他经过你身边，轻轻说：“其实你声音很好听，不唱可惜了。”"}
        ]},
        { id:9, title:"公交车上的座位", desc:"首尔的早高峰，公交车里挤得像沙丁鱼罐头。你抓着吊环，随着车子摇摇晃晃。忽然感觉有人拍了拍你的肩膀。李羲承从他好不容易占到的座位上站起来，手里还拿着单词本。“你坐吧，”他说，“我快到了。”但他胸前的校牌显示他才刚上车不久。", opts:[
          {txt:"感激地坐下，仰头问他“那你怎么办”", eff:3, fb:"他笑了笑，把单词本塞进口袋，抓住你旁边的扶手。“站着也能背单词，”他说，“而且我平衡感很好。”果然，车子转弯时他纹丝不动。他站了三站路才下车。"},
          {txt:"坚持不坐，按着他肩膀让他坐回去", eff:2, fb:"你力气不大，但他顺从地坐了回去。他有点无奈地看着你，然后从包里拿出一个便携小风扇递给你：“那这个给你，车里太闷了。”"},
          {txt:"开玩笑说“我其实不重，可以坐你腿上吗”", eff:5, fb:"话一出口你就后悔了，脸红到了脖子根。他愣住了，然后从耳朵到脖子都染上了粉色。他结结巴巴地说：“那、那还是你坐吧。”然后提前一站下了车。"},
          {txt:"直接坐下，戴上耳机没有道谢", eff:-1, fb:"你坐下后就开始看手机，没有注意到他站在你旁边一直拉着扶手。他几次想开口说什么，但看到你戴着耳机就放弃了。下车时他什么都没说。"}
        ]},
        { id:10, title:"校园祭的舞台", desc:"校园祭是全校最热闹的日子。李羲承和他的乐队“晚风”是压轴表演嘉宾。夜幕降临时，操场上的舞台灯光亮起，他穿着一件简单的白衬衫和黑色长裤，抱着一把浅色的电吉他站在立式话筒前。台下挤满了人，很多女生举着写有他名字的灯牌。", opts:[
          {txt:"挤到最前排，用力挥舞荧光棒", eff:4, fb:"演出时他一直在寻找什么，直到目光落在你身上。他对着你笑了一下，然后闭上眼睛沉浸在最后的solo里。演出结束后他把拨片塞进你手里：“给你。”"},
          {txt:"站在最后一排，安静地看完表演", eff:1, fb:"你离舞台很远，看不清他的表情。演出结束后，你给他发了一条消息：“表演很棒。”他秒回：“你在现场？我没看到你。”你没有回复，只是把那张远距离的照片存进了手机。"},
          {txt:"演出结束后去后台找他，送上一小束花", eff:6, fb:"后台很乱，他正用毛巾擦汗，看到你拿着花进来，整个人愣住了。他快步走过来，接过花束，低头闻了闻。“这是我今天收到的最好的礼物。”"},
          {txt:"觉得人太多太吵，提前离场了", eff:-2, fb:"他在唱最后一首歌之前，其实在台下搜寻了很久。后来他问朋友“她是不是没来”，朋友说好像看到你走了。他沉默了一会儿，那天晚上没有参加庆功宴。"}
        ]},
        { id:11, title:"图书馆的偶遇", desc:"期中考试前，图书馆里一座难求。你抱着一摞参考书在书架间寻找空位，终于在靠窗的角落发现一个空桌子，但旁边坐着一个熟悉的身影。李羲承戴着黑色的头戴式耳机，面前摊着一本厚厚的英文原版书。阳光透过百叶窗在他脸上投下细碎的光影。", opts:[
          {txt:"轻轻敲桌面问“这里有人吗”", eff:3, fb:"他摘下耳机，抬头看到是你，眼神亮了一下。“没人，”他一边说一边把自己摊开的书往旁边挪了挪，“坐吧。”然后他站起身，帮你从最高的书架上拿下了你够不着的那本参考书。"},
          {txt:"不想打扰他，绕到另一边的空位坐下", eff:0, fb:"你坐在了离他三张桌子远的地方。过了一会儿，他无意中抬头时发现了你。他微微一愣，然后低头继续看书。但后来你发现，他中间出去过一次，回来时在你的桌角放了一瓶香蕉牛奶。"},
          {txt:"把写有“你戴耳机看书的样子很帅”的纸条放在他手边", eff:5, fb:"你迅速放下纸条然后假装看书。余光瞥见他拿起纸条，展开，然后整个人僵住了。他在那张纸条的背面写了什么，推了过来：“你偷看我的样子也很可爱。”"},
          {txt:"抱着的书太多，不小心全砸在他脚边", eff:-1, fb:"巨大的声响打破了图书馆的安静。你窘得满脸通红，蹲下去捡书。他也蹲下来帮忙，手指不经意间碰到了你的手背。“没关系，”他小声说，“我以前也常掉东西。”"}
        ]},
        { id:12, title:"他的生日", desc:"十月十五日，李羲承的生日。你提前一周就开始准备礼物，最后决定送他一盒自己烤的曲奇，虽然卖相一般，但你在每一块上都用糖霜画了一个小小的音符。早上到了学校，你抱着那个精心包装的纸盒，在走廊里来来回回走了好几趟，就是没有勇气走进教室。", opts:[
          {txt:"趁他不在时，把盒子放进他抽屉", eff:4, fb:"午休他回来时，发现了那个盒子。他小心翼翼地拆开包装，看到里面的音符曲奇，愣了很久。然后他四处张望，最后在走廊上找到了你。“这是你做的？”他举起一块曲奇，“我不舍得吃了。”"},
          {txt:"深吸一口气，走到他面前递给他", eff:6, fb:"他正在拆别的礼物，看到你过来，放下了手里的东西。“生日快乐。”他接过盒子，当着你的面打开，眼睛瞬间亮了。“这是你自己做的？天哪。”他立刻拿起一块放进嘴里，含含糊糊地说，“好吃。”"},
          {txt:"托朋友转交，不敢自己去", eff:1, fb:"朋友回来告诉你：“他收到后问我‘这是谁给的’，我说是你，他笑了一下，然后又问‘她为什么自己不来’。”你听完后后悔不已。"},
          {txt:"因为饼干烤糊了一部分，最后没送出去", eff:-1, fb:"你把那盒烤焦的曲奇塞进了书包最深处。但那天下午，他经过你座位时突然问：“今天是我生日，你不打算表示一下吗？”你支支吾吾说不出话，他有点失望地走开了。"}
        ]},
        { id:13, title:"补习班的同路", desc:"你在学校附近的英语补习班上课，晚上九点才下课。首尔初秋的夜晚已经有些凉意。你走出补习班大楼，在路灯下看到一个熟悉的身影靠在墙边。李羲承穿着连帽卫衣，耳朵里塞着耳机。他看到你出来，摘下耳机：“我数学补习班也在附近，刚下课。”但他手指尖有点凉，似乎等了有一会儿了。", opts:[
          {txt:"开心地走过去说“那以后可以一起走了”", eff:4, fb:"他点点头，把耳机分了你一只。“今天老师拖堂，我多等了十分钟。”他漫不经心地说，但暴露了他其实是特意在等你。路上他哼了一段新旋律，说是刚才等的时候想到的。"},
          {txt:"点点头，然后沉默地并肩走", eff:0, fb:"你们安静地走过两条街，偶尔肩膀会碰到一起。他先开口打破了沉默：“你英语学得怎么样？”然后你们聊了一些无关紧要的学习话题，直到在地铁站分开。"},
          {txt:"问他“你经常来这边吗？以前没碰见过”", eff:3, fb:"他摸了摸后颈，有点不自然地说：“嗯……其实我上周看到你来上课，这周就特意算好了时间。”说完他立刻加快了脚步，走到你前面，不让你看他脸上的表情。"},
          {txt:"说“哦”，然后戴上耳机自己走", eff:-2, fb:"你沉浸在自己的音乐里，没注意他放慢了脚步。第二天他发消息说：“昨晚路上不太安全，本来想送你回家的。”"}
        ]},
        { id:14, title:"窗边的座位", desc:"新学期换座位，你被分到了靠窗的位置。坐下后你发现，斜前方坐着的是李羲承。他坐在你左前方两个位置，靠窗，阳光正好打在他的桌面上。他上课时偶尔会托着腮看向窗外，春天外面有一棵樱花树，花瓣偶尔会飘进来，落在他的肩上。", opts:[
          {txt:"用铅笔在课本空白处画下他的侧影", eff:4, fb:"你画得很认真，连他耳后的碎发都画了下来。下课时他路过你座位，无意中瞥见了那幅画。“这是我？”他弯下腰仔细看，“画得真好……能送给我吗？”"},
          {txt:"趁他不注意，偷偷用手机拍了一张", eff:1, fb:"你忘了关闪光灯。白光一闪，他转过头，看到你举着手机，先是一愣，然后嘴角微微扬起。“要拍就光明正大地拍嘛，需要我摆个姿势吗？”"},
          {txt:"写了一张纸条问“你上课在想什么”传给他", eff:5, fb:"纸条传到他手里时，他展开看了一眼，然后提笔写了好一会儿。纸条传回来时，上面多了一段五线谱，旁边写着：“在想这段副歌。你觉得怎么样？”"},
          {txt:"专心听课，不看他", eff:0, fb:"你努力把注意力集中在黑板上，但余光总是不自觉地往左前方飘。你不知道的是，他偶尔也会趁老师写板书时，微微侧头，用余光看你。"}
        ]},
        { id:15, title:"运动会接力", desc:"五月运动会，班级接力赛是压轴项目，李羲承被安排在最后一棒。他站在起跑线上，穿着印有班级号码的运动背心。你站在跑道内侧的加油区，手里紧紧攥着一瓶水。他接过棒，像离弦的箭一样冲了出去。经过你身边时，他似乎看了你一眼。", opts:[
          {txt:"用尽全身力气大喊“李羲承加油！！”", eff:5, fb:"你的声音在嘈杂的运动场上格外清晰。他在最后五十米突然加速，第一个冲过了终点线。他喘着气，在人群中找到你，笑着朝你竖了个大拇指。"},
          {txt:"双手紧握在胸前，在心里默默祈祷", eff:2, fb:"他追平了第二名，班级拿了亚军。赛后他坐在地上，你走过去把水递给他。他抬头看你，接过水喝了一口：“刚才我好像听到有人在喊我，是你吗？”"},
          {txt:"在他经过时，伸手把水递给他", eff:4, fb:"他接过水，边跑边喝了一口，然后加速冲刺。赛后他找到你，把空水瓶还给你，笑着说：“谢谢你的水，这是幸运水。”"},
          {txt:"太阳太晒，你躲到了树荫下", eff:0, fb:"你错过了他最精彩的冲刺。等他跑完在人群里四处张望时，你才从树荫下走出来。他后来问你：“刚才你在哪儿？我找了好久。”"}
        ]},
        { id:16, title:"天台上的吉他", desc:"午休时间，你想找个安静的地方背英语单词，推开了教学楼天台的门。风有点大，然后你听到了吉他声。李羲承坐在角落的旧长椅上，背靠着墙壁，抱着一把原木色的民谣吉他，正轻声哼唱着什么。看到你推门进来，他停了下来，摘下一边耳机：“这里是我先发现的秘密基地。”", opts:[
          {txt:"坐到他旁边的空位上，问他“在唱什么歌”", eff:5, fb:"他把吉他微微倾斜过来，让你能看到琴弦。“一首还没写完的歌。”他轻声哼了副歌部分，词是：“天台的风知道，我有一句话没说出口。”唱完他有些不好意思地看了你一眼。"},
          {txt:"站在门口，远远地听了一会儿", eff:2, fb:"他弹完后，发现你还站在原地，便朝你招了招手。“进来啊，外面风大。”你走过去，他拍了拍旁边的位置，把校服外套叠起来垫在长椅上。"},
          {txt:"说“风太大，我下去了”", eff:0, fb:"他拨弦的手顿了一下。“嗯，别感冒了。”你关上门的时候，听到吉他声又响了起来，但旋律比刚才更慢了，带着一点忧伤。"},
          {txt:"走过去，鼓起勇气和他一起哼唱", eff:6, fb:"你的声音和他的旋律融合在一起，被风吹散在天台上空。一曲结束，他放下吉他，认真地看着你：“你的声音真的很好听。我们下次可以一起录一首歌吗？”"}
        ]},
        { id:17, title:"美术课的素描", desc:"美术课，老师让大家分组画人像速写。你被分到和李羲承一组，他坐在你对面，拿着速写本，正认真地打量你。“别动啊，”他说，铅笔在纸上发出沙沙的声音。他也开始画你，他专注时眉毛会微微蹙起，偶尔抬起头看你一眼，又迅速低头。", opts:[
          {txt:"认认真真画他，每一根头发丝都不放过", eff:4, fb:"二十分钟后，你画出了一幅相当逼真的肖像。他接过去看了很久，然后说：“原来我在你眼里是这样的。”他在你画的右下角签了自己的名字，然后把自己的画递给你。他画的你特别细致。"},
          {txt:"故意把他画成带着花环的童话人物", eff:3, fb:"他拿过你的画，先是一愣，然后噗嗤笑了出来。“这是什么啊，我头上这圈花是认真的吗？”他笑得上气不接下气。然后他在你的画旁边写了一行字：“花环留着，下次音乐节戴。”"},
          {txt:"随便画了几笔，敷衍了事", eff:0, fb:"他看到你的画时，脸上的笑容有点勉强。他把自己的画递给你——那是一幅很用心的素描。对比之下你有点不好意思，他摆摆手说没事，但把那张画收进包里时动作很慢。"},
          {txt:"提议说“不如让我画你弹吉他的样子”", eff:5, fb:"他眼睛一亮，真的从教室角落拿了一把练习用的吉他，摆了个姿势。他坐在窗边，阳光落在他肩膀上，你画了他抱着吉他的侧影。他说这是他收过的最酷的画。"}
        ]},
        { id:18, title:"寒假前的约定", desc:"期末考结束，寒假在即。学校走廊里大家都在交换新年祝福。你正收拾柜子，李羲承走过来靠在旁边的墙上，手里玩着耳机线。“寒假你有什么计划？”他问，装作不经意的样子，但手指绕耳机线的速度暴露了他的紧张。外面开始飘起了小雪花。", opts:[
          {txt:"反问他“你呢，有什么安排”", eff:3, fb:"他说会在家写歌，偶尔去弘大的练习室。“如果你无聊，可以来找我，”他从口袋里掏出手机，“我请你喝那家新开的奶茶店。”他记下了你的号码。"},
          {txt:"说“可能就宅在家追剧吧”", eff:1, fb:"他若有所思地点点头，然后从包里拿出一个本子：“那我可以给你发我写的demo吗？你帮我听听。”那个寒假，你的手机里渐渐存满了他发来的音频片段。"},
          {txt:"半开玩笑说“怎么，你想约我吗”", eff:5, fb:"他被你的直球打得措手不及，耳朵瞬间通红。“嗯……是有这个打算。”他低声承认，然后立刻转移话题，“外面下雪了！”他狼狈地转身去看窗外。"},
          {txt:"说“寒假很短，一眨眼就过去了”", eff:-1, fb:"他张了张嘴，把本来要说的话咽了回去。“也是。”他直起身，把耳机塞进耳朵，朝你摆摆手就走了。你后来从他的寒假demo里听到一句歌词：“冬天太短，来不及说出口的话就留在雪里。”"}
        ]},
        { id:19, title:"学生会竞选", desc:"李羲承竞选学生会文艺部长。他的竞选海报贴满了走廊，是他自己设计的。竞选演讲安排在周五下午的礼堂，他站在台上时，下面一阵骚动。他开口却意外地沉稳，还现场清唱了一小段校歌改编版，赢得了满堂掌声。你坐在台下第二排，看到他紧握话筒的手微微发抖。", opts:[
          {txt:"拼命鼓掌，还站起来带头叫好", eff:4, fb:"他下台后径直朝你走来，有些不好意思地问：“我刚才是不是表现得很紧张？”你告诉他完全看不出来。他松了一口气，然后被其他同学拉去庆祝了。"},
          {txt:"在台下默默朝他竖了个大拇指", eff:2, fb:"他看到你的手势，演讲中一度卡壳了一秒。下台后他发消息问：“你刚才是不是朝我竖拇指了？我看到的时候差点忘词，但还是挺开心的。”"},
          {txt:"会后给他写了张小纸条，提了一个小建议", eff:3, fb:"纸条上写着：“演讲很棒，但如果你中间加一点和台下互动会更好。”他收到后认真看了，后来他真的在最终选举中用了你的建议，高票当选。"},
          {txt:"觉得他肯定能选上，没怎么在意", eff:0, fb:"他成功当选后，在人群里扫了一圈，似乎想找谁。你的朋友推了推你：“他好像在找你。”但你正低头看手机，等他走过来时，你已经和朋友离开了。"}
        ]},
        { id:20, title:"秘密基地的分享", desc:"放学后，李羲承神秘兮兮地说要带你去一个地方。他领着你穿过操场后面的小树林，来到一个废弃的园艺亭。亭子有些旧，但被他打扫得很干净，角落里放着一把旧木吉他和一个厚厚的笔记本。“这是我的秘密基地，你是第一个知道这个地方的人。”远处的夕阳正缓缓下沉。", opts:[
          {txt:"惊喜地说“这是我们的秘密了，我不会告诉任何人”", eff:5, fb:"他在亭子的木柱上用小刀刻了两个小小的字母，又立刻用手掌抹掉了。“其实我从来没带别人来过。”然后他拿起那把旧吉他，在夕阳下为你弹了一首自己写的曲子。"},
          {txt:"帮他整理了一下亭子里的杂物", eff:4, fb:"你蹲下来把散落的纸张捡起来理好，都是他写的曲谱草稿。你整理完后，他安静了几秒，说：“以后你想来可以随时来。就算我不在，这里也算是你的秘密基地了。”"},
          {txt:"被蚊子咬了好几个包，有点受不了", eff:1, fb:"你不停地挠腿，他看到后立刻从包里翻出驱蚊水递给你。“这里就是蚊子多，”他不好意思地说，“我下次带蚊香来。”虽然被咬得不轻，但看到他愧疚的表情，你心里是愿意再来的。"},
          {txt:"看了看觉得没什么特别的，说“得回去了”", eff:0, fb:"他的笑容淡了淡，把刚拿到手里的吉他放了回去。“嗯，走吧。”他走在前面为你拨开树枝，一路上没说太多话。后来你再也没被他带去那里。"}
        ]},
        { id:21, title:"丢失的乐谱", desc:"早上，李羲承在教室里翻箱倒柜，表情越来越焦急。他说一份很重要的乐谱不见了——那是他准备参加市里比赛用的原创曲子，手写稿，没有任何备份。他找了整个教室都没找到，额头上开始冒汗。", opts:[
          {txt:"放下手里的事，帮他在全教室搜索", eff:5, fb:"你蹲下身子检查每一排的抽屉缝隙，最后在暖气片背后找到了那张被风吹落的稿纸。他跑过来，接过稿纸时整个人如释重负。“太谢谢你了，这是我三个月的成果。”"},
          {txt:"问清楚乐谱的样子，组织其他同学一起找", eff:4, fb:"你发动了七八个同学一起找。最后在音乐教室的钢琴凳下面找到了。他感激地看着你，在众人面前朝你微微鞠了一躬。后来他把获奖的奖杯拍照发给你，说“这个奖杯有你一份功劳”。"},
          {txt:"说“我不知道，没看见”", eff:0, fb:"他失望地继续翻找，最后在上课铃响后无奈地放弃了。那天他上课时明显心不在焉。后来你才知道，他最后在书包的夹层里找到了乐谱——是他自己忘了放哪里了。"},
          {txt:"觉得他太粗心，忍不住说了句“自己的东西要收好”", eff:-1, fb:"他本来就急，被你一说，脸色更加不好看。“我知道，”他语气有点冲，然后放软了声音说，“对不起，我不是在凶你。”但你们之间的气氛还是冷了几个小时。"}
        ]},
        { id:22, title:"钢琴比赛", desc:"市里的青少年钢琴比赛在周六下午举行。你犹豫了好几天，最终还是一个人坐地铁去了艺术中心的音乐厅。李羲承穿着黑色的西装，坐在那架巨大的三角钢琴前，聚光灯落在他身上。他弹的是一首自己创作的曲子，旋律里有种干净的忧伤，中间有一段忽然明亮起来。", opts:[
          {txt:"比赛结束后到后台找他，亲口告诉他太棒了", eff:5, fb:"后台很多人围着他。他看到你时，拨开人群走了过来。“你怎么来了？”他的声音里带着惊喜。你说他的演奏让你差点哭了，他愣了一下，然后轻轻抱了你一下。“谢谢你来。”"},
          {txt:"在观众席默默鼓掌，没有让他知道你来了", eff:3, fb:"他后来在社交媒体上发了比赛照片，你在下面评论“表演很棒”。他秒回：“你在现场？我没看到你。”你私信他一张从后排拍的模糊照片，他回了一长串感叹号。"},
          {txt:"因为补习班冲突没去成，但看了直播", eff:1, fb:"你只能偷偷用手机看直播，信号卡了好几次。他得了银奖后第一时间发消息给你：“我今天有点紧张。”你说“看直播了，很棒”，他回了一个开心的表情。"},
          {txt:"完全不知道有比赛这回事", eff:-2, fb:"周一上学时，他特意带了奖杯来学校，放在桌角最显眼的位置。你路过时随口问了一句“这是什么”。他顿了一下，慢慢地说：“没什么，周末参加了一个比赛。”然后他把奖杯收进了书包。"}
        ]},
        { id:23, title:"街头表演", desc:"周六下午，你路过弘大商圈，被一阵熟悉的歌声吸引。挤进人群，看到李羲承和他的乐队成员正在街头表演。他穿着简单的黑色卫衣和牛仔裤，抱着一把电吉他站在人群中央。他额头上挂着汗珠，但笑容灿烂，完全沉浸在音乐里。", opts:[
          {txt:"站在人群第一排，跟着节奏晃，直到演出结束", eff:4, fb:"演出结束后他抬头看见了你，咧嘴一笑，快步走过来。“你怎么在这儿？刚才都没看到你。”他的嗓子有点哑，但声音里全是开心。"},
          {txt:"等一首歌结束，弯腰在琴盒里放了一些钱", eff:3, fb:"他认出你的手，抬头看见你时哭笑不得，弯腰把钱捡起来塞回给你：“你干嘛。不要你的钱，要请就请我吃饭。”周围的朋友开始起哄，他的耳朵瞬间红了。"},
          {txt:"远远看完表演，没让他发现", eff:1, fb:"你站在人群的最后面。他后来在聊天群里发了一张现场照片，问“有人路过弘大吗”。你没有说话，但把那张照片存进了手机相册。后来他私聊你：“你是不是来了？”"},
          {txt:"觉得人太多，匆匆走了", eff:-1, fb:"他在表演间隙扫视人群时，似乎看到了一个熟悉的背影。后来他发了一条动态：“今天在弘大，好像看到了一个认识的人。但一转眼就不见了。”你没有告诉他那个人是你。"}
        ]},
        { id:24, title:"高考倒计时", desc:"黑板上的倒计时变成了100天。班级气氛明显紧张起来。课间，李羲承反坐在椅子上，双臂交叠在椅背上，看着你发呆。“你……想考哪所大学？”他的手指无意识地敲着桌面，节奏是他上次弹过的某段旋律。", opts:[
          {txt:"认真说出自己的目标，然后反问他", eff:4, fb:"他说了一个有音乐系的大学，在首尔。“如果你也考首尔的学校，我们还能经常见面。地铁只要半小时。”他说这话时没有看你，只是盯着草稿纸上画的连线。"},
          {txt:"说“还没想好，很迷茫”", eff:1, fb:"他点了点头，在本子上写了几个字，然后撕下来递给你。上面写着几所大学的名字和往年分数线。“我帮你查过，这几所你的成绩差不多能够到。”"},
          {txt:"反问他“你会去首尔吗”", eff:3, fb:"他说：“会。首尔有更好的音乐资源。”然后他像是鼓足了勇气，盯着你的眼睛问：“首尔很大，但如果我们都考过去了，应该不会走散吧？”你用点头回答了他。"},
          {txt:"说“考大学是你自己的事，别管我”", eff:-3, fb:"话一出口你就后悔了。他愣了一下，轻声说：“知道了。”他转回身去，把草稿纸上画的连线用力涂掉了。那节课他再也没回头。"}
        ]},
        { id:25, title:"争吵后的冷战", desc:"因为一个小误会，你和李羲承已经两天没说话了。起因是你和其他男生在讨论小组作业时说了句玩笑话，他路过时听到了后半句，脸色就变了。现在你们之间的气氛像是结了冰。他不再给你发demo，午休也不在你们常碰到的位置坐。", opts:[
          {txt:"写一封诚恳的长信，夹在他的课本里", eff:5, fb:"第二节课后，他看完信，午休时走到你座位旁。“是我太小气了，这两天没和你说话，我写歌都没灵感。”你们和好了，他还主动把新写的旋律放给你听。"},
          {txt:"等他先开口，绝不低头", eff:0, fb:"冷战持续到了第四天。最终是朋友看不下去，把你们一起拉到天台，锁上门说“你俩不说明白别想下去”。他这才开口说了第一句话。"},
          {txt:"故意和其他人大声说笑，想引起他注意", eff:-1, fb:"你的笑声在他听来格外刺耳。他站起身，头也不回地走出了教室。你赢了面子，但看到他离开的背影，心里比冷战还难受。"},
          {txt:"让朋友帮忙传话", eff:2, fb:"朋友成了传话筒，来来回回带了几轮话，意思全变了。最后他忍不住直接走到你面前：“能不能我们当面说？再让第三个人传话，我连你原本的语气都听不到了。”"}
        ]},
        { id:26, title:"白色情人节", desc:"3月14日，白色情人节。早上教室里就弥漫着甜腻的糖果味。李羲承的桌上堆了一小堆礼物，但他似乎不太在意，只是往你的方向看了看。你的书包里揣着昨晚包装到凌晨的巧克力，盒子外面画了几个歪歪扭扭的音符。", opts:[
          {txt:"走到他面前，把巧克力递给他", eff:6, fb:"他放下手里的袋子，郑重地双手接过你的巧克力。“我还以为你不打算给了。”然后他从口袋里拿出一个小盒子，“这是给你的。”里面是一条细银色的手链，上面坠着一个小小的音符吊坠。"},
          {txt:"趁他不注意，把巧克力混在他那堆礼物里", eff:4, fb:"后来他挨个问礼物是谁送的，问到你这儿时你绷不住笑了。他指着你的鼻子说：“我就知道是你，这个包装纸我见过。”他说作为惩罚，放学后要陪他去吃炒年糕。"},
          {txt:"问他“收到这么多礼物，很开心吧”", eff:2, fb:"他看着你，手里拿起那些礼物又放下。“多有什么用。我只想要一个人的礼物。”然后他期待地看着你。你没有接话，他最后勉强笑了笑。"},
          {txt:"什么都没准备", eff:0, fb:"他看到你空手走过来，眼神暗了一下，但很快恢复了平时温和的表情。他分了一些别人给的糖果给你：“给你，反正我也吃不完。”你不知道这是不是他表达失落的方式。"}
        ]},
        { id:27, title:"模拟考后的崩溃", desc:"模拟考成绩贴在公告栏上，你排名退步了三十多名。你一个人坐在操场边的长椅上，眼眶有点发热。李羲承在你旁边的位置坐下，手里拿着两罐咖啡，把其中一罐轻轻贴了贴你的脸颊。他没有问成绩，只是安静地坐在那里。", opts:[
          {txt:"接过咖啡，忍不住哭了出来", eff:4, fb:"他没有打断你，等你抽泣声渐渐小了才把纸巾递过来。“我上次考砸的时候，你帮我分析了错题。这次换我帮你。”他的声音很平，却让你慢慢安定下来。"},
          {txt:"用力擦掉眼泪，逞强说“我没事”", eff:1, fb:"他没有戳穿，只是把咖啡打开推到你手边。他把自己的成绩单也拿了出来——其实他数学也没考好。“你看，我也很惨。但我们还有下次。”"},
          {txt:"把成绩单揉成一团扔在地上", eff:0, fb:"他弯腰把纸团捡起来，展开抚平，认真地叠好放进自己口袋。“下次我们一起复习，我帮你押题。我押题挺准的。”他说这话时语气很认真。"},
          {txt:"朝他发脾气说“你别管我”", eff:-2, fb:"他站起身，退后了一步。“好。”他走开了。那天晚上他给你发了一长串数学重点整理，附加一句：“不管你需不需要，我都发你了。晚安。”"}
        ]},
        { id:28, title:"失眠的夜晚", desc:"凌晨一点，你因为考试压力失眠，在社交媒体上发了一条动态：“这个点还有没睡的人吗？”发出去不到一分钟，私信图标亮了。李羲承发来消息：“你也失眠？”他的头像亮着，显示在线。", opts:[
          {txt:"和他聊音乐，他发来一段刚录的助眠钢琴曲", eff:3, fb:"是一段缓慢的钢琴旋律。他说这是他睡不着的时候弹给自己听的。“这首以后就叫「给失眠的人」。”你戴上耳机循环了几遍，眼皮真的开始发沉。"},
          {txt:"问他“你怎么也没睡，在写歌吗”", eff:4, fb:"他说对，在写一首关于夜晚的歌，正好卡在第二段副歌。“你失眠，我写歌，我们都和夜晚有缘。”他开了句玩笑，然后问你要不要当他新歌的第一个听众。"},
          {txt:"半真半假地开玩笑说“该不会是想我想得睡不着吧”", eff:5, fb:"消息发出去后他沉默了整整两分钟。然后他回复：“……可能吧。”后面跟了一长串撤回的提示，最后只剩一条：“刚才那条当我没发。你早点睡。”但你已经截图了。"},
          {txt:"没回复，假装已经睡了", eff:-1, fb:"他看着你的头像灰下去，也下了线。第二天他问你昨晚是不是发过动态，你说没有。他若有所思地点点头，说：“我昨晚失眠，还以为是感应到你了。”"}
        ]},
        { id:29, title:"毕业前的同学录", desc:"毕业典礼前一天，你的那张粉色的同学录纸传到了李羲承手里。他趴在桌上，拿着笔，写了好久好久——久到别人的都写完了他还在写。最后，他在纸的最下面画了一架小小的钢琴，音符从琴键上飘起来。", opts:[
          {txt:"让他第一个写，然后认真看他的留言", eff:4, fb:"他写了满满一整面。从高一的琴房初见写到高三的晚自习。最后他写道：“以后不管去了哪里，我的歌都会先发给你听。这个承诺不过期。”你在那行字旁边画了一颗心。"},
          {txt:"写完后，问他“写了什么，能念给我听吗”", eff:5, fb:"他死活不肯念，把同学录捂在胸口。你们抢了半天，最后他小声说：“就是一些……以后会想你的话。”然后他松开手，把同学录轻轻推回你面前，耳朵尖红透了。"},
          {txt:"让他签了个名，就收回来了", eff:0, fb:"他看你匆匆收走，拿着笔有些失落地悬在半空。他沉默了一秒，在签名旁边飞快地补了一句“Best wishes for the best listener”，然后笑了笑。"},
          {txt:"说“同学录不重要，不想写了”", eff:-2, fb:"他看着你把自己的同学录纸抽走，把自己写了一半的内容轻轻划掉，折起来放进抽屉。后来那张纸被他夹在了毕业证书里。"}
        ]},
        { id:30, title:"毕业典礼的眼泪", desc:"毕业典礼。李羲承作为毕业生代表上台发言，他的声音微微发颤。最后他说：“还有一个人，我想特别感谢。是你让我知道，我的音乐可以被听见。谢谢你。”他没有说名字，但你的心猛地收紧了。典礼结束后，大家开始拍照、拥抱。", opts:[
          {txt:"穿过人群找到他，送他一束花", eff:5, fb:"你举着那束勿忘我挤到他面前。他接过花，眼眶一下就红了。“我以为你今天不会来。”然后他轻声问能不能抱一下。那个拥抱很短，但你靠在他胸口时听到了他急促的心跳声。"},
          {txt:"远远看着被同学围住的他，悄悄哭了", eff:3, fb:"你没有上前，只是站在角落里。他似乎从人群的缝隙中看到了你，想走过来，但被拉去合影的同学拦住了。后来那张毕业照里，他站在你后面不远。"},
          {txt:"让他把毕业帽借你戴，拍了一张照片", eff:4, fb:"他把帽子摘下来戴在你头上，有点大，歪了。他伸手帮你调整角度。“以后没有我在后面踢你椅子了。”他笑着说，但你看到他喉结滚动了一下。"},
          {txt:"提前离开了，没有道别", eff:0, fb:"你觉得场面太伤感，在典礼结束前就悄悄从侧门离开了。他后来发消息问你在哪儿，你一直没有回复。那张毕业证书的空白处，他本来想让你签名的位置，最终空着。"}
        ]},
        { id:31, title:"去首尔的火车", desc:"毕业后暑假，你一个人买了KTX车票去首尔散心。找到自己的座位后，列车开动几分钟，有人轻轻点了点你的肩膀。李羲承站在过道里，穿着一件白色的T恤，肩上搭着一个帆布包。“旁边有人吗？”但你知道他家在另一个方向，这趟车不该有他。", opts:[
          {txt:"惊喜得差点叫出声，问他怎么在这趟车上", eff:5, fb:"他坐下后不好意思地承认：“在群里看到你说买了今天的车票，我退了自己那张票重新买了这趟。”他把耳机分了你一只：“路上要两个小时，我给你听我新写的曲子。”"},
          {txt:"淡定地问“你也去首尔？”", eff:2, fb:"他点点头。你们聊了一路，从未来的大学聊到新的音乐计划。下车时他自然地帮你拎了行李。走出首尔站时，他说：“这次，不是偶然。”"},
          {txt:"开玩笑说“你该不会是跟踪我吧”", eff:3, fb:"他被你问得呛了一下，狼狈地摆手解释：“不是！就是刚好看到你在朋友圈晒了车票截图！”他说漏嘴后立刻捂住嘴巴，耳朵红了一片。"},
          {txt:"戴上耳机，假装不认识", eff:-1, fb:"他站在过道里等了几秒，看你没有反应，最终默默转身找了自己的座位。他坐在车厢的另一头，隔了五六排。一直到终点站都没有再走过来。"}
        ]},
        { id:32, title:"教室里的涂鸦", desc:"周五下午值日，你负责擦黑板。你用粉笔在角落画了一只打盹的小猫。李羲承从后门走进来，拿起另一支蓝色粉笔，在旁边画了一个弹钢琴的火柴人，前面画了几条歪歪扭扭的五线谱。", opts:[
          {txt:"给火柴人旁边写上他的名字", eff:4, fb:"他看到后，在名字旁边画了个箭头，写下“天才音乐家”，然后自己先忍不住笑出了声。你们在黑板上合作了一大片涂鸦，直到值日组长推门进来骂人。"},
          {txt:"把他的火柴人擦掉", eff:-1, fb:"你的手比大脑快，火柴人消失了。他拿着粉笔的手顿了一下，轻轻把粉笔放回粉笔槽。“擦干净吧，马上要检查了。”后来你再也没见过他在黑板上画画。"},
          {txt:"在火柴人和小猫之间画了一颗小爱心", eff:6, fb:"你弯腰画那颗爱心时，他站在你旁边没有说话。等你画完直起身，发现他在那颗爱心旁边，用蓝色粉笔也画了一颗完全对称的心。那天黑板你舍不得擦。"},
          {txt:"掏出手机拍下来留念", eff:3, fb:"你拍完把照片发给了他。他把这张照片设成了和你的聊天背景。很久以后他换了手机，这张照片一直在云备份里。"}
        ]},
        { id:33, title:"他的第一首单曲", desc:"暑假的某个深夜，你看到李羲承发布了他的第一首完整原创单曲。歌名叫《天台的风》。你戴上耳机点开，编曲中有一段旋律非常熟悉——那是他曾经在自习课上递给你耳机让你听的那段demo。歌词里有一句：“你经过琴房时的脚步，我分得出。”", opts:[
          {txt:"把链接转到班级群里，号召大家支持", eff:4, fb:"他私信你说“太夸张了吧，别转”，但语气里全是藏不住的开心。那首歌的播放量一天内翻了好几倍。他专门发了一条动态感谢“所有帮忙转发的人”，你知道那里面特别包括你。"},
          {txt:"私信问他“这首歌里写的人，是我吗”", eff:5, fb:"他过了很久才回复：“听出来了？”然后立刻撤回了那条，换成一句“欢迎大家自由解读”。但那个撤回的瞬间已经被你看到了。你把这首歌循环了一整天。"},
          {txt:"默默循环播放了很多遍，没有告诉他", eff:3, fb:"年末的时候，他偶然看到你的年度听歌报告——那首歌你听了三百多次。他给你发了一张截图，下面写了两个字：“原来是你。”"},
          {txt:"觉得一般，听了半首就关了", eff:-2, fb:"他后来小心翼翼地发消息问“听了吗”，你说“听了一点，还行”。他回了一个“哦”。后来他发新歌时，没有第一时间告诉你。"}
        ]},
        { id:34, title:"补习后的炒年糕", desc:"英语补习班晚上九点下课。你收拾书包时肚子不争气地叫了一声。李羲承也从旁边的数学补习班出来，正好看到你揉肚子的动作。他指了指街角那家还亮着灯的炒年糕摊：“去吃炒年糕吧，我请客。”", opts:[
          {txt:"开心地点头，和他一起坐在路边小桌前", eff:4, fb:"年糕端上来，他先给你夹了一块最大的芝士年糕，说“小心烫”。你们一边吹着热气一边吃，他讲数学补习班老师说话像说rap，你笑得差点呛到。"},
          {txt:"说“太晚了，我得回家了”", eff:0, fb:"他有点失望，但马上说“那给你打包一份带回去”。他让阿姨多加了鱼饼和芝士，用锡纸仔细包好递给你。“到家记得热一下再吃。”"},
          {txt:"拉上其他同学一起去", eff:1, fb:"你喊了补习班其他三四个人，变成了小型聚餐。他坐在长桌的另一头，时不时朝你这边看一眼。后来结账时，他经过你身边轻声说：“下次我们两个人来。”"},
          {txt:"说“太辣了，我吃不了”", eff:2, fb:"他立刻转头对阿姨说“一份芝士年糕不加辣，单独做”。他端给你的那碗冒着热气，上面铺着厚厚一层芝士。“吃吧，这个不辣。我以前也不能吃辣，后来练出来的。”"}
        ]},
        { id:35, title:"新发色的风波", desc:"新学期开学第一天，你发现李羲承染了头发——是那种不太张扬的深棕色，在阳光下会泛出柔和的光泽。他路过你的座位时特意停了一下，弯下腰问：“怎么样？我自己在家染的，对着镜子弄了好久。”语气里有一点藏不住的小得意。", opts:[
          {txt:"认真打量后说“很适合你，显得很温柔”", eff:4, fb:"他心满意足地直起身，回座位时脚步都轻快了几分。一整天他心情都很好，上课时一直在哼歌。后来你从他朋友那里听说，他染发前只认真考虑了你的评价。"},
          {txt:"问他“怎么突然想染头发”", eff:3, fb:"他拉过旁边的椅子坐下，小声说：“写歌没灵感，想改变一下。”然后他凑近一点：“这样看起来是不是更像搞音乐的了？”你笑着说像，他满意地回座位了。"},
          {txt:"假装没发现，等他主动问", eff:0, fb:"他等了整整一个上午你都没提头发的事。午休时他故意在你面前晃了好几圈。最后终于忍不住趴在你桌边问：“你是真没发现还是装的？我染头发了！昨天搞了两个小时！”"},
          {txt:"说“还是原来黑色的好看”", eff:-1, fb:"他脸上的笑容肉眼可见地消失了。“哦。”他转身回到座位上，把卫衣的帽子拉起来戴上了，一整天都没摘。后来第二天他来上学时头发颜色变深了——他想染回来，被他姐姐拦住了。"}
        ]},
        { id:36, title:"琴房的钥匙", desc:"放学后你留下来值日，在讲台下面发现了一把钥匙，钥匙圈上挂着一个小小的钢琴挂件。你立刻认出来这是李羲承的。你正想给他送去，就听到走廊里传来急促的脚步声，他从教室后门冲进来，蹲下来在地上找东西。", opts:[
          {txt:"举起钥匙晃了晃，笑着说“在找这个吗”", eff:3, fb:"他抬头看到你手里的钥匙，整个人松了口气。“这是我第三次丢这把钥匙了，每次都是你找到。”他顿了顿，说：“看来你注定要帮我保管重要的东西。”"},
          {txt:"把钥匙收好，想看看他着急的样子", eff:1, fb:"你假装不知道，看他在教室里翻箱倒柜。等他急得额头冒汗时你才把钥匙递出来。他接过钥匙，无奈地笑了：“下次别逗我了，我刚才以为要换琴房的锁了。”"},
          {txt:"开玩笑说“这么珍贵的东西，我留着当纪念好了”", eff:5, fb:"他说：“那钥匙是学校琴房的……但我可以给你配一把备用的。”第二天他真的给了你一把新钥匙，用银色的细链子穿着。“这样你可以随时来琴房听我练琴。”"},
          {txt:"偷偷放回他笔袋里，没告诉他", eff:0, fb:"他后来在自己的笔袋里找到了钥匙，有些困惑。你坐在座位上忍住笑。他经过你座位时似乎猜到了什么，轻轻在你桌上放了一颗草莓糖。"}
        ]},
        { id:37, title:"夏夜的花火", desc:"暑假，同学组织去汉江边看烟花大会。你迟到了，到的时候烟花已经放了一半。忽然有人在背后轻轻拉住了你的手腕。李羲承穿着一件白色T恤，手里拿着两根没点燃的烟花棒。“你迟到了整整二十分钟，但最精彩的还没开始。”他把其中一根烟花棒递给你。", opts:[
          {txt:"接过烟花棒，在江边画出他的名字", eff:5, fb:"你用烟花在空中写了他的名字，虽然很快消散了，但他看得很认真。然后他也用烟花画了一颗心。你们在江风里站了很久，直到最后一支烟花熄灭。"},
          {txt:"问他“你怎么不和大家一起看”", eff:3, fb:"他指了指不远处的野餐垫。“烟花一个人看没意思，而且我在等一个迟到的人。”他把带来的外套披在你肩上：“江边冷，下次别迟到。”"},
          {txt:"和他比赛谁先烧完烟花棒", eff:4, fb:"你们像小孩一样比了起来，火星四处飞溅。他赢了，但你硬撑着烧到了最后一秒。他赶紧握住你的手腕检查你的手指。忽然他安静下来，说：“如果时间能停在这会儿就好了。”"},
          {txt:"说“烟花好吵，我头疼”", eff:-1, fb:"他立刻把烟花棒拿远了一点，从包里翻出降噪耳塞递给你。你把耳塞戴上，周围的声音确实小了很多。你后来有点后悔，因为那天晚上他本来想和你聊很多的。"}
        ]},
        { id:38, title:"空白的乐谱本", desc:"新年开学第一天，你在抽屉里翻到了一本崭新的空白乐谱本——那是你很久以前买的，原本打算送给他，但一直拖着没送。你想起李羲承最近总是用横线笔记本写谱，音符画在横线上歪歪扭扭的。", opts:[
          {txt:"亲手递给他，说“正好看到，觉得适合你”", eff:4, fb:"他接过本子，翻开看了看。“你什么时候买的？这个牌子很贵。”你说不贵，他低头摩挲着封面，说：“正好我需要一个新的写谱本。”后来你看到他在上面写满了密密麻麻的音符。"},
          {txt:"放在他桌上，没有留名", eff:1, fb:"他拿着本子问了一圈是谁送的。问到你这儿时，你也摇头说不知道。他将信将疑地看着你。后来你在他写满的那本乐谱本里看到扉页上又多了一行字：“其实我知道是你。”"},
          {txt:"在里面第一页写了一句话再送", eff:5, fb:"你在扉页写了：“给未来的作曲家。希望以后能在唱片店看到你的名字。”他翻开时看到了，手指停在那行字上久久没有翻页。他隔着几排座位朝你竖了竖大拇指。"},
          {txt:"因为害羞，最终没送", eff:-1, fb:"那本乐谱本被你重新塞进了书包最深处。后来他一次偶然在文具店看到了类似的本子，随口说了一句：“这个乐谱本好看。我要是有一个就好了。”你听了心里闷闷的。"}
        ]},
        { id:39, title:"最后的信", desc:"高考结束后三天，你收到了一封挂号信。寄件人写着“李羲承”。你拆开，里面是厚厚几页手写信纸，写了他高中三年对你的印象。他在信里写：“谢谢你成为我高中三年最忠实的听众。以后不管我在哪里弹琴，都希望你能坐在第一排。”信纸最后一页粘着一个银色U盘。", opts:[
          {txt:"看完立刻给他打电话", eff:5, fb:"电话接通的很快，他似乎一直在等。“信收到了？”你嗯了一声，他轻声说：“所以……你愿意继续当我的第一个听众吗？”你说了好，他在电话那头长出了一口气。"},
          {txt:"回了一封更厚的手写信，把三年积攒的话全写了进去", eff:6, fb:"你花了一整夜写满了十几页信纸。他收到信后发了一条语音消息，声音有些哑：“我一边看一边哭，我妈以为我怎么了。这些信我都留着。”"},
          {txt:"把信反复读了三遍，然后小心藏进抽屉", eff:2, fb:"你没有立刻回复。一周后他忍不住发来消息：“信收到了吗？”你说收到了，他说：“那……你怎么想？”你说：“信在抽屉里，我每天睡前看一遍。”他说：“那我等你。”"},
          {txt:"看完后不知道如何回应，把信收起来没回复", eff:-3, fb:"他等了一周、两周。最后他发来一句：“没关系，你不用回。我只是想让你知道这些。”然后他再也没有主动联系你。那封信后来每次搬家你都带着。"}
        ]},
        { id:40, title:"弘大的重逢", desc:"多年后的一个傍晚，你在弘大附近等人。街边有个年轻人在表演，唱的是《天台的风》。你抬头，看到弹吉他的那个人戴着帽子，但当他抬起头调弦时，你隔着人群认出了那双眼睛——李羲承。他也看到了你，正在弹的和弦错了一个音。", opts:[
          {txt:"站在原地，对他挥了挥手", eff:4, fb:"他弹完那首歌，立刻跳下小舞台，拨开人群朝你跑来。“好久不见。”他说。然后他挠了挠头：“我在弘大唱歌好几年了，第一次在人群里看到你。你还记得那首歌吗？”"},
          {txt:"等他表演结束后，走到他面前", eff:3, fb:"他正在收拾琴盒，看到一双鞋子停在他面前，慢慢抬起头。你们在弘大的路灯下聊了很久。他说他下周要发布新歌了，歌名是《天台的风2025》。“你还记得那首歌的第一句歌词吗？”"},
          {txt:"在人群中喊了他的名字", eff:5, fb:"他在台上猛地抬头。然后他干脆放下吉他，对着话筒说：“抱歉大家，我看到了一位很久不见的老朋友。”他在起哄声中跳下台朝你走来。"},
          {txt:"转身离开，融进了人群里", eff:0, fb:"你犹豫了很久，最终没有打招呼。他唱完歌后在人群里快速扫视，好像看到了一个熟悉的背影。他追了几步，但你消失在了地铁口的方向。后来他发了一张照片，配文：“好像看到你了。”"}
        ]},
        { id:41, title:"天台的约定", desc:"毕业前最后一天下午，你一个人走上了教学楼的天台。旧长椅上放着一把吉他，旁边有一个浅蓝色的信封，上面写着你的名字。你打开，里面是一张手写的乐谱，歌名是《天台的风》。乐谱下面还有一行小字：“这首歌早该给你了。——羲承。”天台门口传来脚步声，李羲承站在那里，手里拿着两瓶香蕉牛奶。", opts:[
          {txt:"跑过去紧紧抱住他", eff:7, fb:"他被你撞得后退了一步，然后慢慢抬起手臂环住了你。“谢谢你整个高中都在听我弹琴。从第一天在琴房门口到现在。”你在他怀里用力点头，眼泪蹭在了他的衬衫上。"},
          {txt:"笑着接过乐谱，说“我会弹了以后弹给你听”", eff:5, fb:"他眼睛亮晶晶地看着你。“真的吗？那我等那一天。”你们坐回长椅上，他开始教你认五线谱。天慢慢黑了，远处传来毕业晚会的音乐声，但你们都不想走。"},
          {txt:"问他“以后还能来这个天台吗”", eff:4, fb:"他望向远处的操场。“大学放假了我们可以偷偷翻墙进来，”他说，“我知道哪里墙最矮。”然后他认真地说：“就算不能来这个天台，我也会找到新的天台。然后在每个天台上给你弹琴。”"},
          {txt:"站在原地，低头反复看着那张乐谱", eff:0, fb:"他看着你专注的样子，等了很久。最后他轻轻把香蕉牛奶放在长椅上。“牛奶放这儿了，记得喝。”他悄悄退后两步，转身走下了天台。等你看完乐谱抬头，他已经不在天台上了。"}
        ]},
        { id:42, title:"便利店夜话", desc:"晚上十点，你从补习班出来，拐进街角的便利店买宵夜。在冷藏柜前蹲着纠结时，有人走到你旁边也蹲了下来——是李羲承，他还穿着校服，肩上背着吉他包。“这么晚还吃三明治？这个鸡肉的比较好吃，我试过所有的口味。”他拿了两瓶香蕉牛奶，全部放在收银台上一起结了账。", opts:[
          {txt:"问他“你怎么也这么晚还在外面”", eff:3, fb:"他在便利店外面的长椅上坐下。“刚在地下练习室练完琴，出来发现只有这里还亮着灯。”他拧开牛奶瓶盖递给你。“以前半夜写不出歌的时候，就在这里坐到打烊。”"},
          {txt:"道谢后在他旁边坐下，一起吃东西", eff:4, fb:"你们并排坐在便利店门口的塑料椅上。他把校服外套脱下来搭在你们两个人肩上。他说：“我以后想开一家工作室，里面放一架钢琴，旁边就是便利店，可以随时买到香蕉牛奶。”"},
          {txt:"接过三明治说“下次我请你”", eff:2, fb:"他笑着说“那下次我要吃最贵的那个”。他站起来背上吉他，把你送到地铁站口。进站前他从包里翻出一颗糖塞进你口袋：“奖励你的，今天补习辛苦了。”"},
          {txt:"说“太晚了不吃了”，转身就走", eff:-1, fb:"他拿着三明治的手悬在半空，然后慢慢放下来。他把两份食物都放进自己包里，一个人坐在便利店门口吃完了。后来他在聊天里提到那天晚上便利店门口的风很大。"}
        ]},
        { id:43, title:"乐器行的试用", desc:"周六下午，你在乐器行逛着看吉他，忽然听到试音区有人在弹一首很熟悉的旋律——是李羲承自己的歌。他正坐在一把民谣吉他前闭着眼睛专注地弹着。曲子弹完后，店员拍手说：“这首曲子太好听了，要不要考虑在我们这里教吉他？”他睁开眼，正好看到站在展示架旁边的你。", opts:[
          {txt:"走过去说“我觉得你应该答应”", eff:4, fb:"他挠了挠头，有些不好意思地跟店员留了联系方式。出来以后他问你怎么会在这里，你说想看看吉他，他眼睛一亮：“你想学吉他？我可以教你，不收学费。”"},
          {txt:"悄悄听完，等他出来才装作偶遇", eff:2, fb:"他走出乐器行时看到你，先是一愣，然后说“刚才你是不是在里面？”你承认了，他嘴角微扬：“那首就是上次给你听的demo的完整版，你觉得怎么样？”"},
          {txt:"等他弹完，在门口拦住他夸赞", eff:5, fb:"他背着吉他出来时被你吓了一跳。听到你的夸奖，整个人笑得有点傻。“那个店员说可以让我周末在这里教课，你觉得呢？”你说这么好的机会不要错过。"},
          {txt:"觉得不关自己的事，转身去看别的", eff:0, fb:"他后来在乐器行门口站了一会儿，似乎在等人。你从另一侧的展示柜后面绕过去。他最后一个人离开了，手里拿着店员的名片翻来覆去地看。"}
        ]},
        { id:44, title:"下雨天的共享耳机", desc:"又一个雨天。你在学校走廊的窗边等雨停。李羲承不知道什么时候站到了你旁边，手里拿着他那副白色的耳机。“等雨停很无聊吧，我刚找到一首很好听的歌。不是我自己写的，但我觉得你会喜欢。”他把右耳的耳机递给你。", opts:[
          {txt:"接过耳机，安静地和他一起听完整首歌", eff:4, fb:"歌放完后，他问你觉得怎么样。你说很好听，他在手机上把这首歌收藏进了歌单，歌单的名字是「雨天和你」。他把那个歌单分享给了你。"},
          {txt:"听完后问他“这是谁推荐的歌”", eff:2, fb:"他说：“没人推荐，我随机听到的。但听到第一句歌词的时候就想到了你。”你问哪句，他不肯说，只是把手机屏幕按灭了，耳朵尖有一点粉红。"},
          {txt:"开玩笑说“你这是在和我分享你的私人歌单吗”", eff:5, fb:"他挑了挑眉：“被你发现了。我的私人歌单有几百首歌，但只分享给过一个人。现在你已经听了好几首了。”"},
          {txt:"摆手说“不用了，我在想事情”", eff:0, fb:"他点点头，收回耳机，一个人靠在窗边听完了那首歌。雨停后他把耳机线收好，对你说了句“我先走了”。你看到他的手机屏幕上还亮着那个歌单的页面。"}
        ]},
        { id:45, title:"校庆的后台", desc:"校庆晚会，李羲承的乐队又要上台表演。你被朋友拉着去帮忙搬道具，进了后台。他在角落的一把折叠椅上，对着镜子整理衬衫领口，看起来很紧张。一个乐队成员走过来跟他说还有五分钟上场。他深吸了一口气，然后看到了站在服装架旁边的你。", opts:[
          {txt:"走过去帮他整理了一下歪掉的领口", eff:5, fb:"你伸手把他衬衫领口翻正。他整个人僵住了。“领口翻了，”你解释。他小声说了句谢谢，然后站起来。“你在这儿我就不紧张了。上台后我会看你坐的那边。”"},
          {txt:"远远朝他做个加油的手势", eff:3, fb:"他看到你的手势，点了点头。上台后他在灯光下扫视了一圈，在观众席找到你的位置后才开始弹第一个和弦。整场表演都很稳。"},
          {txt:"对他说“放松点，你已经是老手了”", eff:4, fb:"他苦笑了一下：“每次都紧张。不过刚才看到你在后台，好像比之前好了一点。”他站起来的时候轻轻碰了碰你的肩膀，“等我下台，别走。”"},
          {txt:"觉得后台太乱，出去等着了", eff:0, fb:"你推开后台的门回到观众席。他上台后扫了好几圈观众席，脸上有一种你读不懂的表情，像是在找谁。演出很棒，但他在台上的笑容比以前少了一点。"}
        ]},
        { id:46, title:"新年钟声", desc:"跨年夜，同学们约在南山塔附近聚会。零点快到时大家挤在一起倒计时。你被挤到了人群边缘，差点踩到台阶时一只手抓住了你的手臂。李羲承不知道什么时候站到了你旁边，把他的围巾解下来绕在你脖子上。“新年快乐。”他在倒数到零时凑近你的耳朵说，声音被欢呼声盖住了。", opts:[
          {txt:"在他耳边也回了一句“新年快乐”", eff:4, fb:"他听到后笑了一下，然后从口袋里掏出一个小小的信封。“新年礼物，不是情人节礼物——虽然我也不知道有什么区别。”信封里是一张手写的乐谱卡片，封面上写着“写给新的一年”。"},
          {txt:"问他“你的新年愿望是什么”", eff:5, fb:"他低头想了想，然后说：“写一首让很多人听到的歌。然后……让某个特定的人第一个听到。”他没有看你说这句话，目光落在远处南山塔的灯光上。"},
          {txt:"把围巾还给他，说“你自己戴着，别感冒了”", eff:2, fb:"他把围巾又围回你脖子上，坚持说：“我不冷。”但他手指冰凉，不小心碰到你手背时你感觉到了。他立刻把手收回口袋，假装看烟花。"},
          {txt:"被周围的噪音吵得头疼，提前离开", eff:0, fb:"你走的时候他正在和另一个同学说话。后来他发消息问“你在哪，零点的香槟给你留了一杯”，你说先回家了。他回了一个“哦”，然后又发了一句“新年快乐，可惜你没听到钟声”。"}
        ]},
        { id:47, title:"转学的谣言", desc:"周一早上，班级里流传着一个消息——李羲承可能要转学去首尔的艺术高中。整个上午你都没看到他在教室。午休时你在走廊尽头的饮水机前打水，有人从身后走过来，站在你旁边排队。你转头，是他。“你今天上午去哪了？”你脱口而出。", opts:[
          {txt:"直接问他“听说你要转学，是真的吗”", eff:4, fb:"他愣了一下，然后摇头：“谁说的？我只是去首尔参加了一个音乐夏令营的面试。转学的事是误传。”他看你还一脸不信，又补了一句：“我不会转学的。我在这里还有很多没写完的歌。”"},
          {txt:"假装不在意，说“哦，听说了而已”", eff:0, fb:"他看了你一眼，似乎想从你脸上读到什么。下午你看到他一直在本子上写东西，下课的时候把一张折好的纸条放在你桌上——「我没有要转学。但如果我要走，会第一个告诉你。」"},
          {txt:"松一口气，说“那就好，班级里少一个人会很无聊”", eff:2, fb:"他挑了挑眉：“只是怕班级无聊？不是怕别的？”你没有接话，他自顾自地笑了，说：“放心吧，就算我要走，也会每天给你发demo，你远程当我的听众。”"},
          {txt:"因为担心，一整个上午都没和他说话", eff:-1, fb:"他下午回来时发现你对他很冷淡。放学时他拦住你问怎么了，你把谣言说了一遍。他听完后安静了几秒，然后说：“所以你担心了一天？下次有这种事直接来问我。”"}
        ]},
        { id:48, title:"他的家人", desc:"学校开放日，你负责在校门口引导家长。一个中年女人牵着一个五六岁的小女孩走过来。然后你听到一个熟悉的声音：“妈，这边！”李羲承小跑过来，先蹲下抱了抱小女孩，然后对他妈妈介绍学校。他抬头时看到了你，招手让你过来：“这是我同学——她就是我跟你们说的，一直听我demo的那个人。”", opts:[
          {txt:"有礼貌地鞠躬问候，夸他妹妹可爱", eff:3, fb:"他妹妹抓着你的手指叫“姐姐”。他妈妈忽然说了一句“这姑娘比照片上好看”，他立刻面红耳赤地打断：“妈！别说了！”你不知道他什么时候给他妈妈看过你的照片。"},
          {txt:"有些紧张地打了个招呼，然后想溜", eff:1, fb:"他拉住你的袖子没让你跑。“别紧张，我妈不咬人。”他把你介绍给他妈妈时语气特别郑重。后来他发消息说“我妈说你很文静，让我多向你学习”。"},
          {txt:"大方地和他妈妈聊了几句，夸他音乐天赋好", eff:4, fb:"他妈妈笑得合不拢嘴。李羲承在旁边捂着脸，耳朵红得能滴血。临走时他妈妈塞给你一包自己做的打糕，说“下次来家里玩”。他说：“我妈从不随便给人吃的，她喜欢你。”"},
          {txt:"假装没看见，继续忙自己的引导工作", eff:0, fb:"他后来跟朋友说，本来想让你见见他妈妈和妹妹，但看你很忙就没打扰。你从朋友那里听到这句话时已经过了一周，想解释又不知道从何说起。"}
        ]},
        { id:49, title:"未发表的曲子", desc:"高考前一周，李羲承给你发了一个加密链接。密码是他的生日。你点开，里面只有一首曲子，标题是「未发表-直到高考结束」。介绍栏写着：“这首歌写于高三每一个失眠的夜晚。等考完的那天，我会公开。但现在，你是唯一的听众。”曲子里有紧张、有期待、有不舍。", opts:[
          {txt:"立刻回他消息说“这首歌太棒了，考完一定要发”", eff:4, fb:"他秒回：“你是第一个说它棒的人。其实我放上去的时候手都在抖。”你说这首歌是他目前为止最好的作品，他回了一句：“谢谢你。高考加油。考完后我来找你。”"},
          {txt:"问他“为什么是现在给我听”", eff:3, fb:"他回：“因为考前压力太大，翻出这些片段重新编了一下，觉得想让你在考试前听到。算是一种祝福吧。”然后他又说：“如果这首歌能给你一点力量，那它就已经完成使命了。”"},
          {txt:"把链接收藏了，没有回复", eff:1, fb:"考完后他发了那张单曲的公开版，在简介里写“感谢高三的每一个夜晚，和第一个听到它的人”。你在评论区点了个赞，他私信你：“你听了对吧？我看到你的赞了。”"},
          {txt:"太忙没听，链接过期了", eff:-2, fb:"高考结束后你去找那个链接，发现已经失效了。你问他能不能再发一次，他说：“那个版本是高考前的限定版本，现在公开版少了最后一段哼唱。”你不知道少了的那段哼唱是什么。"}
        ]},
        { id:50, title:"多年后的琴声", desc:"毕业多年后，你在一家唱片行的角落里翻到了一张独立音乐人的专辑。封面是一架旧钢琴和一片夕阳，专辑名叫《天台日记》。你翻到背面，制作人名单里写着“李羲承”。店里的音响正好在播专辑的最后一首歌，前奏是一段很熟悉的钢琴旋律——那是多年前的某个清晨，你在琴房门口偷听到的曲子。", opts:[
          {txt:"买下这张专辑，每一首都从头听到尾", eff:5, fb:"整张专辑循环了好几遍。最后一首歌的末尾有一段隐藏音轨，是一段嘈杂的录音，然后有一个声音说：“这首歌给一个在琴房门口偷听的人。你每次经过我都知道。”那个声音很轻，但你认得出是谁。"},
          {txt:"拍下专辑封面，在社交媒体上发给他", eff:4, fb:"你很久没有和他联系了。几个小时后他回复：“那是我三年前出的专辑。你现在才看到？”你说是的，他发来一个笑脸：“没关系，刚好我下周在首尔有个小型演出，要来看吗？我给你留第一排。”"},
          {txt:"在唱片行的试听机前站着听完了整张专辑", eff:3, fb:"你在试听机前站了很久，耳机里是跨越多年的旋律。店员过来问你需要帮忙吗，你摇摇头，指着专辑说“我认识这个制作人”。店员说这张专辑已经卖了很久了。"},
          {txt:"把专辑放回架子上，转身离开", eff:0, fb:"你走出唱片行，外面的阳光有些刺眼。你走出几步后停下来，又折返回去，但刚才那张专辑已经被别人买走了。只剩下空空的架位，和还在播放的最后一首歌。"}
        ]}
      );

      const CHAT_TOPICS = [
        { id:101, trigger:"你在干嘛？", reply:"刚练完琴，手指有点酸。新曲子有一段怎么弹都不满意，正烦躁呢。你在干嘛？", options:[
          {txt:"我在写作业，数学好难", reply:"数学我上次整理了一本错题集，明天带给你。不过你现在可以先休息一下，一直做题脑子会糊的。", eff:2},
          {txt:"要不要我帮你听听那段曲子？", reply:"你愿意听？太好了，我马上发给你。不过你别嫌弃，真的是半成品，副歌部分连词都没填。", eff:3},
          {txt:"我也刚忙完，准备看个剧放松", reply:"看什么剧？我最近在追一部音乐题材的，里面的配乐写得特别好，推给你？", eff:1}
        ]},
        { id:102, trigger:"今天天气真好", reply:"是啊，首尔难得有这么蓝的天。我在琴房弹琴的时候阳光刚好照在琴键上，心情都变好了。你那边呢？", options:[
          {txt:"我在窗边晒太阳，差点睡着", reply:"上课睡着被老师抓到我可不管哦。不过换作是我，这种天气也想趴着什么都不干。", eff:1},
          {txt:"天气好就想出去玩", reply:"我也想去汉江边弹吉他。上次我在弘大看到有街头艺人在江边表演，氛围特别好。要不……下次一起去？", eff:3},
          {txt:"好天气让人有恋爱的冲动", reply:"……怎么突然说这个。不过春天确实容易让人胡思乱想，我写了好几首情歌的草稿，都不满意。", eff:2}
        ]},
        { id:103, trigger:"你吃饭了吗？", reply:"还没，刚从小卖部买了个三角饭团。今天食堂人太多了，懒得挤。你呢，吃了吗？", options:[
          {txt:"我也没吃，一起点外卖？", reply:"外卖？校门口那家炸鸡可以送进来吗？要是能行的话我请你，上次你帮我听demo还没谢你。", eff:3},
          {txt:"我带了便当，分你一半？", reply:"你自己做的吗？那怎么好意思……不过既然你开口了，我就厚着脸皮接受了。下次换我带。", eff:2},
          {txt:"不吃饭怎么行，快去食堂", reply:"那你陪我一起去？一个人吃饭真的很无聊。而且有你在我可以多点一个菜。", eff:1}
        ]},
        { id:104, trigger:"你今天心情好吗？", reply:"还不错，早上灵感来了写了一段旋律，感觉比之前顺。不过后来上数学课就泄气了。你呢？", options:[
          {txt:"我心情一般，考试压力好大", reply:"考试的事情别太焦虑。我有一份重点整理，等下发你。我们一起复习的话效率应该更高。", eff:2},
          {txt:"看到你的消息心情就好了", reply:"……这种话你不能随便说。我会当真的。不过，听到你这么说，我今天剩下的时间都会很开心。", eff:3},
          {txt:"心情不好不坏，就那样", reply:"那就听听我的新demo吧，说不定能让你的心情稍微好一点。音乐有治愈的力量，我一直相信。", eff:1}
        ]},
        { id:105, trigger:"你在想什么？", reply:"说实话？在想一个人。刚才弹琴的时候有几个音怎么都弹不对，朋友说是因为分心。我可能确实在想别的事。", options:[
          {txt:"在想谁啊？我认识吗？", reply:"你当然认识。但我现在不想说名字，怕说出来以后连朋友都做不成。等时机合适了，我会第一个告诉你。", eff:3},
          {txt:"是不是在想新歌的歌词？", reply:"……被你看穿了。对，在想歌词。有一句怎么都想不好，是关于「等待」的。你帮我想想？", eff:2},
          {txt:"专心弹琴别分心", reply:"你说得对。但我发现有些事情不是想不想就能控制的。比如灵感来了挡不住，比如……算了，不说了。", eff:1}
        ]},
        { id:106, trigger:"晚安", reply:"这么早就睡了？我还有一段副歌没写完，打算再熬一会儿。你先睡吧，明天见。", options:[
          {txt:"别熬夜了，对身体不好", reply:"你这是在关心我吗？好吧，那我不熬了。但如果明天副歌还是写不出来，就怪你。晚安。", eff:2},
          {txt:"写完发给我，我明天听", reply:"好，那我更有动力了。明天你听完给我建议，别只说「还行」。上次你说副歌可以加弦乐，我这次试了，效果确实好。", eff:3},
          {txt:"晚安，做个好梦", reply:"你也做个好梦。梦到我的话……算了，梦到好吃的也行。晚安。", eff:1}
        ]},
        { id:107, trigger:"今天放学有空吗？", reply:"有啊。今天社团活动取消了，本来想去琴房，但如果你有事找我，琴房可以改天。", options:[
          {txt:"一起去咖啡店写作业？", reply:"好啊。我知道一家新开的，他们家有架旧钢琴，老板说我可以随便弹。你写作业，我在旁边练琴，互不打扰。", eff:3},
          {txt:"没什么特别的事，就是想见你", reply:"……这种话真的让人没法接。不过，既然你想见我，那我现在就去你班级门口。五分钟后到。", eff:3},
          {txt:"帮我补习数学吧", reply:"没问题。你数学哪部分最头疼？我先准备一下。不过补习完了得请我吃东西，这是规矩。", eff:2}
        ]},
        { id:108, trigger:"我有点想你", reply:"……这条消息我看了好几遍。你是认真的还是在开玩笑？如果是认真的，那我现在心跳很快。如果是开玩笑，那我也会假装没看到。", options:[
          {txt:"我是认真的", reply:"那好。我也坦白——从高一开始，我每次弹琴都在想你会不会路过琴房。现在你知道了，轮到你了。", eff:4},
          {txt:"开玩笑的啦", reply:"哦。我就知道。不过就算是玩笑，也谢谢你。至少让我知道你会想我，哪怕是假设的。", eff:1},
          {txt:"你觉得呢？", reply:"我觉得……你最好别让我猜。我猜歌的和弦很容易，但猜女孩子的心思从来没对过。给我个痛快吧。", eff:2}
        ]},
        { id:109, trigger:"推荐一首歌给我吧", reply:"最近在听10cm的《喜欢》。那首歌的旋律很简单，但歌词写得特别好——「我喜欢你，像春天一样温暖」。你觉得呢？", options:[
          {txt:"我马上去听，听完告诉你", reply:"好。那首歌我第一次听的时候，脑子里就有画面了：樱花树下，一个人对另一个人说……算了，你听完再说。", eff:2},
          {txt:"这首歌是在暗示什么吗？", reply:"你觉得呢。歌里说的「喜欢」，你觉得我推荐这首歌给你，是什么意思。自己品。", eff:3},
          {txt:"我更喜欢你的demo", reply:"我的demo和人家专业歌手的能比吗……不过你这么说，我真的很开心。下次我写一首比《喜欢》更好的。", eff:2}
        ]},
        { id:110, trigger:"下雨了", reply:"嗯，窗外雨好大。你带伞了吗？没带的话我在教学楼一楼，可以送你到校门口。", options:[
          {txt:"我没带伞，你来接我", reply:"好，我马上到。你在哪个位置？别站在雨里，先找个屋檐躲一下。我跑过来，三分钟。", eff:3},
          {txt:"我带了伞，谢谢关心", reply:"那就好。不过雨太大，走路小心别踩水坑。上次你鞋子湿了一整天，我看着都觉得难受。", eff:2},
          {txt:"下雨天最适合听歌了", reply:"我也这么觉得。我现在在弹一首自己写的雨天的曲子，你要不要听？刚好外面在下雨，氛围正好。", eff:2}
        ]}
      ];
      for(let i=111; i<=150; i++) {
        CHAT_TOPICS.push({
          id:i, trigger:`今天有什么新鲜事吗？`, reply:`有啊，今天练习室里的钢琴调过音了，弹起来特别顺手。我录了一小段即兴，回头发给你。`, options:[
            {txt:"好啊，我等着听", reply:"马上发。这段是我今天最满意的，虽然只有三十秒。", eff:2},
            {txt:"你每天练琴不累吗？", reply:"累，但想到有人会听，就觉得值得。你是那个让我觉得值得的人。", eff:3},
            {txt:"我也想去练习室看看", reply:"来吧，我带你参观。不过地方不大，只有一架钢琴和一堆乐谱。但那里是我的小世界。", eff:2}
          ]});
      }

      function getRandomChatTopic() {
        const available = CHAT_TOPICS.filter(c => !usedChatIds.includes(c.id));
        if (available.length === 0) { usedChatIds = []; return CHAT_TOPICS[Math.floor(Math.random()*CHAT_TOPICS.length)]; }
        const topic = available[Math.floor(Math.random()*available.length)];
        usedChatIds.push(topic.id);
        return JSON.parse(JSON.stringify(topic));
      }

      function getRandomEvent() {
        if (usedEventIds.length >= EVENT_POOL.length) usedEventIds = [];
        const available = EVENT_POOL.filter(e => !usedEventIds.includes(e.id));
        const evt = available[Math.floor(Math.random() * available.length)];
        usedEventIds.push(evt.id);
        return JSON.parse(JSON.stringify(evt));
      }

      function generateTurn() {
        if (gameFinished) return null;
        const base = getRandomEvent();
        currentEventObj = base;
        currentOptions = base.opts;
        return {
          header: `📖 第 ${turn} 回合 · ${base.title}`,
          story: base.desc,
          relation: `💗 关系：${stage} · 心意值 ${Math.floor(affection)}`,
          options: currentOptions
        };
      }

      let currentState = null;

      function renderGame() {
        if (gameFinished) return;
        if (!currentState) currentState = generateTurn();
        const container = document.getElementById("dynamicContent");
        let optHtml = "";
        currentState.options.forEach((opt, idx) => {
          optHtml += `<div class="choice-btn" data-opt="${idx}">${opt.txt}</div>`;
        });
        container.innerHTML = `
          <div class="round-header">${currentState.header}</div>
          <div class="story-box">${currentState.story}</div>
          <div class="relation-box">${currentState.relation}</div>
          <div class="choices" id="actionList">${optHtml}</div>
        `;
        document.querySelectorAll('.choice-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            if (isChoosing) return;
            const idx = parseInt(btn.dataset.opt);
            handleChoice(idx);
          });
        });
        isChoosing = false;
        chatUsedThisTurn = false;
        checkAutoMessages();
      }

      function showPopup(feedback, callback) {
        isChoosing = true;
        document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
        const overlay = document.createElement('div');
        overlay.className = 'chat-overlay';
        overlay.innerHTML = `<div class="chat-popup"><strong>💬 李羲承：</strong>${feedback}</div>`;
        document.body.appendChild(overlay);
        let canClose = false;
        setTimeout(() => { canClose = true; }, 2500);
        overlay.addEventListener('click', () => {
          if (canClose) {
            overlay.remove();
            document.querySelectorAll('.choice-btn').forEach(b => b.disabled = false);
            isChoosing = false;
            if (callback) callback();
          }
        });
        setTimeout(() => {
          if (document.body.contains(overlay)) {
            overlay.remove();
            document.querySelectorAll('.choice-btn').forEach(b => b.disabled = false);
            isChoosing = false;
            if (callback) callback();
          }
        }, 4000);
      }

      function handleChoice(index) {
        if (gameFinished || isChoosing) return;
        const selected = currentState.options[index];
        if (!selected) return;
        affection += selected.eff;
        affection = Math.min(100, Math.max(0, affection));
        updateStage();
        showPopup(selected.fb, () => {
          turn++;
          if (turn >= 11 + Math.floor(Math.random() * 4) || turn > 14) { triggerEnding(); return; }
          if (checkEarlyEnding()) return;
          currentState = generateTurn();
          renderGame();
        });
      }

      function checkEarlyEnding() {
        if (affection >= 92 && turn >= 8) {
          triggerEnding("双向奔赴", "毕业典礼后的傍晚，李羲承在天台上为你弹了一首写了三年的歌。歌名是你的名字。他说这是他从高一开始写的。你接过乐谱，背面写着一行字：“谢谢你在每一个清晨经过琴房。以后的路，可以一起走吗？”你点了点头，风把樱花吹了满天。");
          return true;
        }
        if (affection <= 6 && turn >= 7) {
          triggerEnding("平行线", "直到毕业，你们的交集也寥寥无几。李羲承最终去了一所著名的音乐学院。你偶尔在社交媒体上刷到他的动态，只是点个赞，从不敢留言。你们就像两条平行线，在同一片天空下却再无交集。");
          return true;
        }
        return false;
      }

      function triggerEnding(forceTitle, forceDesc) {
        if (gameFinished) return;
        gameFinished = true;
        let et, ed;
        if (forceTitle) { et = forceTitle; ed = forceDesc; }
        else if (affection >= 85) { et = "夏天的告白"; ed = "毕业那天，李羲承在樱花树下叫住了你。他从琴盒里拿出一张CD，封面是你高一时在琴房门口偷看的侧影。他说这张CD里是他为你写过的所有旋律。他深吸一口气，终于说出了那句憋了三年的话：“我喜欢你，从你第一次在琴房门口偷听开始。”"; }
        else if (affection >= 70) { et = "朋友以上"; ed = "你们考去了同一座城市的不同大学。他每个月都会坐地铁来看你，带着他新写的demo。所有人都以为你们在一起了，但谁都没有捅破那层窗户纸。"; }
        else if (affection >= 55) { et = "未完成的乐章"; ed = "高考后他给了你一个信封，里面是一首未完成的钢琴曲手稿。他说这首歌他写不下去了，因为每次写到副歌就会想到你。那张手稿你裱了起来，挂在卧室墙上。"; }
        else if (affection >= 40) { et = "擦肩而过"; ed = "因为几次误会，你们渐渐疏远。毕业那天，他在人群里看了你一眼，似乎想走过来。你后来在同学录里翻到他的留言，只有短短一句：“谢谢你听过我的歌。”"; }
        else if (affection >= 25) { et = "迟到的感谢"; ed = "毕业纪念册上你写了一大段话，他只回了一行：“谢谢，保重，希望你一切都好。”你把那本纪念册翻了无数遍。"; }
        else if (affection >= 15) { et = "熟悉的陌生人"; ed = "他后来在音乐平台上发布了自己的歌。你偷偷关注了他，看着他的粉丝从几十涨到几万。但再也没人知道，你曾是他最早的听众。"; }
        else if (affection >= 5) { et = "空白的同学录"; ed = "你的同学录里，他的那一页是空白的。你给他时他接了，后来却一直没还。毕业那天你问他，他才从书包里翻出那张纸——还是白的。“对不起，我想写的话太多，不知从哪句开始。”"; }
        else { et = "独角戏"; ed = "暗恋是你一个人的兵荒马乱。你在每一个清晨经过琴房时放慢脚步，在每一堂音乐课上寻找他的身影。但他从未知晓，你从未说出口。"; }
        document.getElementById("dynamicContent").innerHTML = `<div class="ending-screen"><h2>🍃 ${et}</h2><p style="margin:20px 0;line-height:1.7;">${ed}</p><button class="reset-btn" id="resetGameBtn">重新开始</button></div>`;
        document.getElementById("resetGameBtn").addEventListener("click", () => location.reload());
        document.getElementById("chatBadge").style.display = "none";
        hasNewMessage = false;
      }

      function checkAutoMessages() {
        if (gameFinished) return;
        pendingAutoMessage = null;
        hasNewMessage = false;
        document.getElementById("chatBadge").style.display = "none";
        if (turn === 3 && affection >= 30) {
          pendingAutoMessage = "今天在琴房练了一首新曲子，忽然想到你上次说我弹的《River Flows in You》很好听。这首新曲子还没给别人听过，你想听听看吗？";
          hasNewMessage = true;
        } else if (turn === 5 && affection >= 45) {
          pendingAutoMessage = "最近写歌总是卡在第二段副歌。朋友说我是因为有心事。其实我就是想写一首……能让某个特定的人听到的歌。你觉得写给谁比较好？";
          hasNewMessage = true;
        } else if (turn >= 11 && affection >= 65) {
          pendingAutoMessage = "有些话憋了很久了。从高一的琴房开始，到现在的天台，你一直是我最忠实的听众。我想认真问你一个问题：如果可以，你愿意做我新歌的第一个听众吗——不只是这首歌，是以后所有的歌。";
          hasNewMessage = true;
        }
        if (hasNewMessage) document.getElementById("chatBadge").style.display = "flex";
      }

      function openChat() {
        if (gameFinished) return;
        if (chatUsedThisTurn) { alert("这回合已经聊过了，下个回合再来吧。"); return; }
        chatUsedThisTurn = true;
        hasNewMessage = false;
        document.getElementById("chatBadge").style.display = "none";
        chatMessages = [];
        currentChatStep = 0;
        chatSequence = [];
        if (pendingAutoMessage) {
          chatMessages.push({ side: "left", text: pendingAutoMessage });
          chatSequence = getAutoChatSequence();
          pendingAutoMessage = null;
        } else {
          const topic = getRandomChatTopic();
          chatMessages.push({ side: "left", text: topic.trigger });
          chatSequence = [
            { side: "left", text: topic.reply },
            { options: topic.options }
          ];
        }
        renderChatScreen();
      }

      function getAutoChatSequence() {
        const topic = getRandomChatTopic();
        return [
          { side: "left", text: "（他似乎在等你的回复）" },
          { options: topic.options }
        ];
      }

      function renderChatScreen() {
        const overlay = document.createElement('div');
        overlay.className = 'chat-screen-overlay';
        overlay.id = 'chatScreenOverlay';
        overlay.innerHTML = `
          <div class="chat-phone">
            <div class="chat-phone-header"><button class="back-btn" id="chatBackBtn">←</button><span>💬 李羲承</span></div>
            <div class="chat-messages" id="chatMsgArea"></div>
            <div class="chat-options" id="chatOptArea"></div>
          </div>`;
        document.body.appendChild(overlay);
        document.getElementById('chatBackBtn').addEventListener('click', closeChat);
        updateChatDisplay();
      }

      function updateChatDisplay() {
        const msgArea = document.getElementById('chatMsgArea');
        const optArea = document.getElementById('chatOptArea');
        if (!msgArea || !optArea) return;
        msgArea.innerHTML = chatMessages.map(m => `<div class="chat-bubble ${m.side}">${m.text}</div>`).join('');
        msgArea.scrollTop = msgArea.scrollHeight;
        if (chatSequence && currentChatStep < chatSequence.length) {
          const step = chatSequence[currentChatStep];
          if (step.options) {
            optArea.innerHTML = step.options.map((opt, i) => `<div class="chat-option-btn" data-chatidx="${i}">${opt.txt}</div>`).join('');
            document.querySelectorAll('.chat-option-btn').forEach(btn => {
              btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.chatidx);
                handleChatOption(idx);
              });
            });
          } else if (step.side) {
            optArea.innerHTML = '';
            setTimeout(() => { chatMessages.push(step); currentChatStep++; updateChatDisplay(); }, 800);
          }
        } else {
          optArea.innerHTML = '<div style="color:#b35477;font-size:0.8rem;text-align:center;width:100%;">聊天结束</div>';
          setTimeout(closeChat, 2500);
        }
      }

      function handleChatOption(idx) {
        const step = chatSequence[currentChatStep];
        if (!step || !step.options) return;
        const chosen = step.options[idx];
        chatMessages.push({ side: "right", text: chosen.txt });
        if (chosen.eff) { affection += chosen.eff; affection = Math.min(100, Math.max(0, affection)); updateStage(); }
        currentChatStep++;
        chatMessages.push({ side: "left", text: chosen.reply });
        updateChatDisplay();
      }

      function closeChat() {
        const overlay = document.getElementById('chatScreenOverlay');
        if (overlay) overlay.remove();
        chatSequence = null;
        renderGame();
      }

      function saveGame() {
        if (gameFinished) return;
        const save = { player, affection, stage, turn, usedEventIds, usedChatIds, currentState, gameFinished, pendingAutoMessage, hasNewMessage, chatUsedThisTurn };
        localStorage.setItem("crushFinalSave", JSON.stringify(save));
        alert("存档成功");
      }
      function loadGame() {
        const raw = localStorage.getItem("crushFinalSave");
        if (!raw) { alert("没有存档"); return; }
        const data = JSON.parse(raw);
        player = data.player; affection = data.affection; stage = data.stage; turn = data.turn;
        usedEventIds = data.usedEventIds; usedChatIds = data.usedChatIds || [];
        currentState = data.currentState; gameFinished = data.gameFinished;
        pendingAutoMessage = data.pendingAutoMessage || null;
        hasNewMessage = data.hasNewMessage || false;
        chatUsedThisTurn = data.chatUsedThisTurn || false;
        updateStage();
        if (!gameFinished) { renderGame(); if (hasNewMessage) document.getElementById("chatBadge").style.display = "flex"; }
      }

      function showCreation() {
        const overlay = document.createElement('div');
        overlay.className = 'overlay';
        overlay.innerHTML = `<div class="create-card"><h2>🍃 暗恋这件小事</h2><p style="text-align:center;color:#b35d7c;margin-bottom:16px;">填写你的信息</p>
          <div class="input-row"><label>🌸 姓名</label><input id="pName" placeholder="例如：小夏"></div>
          <div class="input-row"><label>🎂 年龄</label><input id="pAge" placeholder="例如：17"></div>
          <div class="input-row"><label>📚 班级</label><input id="pClass" placeholder="例如：高二3班"></div>
          <div class="input-row"><label>✨ 身份</label><input id="pIdentity" placeholder="例如：普通学生"></div>
          <div class="input-row"><label>🎨 外貌</label><input id="pAppearance" placeholder="例如：清秀干净"></div>
          <div class="input-row"><label>💭 性格</label><input id="pPersonality" placeholder="例如：温柔细腻"></div>
          <div class="input-row"><label>🎧 爱好</label><input id="pHobby" placeholder="例如：听歌/阅读"></div>
          <div class="input-row"><label>💞 初始关系</label><select id="pRelation"><option>完全陌生</option><option>同班同学</option><option>前后桌</option><option>社团成员</option><option>邻班</option></select></div>
          <button class="start-main-btn" id="confirmStart">开始</button></div>`;
        document.body.appendChild(overlay);
        document.getElementById('confirmStart').addEventListener('click', () => {
          player.name = document.getElementById('pName').value || "小夏";
          player.age = document.getElementById('pAge').value || "17";
          player.classInfo = document.getElementById('pClass').value || "高二3班";
          player.identity = document.getElementById('pIdentity').value || "普通学生";
          player.appearance = document.getElementById('pAppearance').value || "清澈";
          player.personality = document.getElementById('pPersonality').value || "细腻";
          player.hobby = document.getElementById('pHobby').value || "听歌";
          const rel = document.getElementById('pRelation').value;
          let bonus = 0;
          if (rel === "同班同学") bonus = 6;
          else if (rel === "前后桌") bonus = 9;
          else if (rel === "社团成员") bonus = 7;
          else if (rel === "邻班") bonus = 3;
          affection = 18 + bonus;
          updateStage(); turn = 1; gameFinished = false; usedEventIds = []; usedChatIds = [];
          pendingAutoMessage = null; hasNewMessage = false; chatUsedThisTurn = false;
          currentState = generateTurn(); renderGame(); overlay.remove();
        });
      }

      function clock() { document.getElementById("liveClock").innerText = `🌸 ${new Date().toLocaleTimeString('zh-CN', { hour12: false }) }`; }
      setInterval(clock, 1000); clock();

      window.onload = () => {
        showCreation();
        document.getElementById('saveGameBtn').addEventListener('click', saveGame);
        document.getElementById('loadGameBtn').addEventListener('click', loadGame);
        document.getElementById('chatPhoneBtn').addEventListener('click', openChat);
      };
    })();
  </script>
</body>
</html>
