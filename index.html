<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>暗恋这件小事</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Noto Sans SC', 'Poppins', system-ui, sans-serif; }
    body { background: linear-gradient(145deg, #f3e8ed 0%, #f9f0f4 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .game-container { max-width: 620px; width: 100%; background: #fffcfd; border-radius: 48px; box-shadow: 0 20px 35px rgba(130,90,110,0.15); overflow: hidden; border: 1px solid #f0c4d5; position: relative; }
    .top-bar { background: #fbc8da; padding: 12px 22px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; color: #9e4468; font-weight: bold; position: relative; }
    .clock { background: #fff0f5; padding: 5px 14px; border-radius: 40px; font-size: 0.8rem; }
    .save-btns { display: flex; gap: 6px; align-items: center; }
    .save-btns button { background: #ffffffd0; border: none; padding: 5px 12px; border-radius: 40px; font-weight: bold; font-size: 0.7rem; color: #b04e70; cursor: pointer; }
    .phone-icon { background: #ffffffd0; border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-left: 4px; position: relative; box-shadow: 0 2px 6px rgba(0,0,0,0.08); transition: 0.15s; }
    .phone-icon:active { transform: scale(0.92); }
    .phone-badge { position: absolute; top: -4px; right: -4px; background: #ff5e8a; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .content-panel { padding: 20px 22px 18px; }
    .round-header { background: #fff0f5; border-radius: 28px; padding: 10px 18px; border-left: 6px solid #f09db9; font-weight: 700; color: #a55272; font-size: 0.85rem; margin-bottom: 18px; }
    .story-box { background: #fef5f8; border-radius: 32px; padding: 24px; line-height: 1.8; color: #3a2f34; box-shadow: 0 3px 10px #f7d2e0; white-space: pre-wrap; margin-bottom: 14px; font-size: 0.95rem; min-height: 180px; }
    .relation-box { background: #ffeaf2; border-radius: 32px; padding: 10px 16px; font-weight: 600; color: #b86082; text-align: center; margin-bottom: 18px; }
    .choices { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 8px; }
    .choice-btn { background: #fff2f7; border: 1.5px solid #f6b7ce; padding: 12px 18px; border-radius: 60px; font-weight: 700; color: #b35477; cursor: pointer; font-size: 0.85rem; transition: 0.1s; text-align: center; flex: 1 0 auto; max-width: 260px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
    .choice-btn:active { background: #fcd6e4; transform: scale(0.97); }
    .choice-btn:disabled { opacity: 0.6; pointer-events: none; }
    .chat-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(2px); }
    .chat-popup { background: #fff7fa; border-radius: 36px; padding: 22px 24px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 15px 30px rgba(180,90,120,0.25); border: 1px solid #f5a5c0; font-size: 1rem; line-height: 1.6; animation: fadeIn 0.25s ease; }
    .chat-screen-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(3px); }
    .chat-phone { background: #fffbfd; border-radius: 40px; max-width: 420px; width: 95%; height: 620px; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 25px 50px rgba(100,60,80,0.3); overflow: hidden; border: 2px solid #f0c4d5; }
    .chat-phone-header { background: #fbc8da; padding: 14px 18px; display: flex; align-items: center; gap: 10px; color: #9e4468; font-weight: bold; }
    .chat-phone-header .back-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #9e4468; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; background: #fff5f8; }
    .chat-bubble { max-width: 80%; padding: 10px 14px; border-radius: 20px; font-size: 0.85rem; line-height: 1.5; word-break: break-word; animation: fadeIn 0.2s ease; }
    .chat-bubble.left { background: #fff0f5; align-self: flex-start; border-bottom-left-radius: 6px; color: #4a2f38; }
    .chat-bubble.right { background: #fbc8da; align-self: flex-end; border-bottom-right-radius: 6px; color: #3a2028; }
    .chat-options { padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 8px; border-top: 1px solid #f5d0e0; background: #fffafc; }
    .chat-option-btn { background: #fff2f7; border: 1px solid #f6b7ce; padding: 8px 14px; border-radius: 30px; font-weight: 600; font-size: 0.8rem; color: #b35477; cursor: pointer; flex: 1 0 auto; text-align: center; }
    .chat-option-btn:active { background: #fcd6e4; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .ending-screen { text-align: center; padding: 28px 20px; background: #fff4f8; border-radius: 42px; }
    .reset-btn { background: #f7a2be; border: none; margin-top: 20px; padding: 10px 28px; border-radius: 60px; font-weight: bold; color: white; cursor: pointer; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fceff4fb; display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
    .create-card { background: #fffafd; max-width: 480px; width: 100%; border-radius: 56px; padding: 28px; box-shadow: 0 20px 30px rgba(0,0,0,0.08); }
    .create-card h2 { color: #b75a7c; text-align: center; }
    .input-row { margin-bottom: 14px; }
    .input-row label { font-weight: 700; color: #a04568; font-size: 0.8rem; display: block; margin-bottom: 4px; }
    .input-row input, .input-row select { width: 100%; padding: 10px 14px; border-radius: 40px; border: 1px solid #f2b7cc; background: #fff5f9; font-size: 0.9rem; }
    .start-main-btn { background: #fdafc7; border: none; width: 100%; padding: 14px; border-radius: 50px; font-weight: bold; color: white; margin-top: 20px; cursor: pointer; font-size: 1rem; }
  </style>
</head>
<body>
<div class="game-container" id="gameRoot">
  <div class="top-bar">
    <div class="clock" id="liveClock">🌸 --:--:--</div>
    <div class="save-btns">
      <button id="saveGameBtn">💾</button>
      <button id="loadGameBtn">📂</button>
      <button class="phone-icon" id="chatPhoneBtn" title="消息">💬<span class="phone-badge" id="chatBadge" style="display:none;">!</span></button>
    </div>
  </div>
  <div class="content-panel" id="dynamicContent"></div>
</div>
<script>
(function() {
  let player = { name:"", age:"", classInfo:"", identity:"", appearance:"", personality:"", hobby:"" };
  let affection = 20;
  let stage = "陌生";
  let turn = 1;
  let gameFinished = false;
  let usedEventIds = [];
  let usedChatIds = [];
  let currentEventObj = null;
  let currentOptions = [];
  let isChoosing = false;
  let chatUsedThisTurn = false;
  let hasNewMessage = false;
  let chatMessages = [];
  let currentChatStep = 0;
  let chatSequence = null;
  let pendingAutoMessage = null;

  function updateStage() {
    if (affection >= 82) stage = "暧昧期";
    else if (affection >= 68) stage = "心动";
    else if (affection >= 55) stage = "好朋友";
    else if (affection >= 42) stage = "熟悉";
    else if (affection >= 28) stage = "认识";
    else if (affection >= 15) stage = "知道对方";
    else stage = "陌生";
  }

  // ============ 50个事件 ============
  const EVENT_POOL = [
    { id:1, title:"清晨的琴房", desc:"早上七点十分，整栋教学楼还笼罩在淡淡的晨曦里。你因为要补交作业提前到校，经过三楼音乐教室时，忽然听到一阵清澈的钢琴声。门虚掩着，你透过缝隙看到李羲承坐在那架老旧的黑色钢琴前，修长的手指在琴键上流淌出《River Flows in You》的旋律。晨光从窗户斜斜地打在他的侧脸上，他微微闭着眼睛，仿佛完全沉浸在自己的世界里。", opts:[
      {txt:"悄悄站在门口听完，不忍心打扰", eff:3, fb:"他弹完最后一个音，缓缓睁开眼睛，转头时恰好对上了你的视线。他微微一愣，然后露出一个有些腼腆的笑容。"},
      {txt:"推门走进去，鼓掌说“真好听”", eff:5, fb:"他被突然的掌声吓了一跳，耳朵尖微微泛红。“只是随便弹弹……不过后半段是我自己加的。”"},
      {txt:"怕被发现，屏住呼吸悄悄转身离开", eff:0, fb:"你小心翼翼地后退。走下楼梯时，琴声似乎停顿了几秒，但很快又继续响起。"},
      {txt:"拿出手机想录下来，但忘了关闪光灯", eff:-2, fb:"咔嚓一声，琴声戛然而止。他转过头，眉头微微皱起：“请删掉，我不喜欢被偷拍。”"}
    ]},
    { id:2, title:"食堂的泡菜锅", desc:"中午十二点，食堂里人声鼎沸。你端着餐盘在人群中穿梭，几乎所有的座位都坐满了人。正当你不知所措时，看到角落靠窗的位置上，李羲承独自一人坐在那里，面前放着一份泡菜锅和一碗米饭。他抬头时正好与你四目相对，便自然地朝你招了招手：“这儿有空位，过来坐吧。”", opts:[
      {txt:"开心地坐过去，自然地聊起今天的菜色", eff:4, fb:"你坐下后，他把自己碗里仅有的几片牛肉轻轻夹到了你的盘子里。“你太瘦了，多吃点。”"},
      {txt:"害羞地点点头，坐得离他远远的", eff:1, fb:"你坐在了他斜对角最远的位置。他看了你一眼，欲言又止。"},
      {txt:"道谢后，端着餐盘去了朋友那一桌", eff:0, fb:"坐下后你忍不住回头看了一眼，他正低着头，用筷子轻轻戳着碗里的豆腐。"},
      {txt:"摇头说“我在找人，不好意思”", eff:-1, fb:"他举在半空中的手顿了顿，然后慢慢放下。“哦，好。”他的声音很轻。"}
    ]},
    { id:3, title:"暴雨中的共享伞", desc:"下午最后一节课快结束时，窗外突然下起了瓢泼大雨。你没带伞，站在教学楼一楼的走廊上。雨水溅湿了你的帆布鞋，风一吹，有点冷。李羲承撑着一把深蓝色的长柄伞走了出来，把伞往你这边递了递：“一起走吧，我正好去校门口坐公交。”", opts:[
      {txt:"接过伞柄，尽量把伞往他那边倾斜", eff:5, fb:"他发现后轻轻握住了伞柄的上方，结果他自己的半边肩膀完全暴露在雨中。“没事，我喜欢雨。”"},
      {txt:"低着头，一路沉默地走到校门口", eff:1, fb:"到校门口时，他把伞收了收，轻声说：“路上小心，别感冒了。”"},
      {txt:"提议先去旁边的便利店等雨小一点", eff:4, fb:"他买了两罐热咖啡，把其中一罐贴了贴你的脸颊：“暖和一下。”"},
      {txt:"后退一步说“不用了，我等我妈来接”", eff:-1, fb:"他拿着伞的手停在半空，然后慢慢收了回去。“嗯，那别站在风口。”"}
    ]},
    { id:4, title:"自习课的耳机", desc:"周三的自习课，教室里安静得只剩下翻书和写字的沙沙声。你忽然感觉后背被轻轻戳了一下。回头，看到李羲承手里捏着一只白色的耳机，正朝你眨眼睛。他凑近一点，压低声音说：“我刚写好的一段旋律，帮我听听？”", opts:[
      {txt:"接过耳机，和他一人一只，认真听完", eff:6, fb:"听完后你在草稿纸上写：“这段副歌特别好听，像春天的风。”他看完后，把那张草稿纸小心地折起来放进了笔袋里。"},
      {txt:"紧张地摇头说“老师会发现的”", eff:0, fb:"你小声拒绝了。但你余光看到他一个人把耳机塞进耳朵，趴在桌上。那节课你再也没法集中注意力。"},
      {txt:"听完后，在本子上认真写了一段反馈递给他", eff:4, fb:"他看得很认真，嘴角慢慢扬起。然后他在你的本子上回了一句话：“这是我第一次给别人听demo，谢谢你的建议。”"},
      {txt:"不小心扯掉了耳机线，音乐外放了出来", eff:-2, fb:"前排的同学纷纷回头。他手忙脚乱地关掉手机，脸涨得通红。"}
    ]},
    { id:5, title:"体育课的篮球", desc:"周四下午的体育课，老师宣布自由活动。你正和闺蜜说着话，突然一颗篮球蹦跳着滚到了你的脚边。你抬头，看到李羲承正朝你这边跑来，额头上还带着亮晶晶的汗珠。", opts:[
      {txt:"捡起球，用力扔给他，并喊道“投得不错嘛”", eff:4, fb:"他单手稳稳接住球，朝你笑了笑。“要不要过来一起打？”"},
      {txt:"把球踢到一边，继续和闺蜜聊天", eff:-1, fb:"他跑过来捡球时，脚步明显慢了一下，然后抱着球默默跑回了球场。"},
      {txt:"抱着球跑过去，说“加我一个”", eff:5, fb:"他明显有些意外，但很快笑了起来，把球传给你。每次你进球，他都比你还开心。"},
      {txt:"站在原地没动，等他过来自己拿", eff:1, fb:"他小跑到你面前，微微喘着气，弯腰捡起球。“谢了。”"}
    ]},
    { id:6, title:"月考后的安慰", desc:"月考成绩单贴在走廊的公告栏上，你数学考砸了，比上次退步了二十多名。你趴在课桌上，把脸埋进手臂里。有人轻轻敲了敲你的桌子。你抬起头，看到李羲承站在你旁边。“我上次数学也考得很差，后来发现是方法不对。要不要我帮你看看错题？”", opts:[
      {txt:"抬起头，挤出一个笑容说“好，谢谢你”", eff:4, fb:"他拉过旁边空着的椅子，在你身边坐下。他一道一道地帮你分析错题。那天放学后，他又给你发了一份自己整理的公式总结。"},
      {txt:"继续趴着，摇了摇头不理他", eff:-2, fb:"等你终于抬起头时，发现桌角多了一颗草莓糖，下面压着一张便签纸，上面写着：“下次会好的。——羲承”。"},
      {txt:"红着眼睛抱怨“数学真的太变态了”", eff:2, fb:"他听完后竟然笑了一下，拿出自己的笔记本给你看，上面密密麻麻全是错题整理。"},
      {txt:"逞强地坐直身体说“我没事，就是昨晚没睡好”", eff:1, fb:"他走开后，你的手机亮了一下，是他发来的消息：“熬夜不好，下次考前一起复习吧。”"}
    ]},
    { id:7, title:"深夜的短信", desc:"晚上十点四十七分，你刚洗完澡准备睡觉，手机屏幕突然亮了起来。是李羲承发来的消息：“睡了吗？新写了一段副歌，卡住了，想问问你的感觉。”下面紧跟着一个音频文件。", opts:[
      {txt:"秒回“快发来，我正好醒着”", eff:5, fb:"你戴上耳机认真听了几遍，然后发了一段长长的语音分析。他听完后回了一句话：“你是我见过最懂我音乐的人。”"},
      {txt:"回复“太晚了，明天再帮你听”", eff:0, fb:"消息发出去后，他回复了一个“嗯”字，然后头像就灰了。第二天你看到他，他似乎想问你什么。"},
      {txt:"开玩笑说“可以啊，咨询费一次一杯奶茶”", eff:3, fb:"他回了一长串省略号，然后发来一个捂脸的表情。“成交。明天午休，我请你喝香芋味的。”"},
      {txt:"太困了，看了一眼消息就睡着了", eff:-1, fb:"第二天早上你才看到消息，赶紧回复道歉。他回了一个“没关系”的表情包，但整个上午都没怎么说话。"}
    ]},
    { id:8, title:"音乐课的点名", desc:"音乐课，崔老师忽然看向你：“上次你写的音乐鉴赏不错，今天上来唱一首？”你还没来得及拒绝，李羲承忽然举手：“老师，我可以帮她伴奏。”全班瞬间安静，然后爆发出一阵起哄声。", opts:[
      {txt:"大方地走上台，选了一首慢板抒情曲", eff:4, fb:"你开口的时候声音有些抖，但李羲承的吉他声稳稳地托住了你。崔老师带头鼓掌：“你们两个的声音很搭啊。”"},
      {txt:"紧张得声音发抖，几乎唱不下去", eff:1, fb:"李羲承放慢了节奏，用吉他轻轻带着你。他在间奏时小声说：“没关系，跟着我。”"},
      {txt:"灵机一动说“老师，我能请李羲承和我合唱吗”", eff:6, fb:"全班再次沸腾。唱完后他小声对你说：“我第一次在课堂上唱歌，你是第一个敢拉我上台的人。”"},
      {txt:"摇头坚决不上台", eff:0, fb:"下课后他经过你身边，轻轻说：“其实你声音很好听，不唱可惜了。”"}
    ]},
    { id:9, title:"公交车上的座位", desc:"首尔的早高峰，公交车里挤得像沙丁鱼罐头。你抓着吊环，随着车子摇摇晃晃。忽然感觉有人拍了拍你的肩膀。李羲承从他好不容易占到的座位上站起来。“你坐吧，”他说，“我快到了。”但他胸前的校牌显示他才刚上车不久。", opts:[
      {txt:"感激地坐下，仰头问他“那你怎么办”", eff:3, fb:"他笑了笑，抓住你旁边的扶手。“站着也能背单词，而且我平衡感很好。”他站了三站路才下车。"},
      {txt:"坚持不坐，按着他肩膀让他坐回去", eff:2, fb:"他顺从地坐了回去，然后从包里拿出一个便携小风扇递给你：“那这个给你，车里太闷了。”"},
      {txt:"开玩笑说“我其实不重，可以坐你腿上吗”", eff:5, fb:"他愣住了，然后从耳朵到脖子都染上了粉色。他结结巴巴地说：“那、那还是你坐吧。”然后提前一站下了车。"},
      {txt:"直接坐下，戴上耳机没有道谢", eff:-1, fb:"你坐下后就开始看手机。他几次想开口说什么，但看到你戴着耳机就放弃了。"}
    ]},
    { id:10, title:"校园祭的舞台", desc:"校园祭是全校最热闹的日子。李羲承和他的乐队“晚风”是压轴表演嘉宾。夜幕降临时，操场上的舞台灯光亮起，他穿着一件简单的白衬衫和黑色长裤，抱着一把浅色的电吉他站在立式话筒前。", opts:[
      {txt:"挤到最前排，用力挥舞荧光棒", eff:4, fb:"演出时他一直在寻找什么，直到目光落在你身上。演出结束后他把拨片塞进你手里：“给你。”"},
      {txt:"站在最后一排，安静地看完表演", eff:1, fb:"演出结束后，你给他发了一条消息：“表演很棒。”他秒回：“你在现场？我没看到你。”"},
      {txt:"演出结束后去后台找他，送上一小束花", eff:6, fb:"他正用毛巾擦汗，看到你拿着花进来，整个人愣住了。“这是我今天收到的最好的礼物。”"},
      {txt:"觉得人太多太吵，提前离场了", eff:-2, fb:"后来他问朋友“她是不是没来”，朋友说好像看到你走了。他沉默了一会儿。"}
    ]}
  ];

  // 补全11-50事件（简化版保持完整性）
 // ============ 事件11-50（完整版） ============
EVENT_POOL.push(
  { id:11, title:"图书馆的偶遇", desc:"期中考试前，图书馆里一座难求。你抱着一摞参考书在书架间寻找空位，终于在靠窗的角落发现一个空桌子，但旁边坐着一个熟悉的身影。李羲承戴着黑色的头戴式耳机，面前摊着一本厚厚的英文原版书，正认真地写着什么。阳光透过百叶窗在他脸上投下细碎的光影。你犹豫了一下，不知道该不该坐过去。", opts:[
    {txt:"轻轻敲桌面问“这里有人吗”", eff:3, fb:"他摘下耳机，抬头看到是你，眼神亮了一下。“没人，”他一边说一边把自己摊开的书往旁边挪了挪，“坐吧。”然后他站起身，帮你从最高的书架上拿下了你够不着的那本参考书。"},
    {txt:"不想打扰他，绕到另一边的空位坐下", eff:0, fb:"你坐在了离他三张桌子远的地方。过了一会儿，他无意中抬头时发现了你。他微微一愣，然后低头继续看书。但后来你发现，他中间出去过一次，回来时在你的桌角放了一瓶香蕉牛奶。"},
    {txt:"把写有“你戴耳机看书的样子很帅”的纸条放在他手边", eff:5, fb:"你迅速放下纸条然后假装看书。余光瞥见他拿起纸条，展开，然后整个人僵住了。他在那张纸条的背面写了什么，推了过来：“你偷看我的样子也很可爱。”"},
    {txt:"抱着的书太多，不小心全砸在他脚边", eff:-1, fb:"巨大的声响打破了图书馆的安静。你窘得满脸通红，蹲下去捡书。他也蹲下来帮忙，手指不经意间碰到了你的手背。“没关系，”他小声说，“我以前也常掉东西。”"}
  ]},
  { id:12, title:"他的生日", desc:"十月十五日，李羲承的生日。你提前一周就开始准备礼物，最后决定送他一盒自己烤的曲奇，虽然卖相一般，但你在每一块上都用糖霜画了一个小小的音符。早上到了学校，你抱着那个精心包装的纸盒，在走廊里来来回回走了好几趟，就是没有勇气走进教室。他正坐在座位上，被几个送礼物的人围着，桌上已经堆了好几个精致的礼品袋。", opts:[
    {txt:"趁他不在时，把盒子放进他抽屉", eff:4, fb:"午休他回来时，发现了那个盒子。他小心翼翼地拆开包装，看到里面的音符曲奇，愣了很久。然后他四处张望，最后在走廊上找到了你。“这是你做的？”他举起一块曲奇，“我不舍得吃了。”"},
    {txt:"深吸一口气，走到他面前递给他", eff:6, fb:"他正在拆别的礼物，看到你过来，放下了手里的东西。“生日快乐。”他接过盒子，当着你的面打开，眼睛瞬间亮了。“这是你自己做的？天哪。”他立刻拿起一块放进嘴里，含含糊糊地说，“好吃。”"},
    {txt:"托朋友转交，不敢自己去", eff:1, fb:"朋友回来告诉你：“他收到后问我'这是谁给的'，我说是你，他笑了一下，然后又问'她为什么自己不来'。”你听完后后悔不已，但已经不好意思再去解释了。"},
    {txt:"因为饼干烤糊了一部分，最后没送出去", eff:-1, fb:"你把那盒烤焦的曲奇塞进了书包最深处。但那天下午，他经过你座位时突然问：“今天是我生日，你不打算表示一下吗？”你支支吾吾说不出话，他有点失望地走开了。"}
  ]},
  { id:13, title:"补习班的同路", desc:"你在学校附近的英语补习班上课，晚上九点才下课。首尔初秋的夜晚已经有些凉意，你背着沉重的书包走出补习班大楼，在路灯下看到一个熟悉的身影靠在墙边。李羲承穿着连帽卫衣，耳朵里塞着耳机，看到你出来，他摘下耳机：“我数学补习班也在附近，刚下课。”但他手指尖有点凉，似乎等了有一会儿了。", opts:[
    {txt:"开心地走过去说“那以后可以一起走了”", eff:4, fb:"他点点头，把耳机分了你一只。“今天老师拖堂，我多等了十分钟。”他漫不经心地说，但暴露了他其实是特意在等你。路上他哼了一段新旋律，说是刚才等的时候想到的。"},
    {txt:"点点头，然后沉默地并肩走", eff:0, fb:"你们安静地走过两条街，偶尔肩膀会碰到一起。他先开口打破了沉默：“你英语学得怎么样？”然后你们聊了一些无关紧要的学习话题，直到在地铁站分开。"},
    {txt:"问他“你经常来这边吗？以前没碰见过”", eff:3, fb:"他摸了摸后颈，有点不自然地说：“嗯……其实我上周看到你来上课，这周就特意算好了时间。”说完他立刻加快了脚步，走到你前面，不让你看他脸上的表情。"},
    {txt:"说“哦”，然后戴上耳机自己走", eff:-2, fb:"你沉浸在自己的音乐里，没注意他放慢了脚步。他跟在后面走了一段路，后来拐进了另一条巷子。第二天他发消息说：“昨晚路上不太安全，本来想送你回家的。”"}
  ]},
  { id:14, title:"窗边的座位", desc:"新学期换座位，你被分到了靠窗的位置。坐下后你发现，斜前方坐着的是李羲承。他坐在你左前方两个位置，靠窗，阳光正好打在他的桌面上。他上课时偶尔会托着腮看向窗外，春天外面有一棵樱花树，花瓣偶尔会飘进来，落在他的肩上。他有个习惯，思考问题时会用手指轻轻敲桌面，像在打节拍。", opts:[
    {txt:"用铅笔在课本空白处画下他的侧影", eff:4, fb:"你画得很认真，连他耳后的碎发和校服领口的弧度都画了下来。下课时他路过你座位，无意中瞥见了那幅画。“这是我？”他弯下腰仔细看，“画得真好……能送给我吗？”"},
    {txt:"趁他不注意，偷偷用手机拍了一张", eff:1, fb:"你忘了关闪光灯。白光一闪，周围几个同学都看了过来。他转过头，看到你举着手机，先是一愣，然后嘴角微微扬起。“要拍就光明正大地拍嘛，”他说，“需要我摆个姿势吗？”"},
    {txt:"写了一张纸条问“你上课在想什么”传给他", eff:5, fb:"纸条传到他手里时，他展开看了一眼，然后提笔写了好一会儿。纸条传回来时，上面多了一段五线谱，旁边写着：“在想这段副歌。你觉得怎么样？”你在下面画了一个笑脸和一颗星星。"},
    {txt:"专心听课，不看他", eff:0, fb:"你努力把注意力集中在黑板上，但余光总是不自觉地往左前方飘。你不知道的是，他偶尔也会趁老师写板书时，微微侧头，用余光看你。"}
  ]},
  { id:15, title:"运动会接力", desc:"五月运动会，天气已经开始热了。班级接力赛是压轴项目，李羲承被安排在最后一棒。他站在起跑线上，穿着印有班级号码的运动背心，露出线条匀称的手臂，正做着简单的热身。你站在跑道内侧的加油区，手里紧紧攥着一瓶水。发令枪响，各班选手飞奔而出。到第四棒时你们班落后第二名大概十米。他接过棒，像离弦的箭一样冲了出去。经过你身边时，他似乎看了你一眼。", opts:[
    {txt:"用尽全身力气大喊“李羲承加油！！”", eff:5, fb:"你的声音在嘈杂的运动场上格外清晰。他在最后五十米突然加速，超过了前面的选手，第一个冲过了终点线。整个班级沸腾了。他喘着气，在人群中找到你，笑着朝你竖了个大拇指。"},
    {txt:"双手紧握在胸前，在心里默默祈祷", eff:2, fb:"他追平了第二名，班级拿了亚军。赛后他有些遗憾地坐在地上，你走过去把水递给他。他抬头看你，接过水喝了一口：“刚才我好像听到有人在喊我，是你吗？”"},
    {txt:"在他经过时，伸手把水递给他", eff:4, fb:"他接过水，边跑边喝了一口，然后加速冲刺。虽然最终只拿了第二，但他赛后找到你，把空水瓶还给你，笑着说：“谢谢你的水，这是幸运水。”"},
    {txt:"太阳太晒，你躲到了树荫下", eff:0, fb:"你错过了他最精彩的冲刺。等他跑完，在人群里四处张望时，你才从树荫下走出来。他后来问你：“刚才你在哪儿？我找了好久。”你含糊地说在树荫下，他有点失落地“哦”了一声。"}
  ]},
  { id:16, title:"天台上的吉他", desc:"午休时间，你想找个安静的地方背英语单词，推开了教学楼天台的门。风有点大，吹得你的头发乱七八糟。然后你听到了吉他声。李羲承坐在角落的旧长椅上，背靠着墙壁，腿翘在椅子扶手上，抱着一把原木色的民谣吉他，正轻声哼唱着什么。看到你推门进来，他停了下来，摘下一边耳机，朝你扬了扬下巴：“这里是我先发现的秘密基地。”", opts:[
    {txt:"坐到他旁边的空位上，问他“在唱什么歌”", eff:5, fb:"他把吉他微微倾斜过来，让你能看到琴弦。“一首还没写完的歌。”他轻声哼了副歌部分，词是：“天台的风知道，我有一句话没说出口。”唱完他有些不好意思地看了你一眼。"},
    {txt:"站在门口，远远地听了一会儿", eff:2, fb:"他弹完后，发现你还站在原地，便朝你招了招手。“进来啊，外面风大。”你走过去，他拍了拍旁边的位置，把校服外套叠起来垫在长椅上：“坐这儿，不脏。”"},
    {txt:"说“风太大，我下去了”", eff:0, fb:"他拨弦的手顿了一下。“嗯，别感冒了。”你关上门的时候，听到吉他声又响了起来，但旋律比刚才更慢了，带着一点忧伤。"},
    {txt:"走过去，鼓起勇气和他一起哼唱", eff:6, fb:"你的声音和他的旋律融合在一起，被风吹散在天台上空。一曲结束，他放下吉他，认真地看着你：“你的声音真的很好听。我们下次可以一起录一首歌吗？”"}
  ]},
  { id:17, title:"美术课的素描", desc:"美术课，老师让大家分组画人像速写。你被分到和李羲承一组，他坐在你对面，拿着速写本，正认真地打量你。“别动啊，”他说，铅笔在纸上发出沙沙的声音。你也开始画他，他专注时眉毛会微微蹙起，嘴唇抿成一条线，偶尔抬起头看你一眼，又迅速低头，好像怕被你发现在偷看你。教室里很安静，只有铅笔划过纸面的声音和窗外偶尔传来的鸟叫声。", opts:[
    {txt:"认认真真画他，每一根头发丝都不放过", eff:4, fb:"二十分钟后，你画出了一幅相当逼真的肖像。他接过去看了很久，然后说：“原来我在你眼里是这样的。”他在你画的右下角签了自己的名字，然后把自己的画递给你。他画的你特别细致，连你耳后的一颗小痣都画出来了。"},
    {txt:"故意把他画成带着花环的童话人物", eff:3, fb:"他拿过你的画，先是一愣，然后噗嗤笑了出来。“这是什么啊，我头上这圈花是认真的吗？”他笑得上气不接下气。然后他在你的画旁边写了一行字：“花环留着，下次音乐节戴。”"},
    {txt:"随便画了几笔，敷衍了事", eff:0, fb:"他看到你的画时，脸上的笑容有点勉强。“嗯……挺抽象的。”他把自己的画递给你——那是一幅很用心的素描，连光影都处理得很细腻。对比之下你有点不好意思，低声说了句抱歉。"},
    {txt:"提议说“不如让我画你弹吉他的样子”", eff:5, fb:"他眼睛一亮，真的从教室角落拿了一把练习用的吉他，摆了个姿势。他坐在窗边，阳光落在他肩膀上。你说这是他收过的最酷的画，他说要把这张装裱起来挂在家里。"}
  ]},
  { id:18, title:"寒假前的约定", desc:"期末考结束，寒假在即。学校走廊里大家都在交换新年祝福，空气里弥漫着即将放假的轻松感。你正收拾柜子，李羲承走过来靠在旁边的墙上，手里玩着耳机线，绕了一圈又一圈。“寒假你有什么计划？”他问，装作不经意的样子，但手指绕耳机线的速度暴露了他的紧张。外面开始飘起了小雪花，有几片落在走廊的窗台上，很快融化成了小水珠。", opts:[
    {txt:"反问他“你呢，有什么安排”", eff:3, fb:"他说会在家写歌，偶尔去弘大的练习室。“如果你无聊，可以来找我，”他从口袋里掏出手机，“我请你喝那家新开的奶茶店，他们的香芋味据说很好喝。”他记下了你的号码，说会发定位给你。"},
    {txt:"说“可能就宅在家追剧吧”", eff:1, fb:"他若有所思地点点头，然后从包里拿出一个本子：“那我可以给你发我写的demo吗？你帮我听听。寒假那么长，我肯定会写很多。”那个寒假，你的手机里渐渐存满了他发来的音频片段，每一段都有编号和日期。"},
    {txt:"半开玩笑说“怎么，你想约我吗”", eff:5, fb:"他被你的直球打得措手不及，耳朵瞬间通红。“嗯……是有这个打算。”他低声承认，然后立刻转移话题，“外面下雪了，好大的雪。”他狼狈地转身去看窗外，背影写满了“我刚才说了什么”。"},
    {txt:"说“寒假很短，一眨眼就过去了”", eff:-1, fb:"他张了张嘴，把本来要说的话咽了回去。“也是。”他直起身，把耳机塞进耳朵，朝你摆摆手就走了。你后来从他的寒假demo里听到一句歌词：“冬天太短，来不及说出口的话就留在雪里。”"}
  ]},
  { id:19, title:"学生会竞选", desc:"李羲承竞选学生会文艺部长。他的竞选海报贴满了走廊，是他自己设计的——深蓝色背景上画着一把吉他和一串五线谱，最下面写着一行字：“让音乐成为我们共同的语言。”竞选演讲安排在周五下午的礼堂，他站在台上时，下面一阵骚动。他清了清嗓子，开口却意外地沉稳，谈了他对学校文艺活动的想法，还现场清唱了一小段校歌改编版，赢得了满堂掌声。你坐在台下第二排，看到他紧握话筒的手微微发抖，但表情很坚定。", opts:[
    {txt:"拼命鼓掌，还站起来带头叫好", eff:4, fb:"你可能是全场反应最热烈的人。他下台后径直朝你走来，额头上还带着细汗，有些不好意思地问：“我刚才是不是表现得很紧张？”你告诉他完全看不出来，台风很稳。他松了一口气，然后被其他同学拉去庆祝了。"},
    {txt:"在台下默默朝他竖了个大拇指", eff:2, fb:"他看到你的手势，演讲中一度卡壳了一秒，但很快调整了过来。下台后他发消息问：“你刚才是不是朝我竖拇指了？我看到的时候差点忘词，但还是挺开心的。以后我上台你都得坐第二排。”"},
    {txt:"会后给他写了张小纸条，提了一个小建议", eff:3, fb:"纸条上写着：“演讲很棒，但如果你中间加一点和台下互动会更好。”他收到后认真看了，还特意在走廊拦住你讨论细节。后来他真的在最终选举中用了你的建议，高票当选。"},
    {txt:"觉得他肯定能选上，没怎么在意", eff:0, fb:"他成功当选后，在人群里扫了一圈，似乎想找谁。你的朋友推了推你：“他好像在找你。”但你正低头看手机，等他走过来时，你已经和朋友离开了礼堂。"}
  ]},
  { id:20, title:"秘密基地的分享", desc:"放学后，李羲承神秘兮兮地说要带你去一个地方，但让你保证不告诉别人。他领着你穿过操场后面的小树林，拨开几根低矮的树枝，来到一个废弃的园艺亭。亭子有些旧，白色的漆已经斑驳，但被他打扫得很干净，角落里放着一把旧木吉他和一个厚厚的笔记本。地上甚至铺了一块旧毯子。“这是我的秘密基地，”他有些不好意思地摸着后颈说，“写不出歌的时候我就来这里。你是第一个知道这个地方的人。”远处的夕阳正缓缓下沉，把整个天空染成橘红色。", opts:[
    {txt:"惊喜地说“这是我们的秘密了，我不会告诉任何人”", eff:5, fb:"他在亭子的木柱上用小刀刻了两个小小的字母，又立刻用手掌抹掉了。“其实我从来没带别人来过，”他说，“你是第一个，也是唯一一个。”然后他拿起那把旧吉他，在夕阳下为你弹了一首自己写的曲子，旋律里全是温柔。"},
    {txt:"帮他整理了一下亭子里的杂物", eff:4, fb:"你蹲下来把散落的纸张捡起来理好，都是他写的曲谱草稿，有些上面还有咖啡渍和涂改的痕迹。他说：“你不用做这些，这里本来就乱。”但你整理完后，他安静了几秒，说：“以后你想来可以随时来。就算我不在，这里也算是你的秘密基地了。”"},
    {txt:"被蚊子咬了好几个包，有点受不了", eff:1, fb:"你不停地挠腿，他看到后立刻从包里翻出驱蚊水递给你。“这里就是蚊子多，”他不好意思地说，“我下次带蚊香来。”虽然被咬得不轻，但看到他愧疚的表情，你心里是愿意再来的。"},
    {txt:"看了看觉得没什么特别的，说“得回去了”", eff:0, fb:"他的笑容淡了淡，把刚拿到手里的吉他放了回去。“嗯，走吧。”他走在前面为你拨开树枝，一路上没说太多话。后来你再也没被他带去那里，只是偶尔在天台上看到他在那个方向发呆。"}
  ]},
  { id:21, title:"丢失的乐谱", desc:"早上，李羲承在教室里翻箱倒柜，把书包里的东西全倒了出来，表情越来越焦急。周围的同学问他怎么了，他说一份很重要的乐谱不见了——那是他准备参加市里比赛用的原创曲子，手写稿，没有任何备份。他找了整个教室都没找到，额头上开始冒汗，嘴唇抿得发白。有人提议他重新写，他摇头说：“有些旋律是即兴写上去的，我自己都未必能完全还原。”", opts:[
    {txt:"放下手里的事，帮他在全教室搜索", eff:5, fb:"你蹲下身子检查每一排的抽屉缝隙，最后在暖气片背后的角落里找到了那张被风吹落的稿纸。你举着它喊了一声，他跑过来，接过稿纸时整个人如释重负，手指都在微微发抖。“太谢谢你了，”他说，“这是我三个月的成果。”"},
    {txt:"问清楚乐谱的样子，组织其他同学一起找", eff:4, fb:"你描述了他的乐谱特征——浅黄色的五线谱纸，边角有点卷——发动了七八个同学一起找。最后在音乐教室的钢琴凳下面找到了。他感激地看着你，在众人面前朝你微微鞠了一躬。后来他把获奖的奖杯拍照发给你，说“这个奖杯有你一份功劳”。"},
    {txt:"说“我不知道，没看见”", eff:0, fb:"他失望地继续翻找，最后在上课铃响后无奈地放弃了。那天他上课时明显心不在焉，一直在转笔。后来你才知道，他最后在书包的夹层里找到了乐谱——是他自己忘了放哪里了。"},
    {txt:"觉得他太粗心，忍不住说了句“自己的东西要收好”", eff:-1, fb:"他本来就急，被你一说，脸色更加不好看。“我知道，”他语气有点冲，然后放软了声音说，“对不起，我不是在凶你，就是太着急了。”但你们之间的气氛还是冷了几个小时。"}
  ]},
  { id:22, title:"钢琴比赛", desc:"市里的青少年钢琴比赛在周六下午举行。你犹豫了好几天，最终还是一个人坐地铁去了艺术中心的音乐厅。你坐在后排角落，心跳得比自己考试还快。李羲承穿着黑色的西装，坐在那架巨大的三角钢琴前，聚光灯落在他身上，整个人看起来像在发光。他弹的是一首自己创作的曲子，旋律里有种干净的忧伤，中间有一段忽然明亮起来，像是阴天忽然放晴。你听呆了，直到最后一个音符消散在空气里，全场爆发出掌声，你才意识到自己一直屏着呼吸。", opts:[
    {txt:"比赛结束后到后台找他，亲口告诉他太棒了", eff:5, fb:"后台很多人围着他，有评委在和他说话。但他看到你时，跟评委说了句“失陪一下”，拨开人群走了过来。“你怎么来了？”他的声音里带着惊喜。你说他的演奏让你差点哭了，他愣了一下，然后轻轻抱了你一下。“谢谢你来。”"},
    {txt:"在观众席默默鼓掌，没有让他知道你来了", eff:3, fb:"他后来在社交媒体上发了比赛照片和银奖奖杯，你在下面评论“表演很棒”。他秒回：“你在现场？我没看到你。”你私信他一张从后排拍的模糊照片，他回了一长串感叹号。"},
    {txt:"因为补习班冲突没去成，但看了直播", eff:1, fb:"你只能偷偷用手机看直播，信号卡了好几次，你急得不行。他得了银奖后第一时间发消息给你：“我今天有点紧张，弹错了一个音，但评委说整体很好。”你说“看直播了，很棒”，他回了一个开心的表情。"},
    {txt:"完全不知道有比赛这回事", eff:-2, fb:"周一上学时，他特意带了奖杯来学校，放在桌角最显眼的位置。你路过时随口问了一句“这是什么”。他顿了一下，慢慢地说：“没什么，周末参加了一个比赛，得了银奖。”然后他把奖杯收进了书包。"}
  ]},
  { id:23, title:"街头表演", desc:"周六下午，你路过弘大商圈，在熙熙攘攘的人群中听到一阵熟悉的歌声。挤进人群，看到李羲承和他的乐队成员正在街头表演。他穿着简单的黑色卫衣和牛仔裤，抱着一把电吉他站在人群中央，面前摆着打开的琴盒，里面已经有了一些零钱和几张写着留言的便签。他唱的是自己写的歌，声音通过便携音箱传出去，周围聚了不少人，还有人举着手机在录像。他额头上挂着汗珠，但笑容灿烂，偶尔和贝斯手对视笑一下，完全沉浸在音乐里。", opts:[
    {txt:"站在人群第一排，跟着节奏晃，直到演出结束", eff:4, fb:"演出结束后他在收拾线缆，抬头看见了你。他咧嘴一笑，把吉他放进琴盒，快步走过来。“你怎么在这儿？刚才都没看到你。”他的嗓子有点哑，但声音里全是开心。旁边乐队的贝斯手吹了声口哨，他回头瞪了那人一眼。"},
    {txt:"等一首歌结束，弯腰在琴盒里放了一些钱", eff:3, fb:"他认出你的手，抬头看见你时哭笑不得，弯腰把钱捡起来塞回给你：“你干嘛。不要你的钱，要请就请我吃饭。”周围的朋友开始起哄，有人喊“嫂子”，他的耳朵瞬间红了，但没有反驳。"},
    {txt:"远远看完表演，没让他发现", eff:1, fb:"你站在人群的最后面，踮着脚尖看完了一整首歌。他后来在聊天群里发了一张现场照片，问“有人路过弘大吗”，你没有说话，但把那张照片存进了手机相册。后来他私聊你：“你是不是来了？贝斯手说好像看到你了。”"},
    {txt:"觉得人太多，匆匆走了", eff:-1, fb:"他在表演间隙扫视人群时，似乎看到了一个熟悉的背影。后来他发了一条动态：“今天在弘大，好像看到了一个认识的人。但一转眼就不见了。”你不知道他说的那个人是不是你。"}
  ]},
  { id:24, title:"高考倒计时", desc:"黑板上的倒计时变成了100天。班级气氛明显紧张起来，每个人都在埋头苦读，连课间聊天的人都少了。课间，你正在整理笔记，感觉前面有人转过身来。李羲承反坐在椅子上，双臂交叠在椅背上，看着你发呆，直到你抬起头他才回过神。他清了清嗓子，问：“你……想考哪所大学？”他的手指无意识地敲着桌面，节奏是他上次弹过的某段旋律。你注意到他的笔记本上画满了五线谱，旁边潦草地写着几所大学的名字。", opts:[
    {txt:"认真说出自己的目标，然后反问他", eff:4, fb:"他说了一个有音乐系的大学，在首尔。“如果你也考首尔的学校，”他顿了顿，在草稿纸上画了一条线，把两个校名连在一起，“我们还能经常见面。地铁只要半小时。”他说这话时没有看你，只是盯着纸上那条线。"},
    {txt:"说“还没想好，很迷茫”", eff:1, fb:"他点了点头，在本子上写了几个字，然后撕下来递给你。上面写着几所大学的名字和往年分数线，旁边还标注了“文科”和“理科”。“我帮你查过，”他说，“这几所你的成绩差不多能够到。”你有些惊讶，他什么时候做的这些功课。"},
    {txt:"反问他“你会去首尔吗”", eff:3, fb:"他说：“会。首尔有更好的音乐资源。”然后他像是鼓足了勇气，盯着你的眼睛问：“首尔很大，但如果我们都考过去了，应该不会走散吧？”你用点头回答了他。"},
    {txt:"说“考大学是你自己的事，别管我”", eff:-3, fb:"话一出口你就后悔了。他愣了一下，嘴角的弧度消失了，然后轻声说：“知道了。”他转回身去，把草稿纸上画的连线用力涂掉了。那节课他再也没回头。下课后你看到他的草稿纸上写满了凌乱的音符。"}
  ]},
  { id:25, title:"争吵后的冷战", desc:"因为一个小误会，你和李羲承已经两天没说话了。起因是你和其他男生在讨论小组作业时说了句玩笑话，他路过时听到了后半句，脸色就变了，转身走了。你追上去解释过，但他只说“没事”。现在你们之间的气氛像是结了冰。他不再给你发demo，午休也不在你们常碰到的位置坐，连作业本不小心碰到一起都会各自迅速抽开。朋友夹在中间左右为难，问你俩怎么了。", opts:[
    {txt:"写一封诚恳的长信，夹在他的课本里", eff:5, fb:"第二节课后，他看完信，午休时走到你座位旁，拉了把椅子坐下。“是我太小气了，”他说，声音有些哑，“这两天没和你说话，我写歌都没灵感。”你们和好了，他还主动把新写的旋律放给你听。"},
    {txt:"等他先开口，绝不低头", eff:0, fb:"冷战持续到了第四天。最终是朋友看不下去，把你们一起拉到天台，锁上门说“你俩不说明白别想下去”。他这才开口说了第一句话：“你那天说的那句话，到底是什么意思？”"},
    {txt:"故意和其他人大声说笑，想引起他注意", eff:-1, fb:"你的笑声在他听来格外刺耳。他站起身，把椅子往后一推，头也不回地走出了教室。你赢了面子，但看到他离开的背影，心里比冷战还难受。"},
    {txt:"让朋友帮忙传话", eff:2, fb:"朋友成了传话筒，来来回回带了几轮话，意思全变了。最后他忍不住直接走到你面前：“能不能我们当面说？再让第三个人传话，我连你原本的语气都听不到了。”"}
  ]},
  { id:26, title:"白色情人节", desc:"3月14日，白色情人节。早上一进教室就闻到甜腻的糖果味，走廊里能看到女生们三三两两地交换礼物。李羲承的桌上堆了一小堆礼物，各种包装的糖果和巧克力，还有一个扎着丝带的蓝色盒子。但他似乎不太在意这些，只是把礼物收进袋子放在脚边，然后往你的方向看了看。你的书包里揣着昨晚包装到凌晨的巧克力，盒子外面画了几个歪歪扭扭的音符。手心有些出汗。", opts:[
    {txt:"走到他面前，把巧克力递给他", eff:6, fb:"他放下手里的袋子，郑重地双手接过你的巧克力。“我还以为你不打算给了，”他说，然后从口袋里拿出一个小盒子，“这是给你的。”里面是一条细银色的手链，上面坠着一个小小的音符吊坠。"},
    {txt:"趁他不注意，把巧克力混在他那堆礼物里", eff:4, fb:"后来他挨个问礼物是谁送的，问到你这儿时你绷不住笑了。他指着你的鼻子说：“我就知道是你，这个包装纸我见过，你上次手工课用的就是这个颜色的纸。”他说作为惩罚，放学后要陪他去吃炒年糕。"},
    {txt:"问他“收到这么多礼物，很开心吧”", eff:2, fb:"他看着你，手里拿起那些礼物又放下。“多有什么用，”他说，声音轻得像在自言自语，“我只想要一个人的礼物。”然后他期待地看着你，等了好几秒。你没有接话，他最后勉强笑了笑。"},
    {txt:"什么都没准备", eff:0, fb:"他看到你空手走过来，眼神暗了一下，但很快恢复了平时温和的表情。他分了一些别人给的糖果给你，用纸包好放在你桌上：“给你，反正我也吃不完。”你不知道这是不是他表达失落的方式。"}
  ]},
  { id:27, title:"模拟考后的崩溃", desc:"模拟考成绩贴在公告栏上。你从人群缝隙里看到自己的排名，比上次退步了三十多名。你一个人坐在操场边的长椅上，手里攥着成绩单，纸被捏出了褶皱。远处的篮球场上有学生在打球，笑声传过来，但你觉得隔了很远。眼眶有点发热，你仰起头试图把眼泪逼回去。一阵脚步声靠近，有人在你旁边的位置坐下。李羲承手里拿着两罐咖啡，把其中一罐冰凉的咖啡轻轻贴了贴你的脸颊，然后放在你手边。他没有问成绩，也没有说任何安慰的话，只是坐在那里，安静地陪你看远处跑步的人。", opts:[
    {txt:"接过咖啡，忍不住哭了出来", eff:4, fb:"他没有打断你，也没有说“别哭了”之类的话。他只是安静地坐在旁边，等你抽泣声渐渐小了，才把纸巾递过来。“我上次考砸的时候，你帮我分析了错题，讲了整整一个午休。这次换我帮你。”他的声音很平，却让你在风中慢慢安定下来。"},
    {txt:"用力擦掉眼泪，逞强说“我没事”", eff:1, fb:"他没有戳穿，只是把咖啡打开，插好吸管推到你手边。他把自己的成绩单也拿了出来——其实他数学也没考好，比你低了十分。“你看，我也很惨。但我们还有下次。”"},
    {txt:"把成绩单揉成一团扔在地上", eff:0, fb:"他弯腰把纸团捡起来，展开，用手掌抚平褶皱，认真地叠好放进自己校服口袋。“下次我们一起复习，我帮你押题。我押题挺准的，上次押中了三道。”他说这话时语气很认真。"},
    {txt:"朝他发脾气说“你别管我”", eff:-2, fb:"他站起身，退后了一步。“好。”他走开了。你后悔的时候，他已经走到操场那头了。那天晚上他给你发了一长串数学重点整理，附加一句：“不管你需不需要，我都发你了。晚安。”"}
  ]},
  { id:28, title:"失眠的夜晚", desc:"凌晨一点，你因为考试压力失眠，在床上翻来覆去。窗外偶尔有一辆车驶过，灯光扫过天花板又消失。你拿起手机，在社交媒体上发了一条动态：“这个点还有没睡的人吗？”发出去不到一分钟，私信图标亮了一个红点。李羲承发来消息：“你也失眠？”他的头像亮着，显示在线。你的手指在屏幕上停了两秒。", opts:[
    {txt:"和他聊音乐，他发来一段刚录的助眠钢琴曲", eff:3, fb:"是一段缓慢的钢琴旋律，没有歌词，只有温柔的和弦。他说这是他睡不着的时候弹给自己听的。“这首以后就叫「给失眠的人」。”你戴上耳机循环了几遍，眼皮真的开始发沉。"},
    {txt:"问他“你怎么也没睡，在写歌吗”", eff:4, fb:"他说对，在写一首关于夜晚的歌，正好卡在第二段副歌，怎么改都不满意。“你失眠，我写歌，我们都和夜晚有缘。”他开了句玩笑，然后问你要不要当他新歌的第一个听众。"},
    {txt:"半真半假地开玩笑说“该不会是想我想得睡不着吧”", eff:5, fb:"消息发出去后他沉默了整整两分钟。你看着“正在输入”的提示亮了又灭，灭了又亮。然后他回复：“……可能吧。”后面跟了一长串撤回的提示，最后只剩一条：“刚才那条当我没发。你早点睡。”但你已经截图了。"},
    {txt:"没回复，假装已经睡了", eff:-1, fb:"他看着你的头像灰下去，等了好一会儿，也下了线。第二天他问你昨晚是不是发过动态，你说没有。他若有所思地点点头，说：“我昨晚失眠，还以为是感应到你了。”"}
  ]},
  { id:29, title:"毕业前的同学录", desc:"毕业典礼前一天，教室里弥漫着淡淡的离愁。有人开始往空桌子上放零食，有人在互写同学录，还有人偷偷用手机拍教室的每个角落。你的那张粉色的同学录纸传到了李羲承手里。他趴在桌上，拿着笔，写了好久好久——久到别人的都写完了、传了一圈了，他还在写。你远远看着他认真的侧脸，他偶尔停下来思考，笔尾轻轻敲着下巴，然后继续落笔。最后，他在纸的最下面画了一架小小的钢琴，音符从琴键上飘起来。", opts:[
    {txt:"让他第一个写，然后认真看他的留言", eff:4, fb:"他写了满满一整面。从高一的某个清晨你在琴房门口偷听开始，到高二体育课上那颗滚到你脚边的篮球，再到高三晚自习传来的每一张纸条。最后他写道：“以后不管去了哪里，我的歌都会先发给你听。这个承诺不过期。”你在那行字旁边画了一颗心。"},
    {txt:"写完后，问他“写了什么，能念给我听吗”", eff:5, fb:"他死活不肯念，把同学录捂在胸口，整个人往后退了半步。“你以后自己看！现在念出来我会死的。”你们抢了半天，最后他小声说：“就是一些……以后会想你的话。”然后他松开手，把同学录轻轻推回你面前。"},
    {txt:"让他签了个名，就收回来了", eff:0, fb:"他看你匆匆收走，拿着笔的手有些失落地悬在半空。“就……签名？”他问。你点点头。他沉默了一秒，在签名旁边飞快地补了一句“Best wishes for the best listener”，然后笑了笑。"},
    {txt:"说“同学录不重要，不想写了”", eff:-2, fb:"他看着你把自己的同学录纸抽走，把自己写了一半的内容轻轻划掉，折起来放进抽屉。后来那张纸被他夹在了毕业证书里，上面写了什么，你从不知道。只知道他划掉的字迹下面，隐隐约约能看到一个爱心。"}
  ]},
  { id:30, title:"毕业典礼的眼泪", desc:"毕业典礼。礼堂里回响着校歌，所有人穿着统一的校服，戴着毕业帽，坐在一排排椅子上。有人已经开始偷偷抹眼泪。李羲承作为毕业生代表上台发言，他穿着熨烫整齐的白衬衫，站在话筒前，声音通过音响传遍整个礼堂，微微发颤。他感谢了老师，感谢了同学，最后他顿了顿，说：“还有一个人，我想特别感谢。是你让我知道，我的音乐可以被听见。你是我这三年来最忠实的听众。谢谢你。”他没有说名字，但你的心猛地收紧了。典礼结束后，大家开始拍照、拥抱、交换礼物，空气里全是眼泪和笑声。", opts:[
    {txt:"穿过人群找到他，送他一束花", eff:5, fb:"你举着那束勿忘我，在混乱的人群中挤到他面前。他接过花，低头看了很久，再抬头时眼眶明显红了。“我以为你今天不会来。”然后他轻声问能不能抱一下。那个拥抱很短，但你靠在他胸口时听到了他急促的心跳声。"},
    {txt:"远远看着被同学围住的他，悄悄哭了", eff:3, fb:"你没有上前，只是站在角落里，眼泪一颗颗掉在校服裙摆上。他似乎从人群的缝隙中看到了你，想走过来，但被拉去合影的同学拦住了。后来那张毕业照里，他站在你后面不远。"},
    {txt:"让他把毕业帽借你戴，拍了一张照片", eff:4, fb:"他把帽子摘下来戴在你头上，有点大，歪了。他伸手帮你调整角度，手指轻轻擦过你的额发。“以后没有我在后面踢你椅子了。”他笑着说，但你看到他喉结滚动了一下。"},
    {txt:"提前离开了，没有道别", eff:0, fb:"你觉得场面太伤感，在典礼结束前就悄悄从侧门离开了。他后来发消息问你在哪儿，你一直没有回复。那张毕业证书的空白处，他本来想让你签名的位置，最终空着。"}
  ]}
);
  { id:31, title:"去首尔的火车", desc:"毕业后暑假，你一个人买了KTX车票去首尔散心。找到自己的座位后，你靠窗坐下，看着窗外飞速后退的田野发呆。列车开动几分钟后，有人轻轻点了点你的肩膀。你抬头，李羲承站在过道里，穿着一件白色的T恤，头发稍微长了一些，肩上搭着一个帆布包。“旁边有人吗？”他指了指你身边的空位。但你知道他家在另一个方向，这趟车是往北开的，不该有他。", opts:[
    {txt:"惊喜得差点叫出声，问他怎么在这趟车上", eff:5, fb:"他坐下后不好意思地承认：“在群里看到你说买了今天的车票，我退了自己那张票重新买了这趟。反正我也想去首尔看看那边的音乐学院。”他把耳机分了你一只：“路上要两个小时，我给你听我新写的曲子。”"},
    {txt:"淡定地问“你也去首尔？”", eff:2, fb:"他点点头，把帆布包放在膝盖上。你们聊了一路，从未来的大学聊到新的音乐计划。他在手机上给你看了自己整理的“首尔必去音乐场所”清单。下车时他自然地帮你拎了行李，走出首尔站时，他说：“这次，不是偶然。”"},
    {txt:"开玩笑说“你该不会是跟踪我吧”", eff:3, fb:"他被你问得呛了一下，狼狈地摆手解释：“不是！就是刚好看到你在朋友圈晒了车票截图！”他说漏嘴后立刻捂住嘴巴，耳朵红了一片。你看着他窘迫的样子笑了很久，他嘟囔说“你再笑我就换车厢了”，但一直没动。"},
    {txt:"戴上耳机，假装不认识", eff:-1, fb:"他站在过道里等了几秒，看你没有反应，最终默默转身找了自己的座位。他坐在车厢的另一头，隔了五六排。你从座椅缝隙里看到他偶尔往你的方向看一眼，但一直到终点站都没有再走过来。后来他再也没提过这件事。"}
  ]},
  { id:32, title:"教室里的涂鸦", desc:"周五下午值日，你负责擦黑板。擦之前你看到黑板上还有上节课老师留下的板书，你突发奇想，用粉笔在角落画了一只打盹的小猫——圆圆的脑袋，眯成线的眼睛，还有一条弯弯的尾巴。你正歪着头欣赏自己的作品时，李羲承从后门走进来，肩上搭着校服外套，手里拿着刚打完篮球喝了一半的水瓶。他走到黑板前看了看你的画：“画得不错嘛，”他评价道，然后拿起另一支蓝色粉笔，在旁边画了一个弹钢琴的火柴人，火柴人前面画了几条歪歪扭扭的五线谱。", opts:[
    {txt:"给火柴人旁边写上他的名字", eff:4, fb:"他看到后，在名字旁边画了个箭头，写下“天才音乐家”，然后自己先忍不住笑出了声。你们在黑板上合作了一大片涂鸦，猫旁边多了鱼，火柴人旁边多了音符，直到值日组长推门进来骂人。他一边擦黑板一边说：“下次我们在纸上画，画好了我贴琴房里。”"},
    {txt:"把他的火柴人擦掉", eff:-1, fb:"你的手比大脑快，火柴人消失了。他拿着粉笔的手顿了一下，然后轻轻把粉笔放回粉笔槽，把手插进口袋。“擦干净吧，马上要检查了。”他语气平淡，但没有再拿起粉笔。后来你再也没见过他在黑板上画画。"},
    {txt:"在火柴人和小猫之间画了一颗小爱心", eff:6, fb:"你弯腰画那颗爱心时，他站在你旁边没有说话。等你画完直起身，发现他在那颗爱心旁边，用蓝色粉笔也画了一颗完全对称的心。然后他把粉笔递给你，手有点抖：“画得很好。就是猫比我火柴人可爱多了，不公平。”那天黑板你舍不得擦。"},
    {txt:"掏出手机拍下来留念", eff:3, fb:"你拍完把照片发给了他。他收到后回了一个笑脸，然后把这张照片设成了和你的聊天背景。很久以后他换了手机，但你在清理聊天记录时发现，这张照片一直存在你们最初的聊天记录里，从未被删除。"}
  ]},
  { id:33, title:"他的第一首单曲", desc:"暑假的某个深夜，你刷新社交平台时，看到李羲承发布了他的第一首完整原创单曲。歌名叫《天台的风》，封面是他自己画的——一个火柴人坐在天台边缘，旁边放着一把吉他。你戴上耳机点开，前奏是吉他独奏，然后他的声音加进来，干净而温柔。编曲中有一段旋律非常熟悉，你听了很久才意识到——那是他曾经在自习课上从身后递给你耳机让你听的那段demo。歌词里有一句你反复听了好几遍：“你经过琴房时的脚步，我分得出。轻重缓急，每一步都是节奏。”评论区有人说这歌词太具体了，像在写某个人。", opts:[
    {txt:"把链接转到班级群里，号召大家支持", eff:4, fb:"他私信你说“太夸张了吧，别转”，但语气里全是藏不住的开心。那首歌的播放量一天内翻了好几倍。他专门发了一条动态感谢“所有帮忙转发的人”，你知道那里面特别包括你，因为他给你的私信里多了一句“尤其是你”。"},
    {txt:"私信问他“这首歌里写的人，是我吗”", eff:5, fb:"他过了很久才回复，久到你以为他不会回了。然后消息来了：“听出来了？”接着他立刻撤回了那条，换成一句更官方的“欢迎大家自由解读”。但那个撤回的瞬间已经被你看到了。你没有追问，只是把这首歌循环了一整天。"},
    {txt:"默默循环播放了很多遍，没有告诉他", eff:3, fb:"你不知道他知道。后来年末的时候，他偶然看到你的年度听歌报告——那首歌你听了三百多次，是年度播放次数最高的一首。他给你发了一张截图，下面写了两个字：“原来是你。”你盯着那两个字看了很久，回了一个“嗯”。"},
    {txt:"觉得一般，听了半首就关了", eff:-2, fb:"他后来小心翼翼地发消息问“听了吗”，你说“听了一点，还行”。他回了一个“哦”，然后撤回了本来想发的另一条消息。后来他发新歌时，没有第一时间告诉你，只是默默发布。"}
  ]},
  { id:34, title:"补习后的炒年糕", desc:"英语补习班晚上九点下课。你收拾书包时肚子不争气地叫了一声，旁边同学都笑了。你红着脸走出补习班大楼，初秋的夜风吹过来，有点凉。李羲承也从旁边的数学补习班出来，把围巾往上拉了拉，正好看到你揉肚子的动作。他指了指街角那家还亮着灯的炒年糕摊，红色的帐篷里冒着热气，阿姨正用大锅煮着红彤彤的年糕和鱼饼。“去吃炒年糕吧，我请客。看你饿得。”他说。", opts:[
    {txt:"开心地点头，和他一起坐在路边小桌前", eff:4, fb:"年糕端上来，热气糊了你的眼镜。他笑着看你擦镜片，然后先给你夹了一块最大的芝士年糕，说“小心烫，里面芝士会流出来”。你们一边吹着热气一边吃，他讲数学补习班老师说话像说rap，你笑得差点呛到。那晚的炒年糕你后来再也没吃到过那么好吃的。"},
    {txt:"说“太晚了，我得回家了”", eff:0, fb:"他有点失望，但马上说“那给你打包一份带回去”。他让阿姨多加了鱼饼和芝士，用锡纸仔细包好递给你。你拎着打包盒走到地铁站时，收到他发来的消息：“到家记得热一下再吃，凉了芝士会硬。路上小心。”"},
    {txt:"拉上其他同学一起去", eff:1, fb:"你喊了补习班其他三四个人，变成了小型聚餐。大家围坐在长桌前，有说有笑。他坐在长桌的另一头，被其他同学拉着聊天，但时不时朝你这边看一眼。后来他起身结账时，经过你身边轻声说了一句：“下次我们两个人来。这家店还有隐藏菜单。”"},
    {txt:"说“太辣了，我吃不了”", eff:2, fb:"他立刻转头对炒年糕阿姨说“一份芝士年糕不加辣，单独做”。阿姨乐呵呵地答应了，单独给你煮了一份白色的年糕，上面铺着厚厚一层芝士，还加了一个溏心蛋。他端给你的那碗冒着热气，说：“吃吧，这个不辣。我以前也不能吃辣，后来练出来的。”"}
  ]},
  { id:35, title:"新发色的风波", desc:"新学期开学第一天，教室里还弥漫着假期的余韵。你走进教室时，发现李羲承的座位周围围了好几个女生，窃窃私语着什么。他染了头发——是那种不太张扬的深棕色，在教室的日光灯下不太明显，但当他转头时，窗外的阳光照进来，发丝会泛出柔和的光泽。他路过你的座位时特意停了一下，弯下腰问：“怎么样？我自己在家染的，对着镜子弄了好久。”语气里有一点藏不住的小得意，等着你的评价。", opts:[
    {txt:"认真打量后说“很适合你，显得很温柔”", eff:4, fb:"他心满意足地直起身，回座位时脚步都轻快了几分。一整天他心情都很好，上课时一直在哼歌，被老师瞪了好几眼。后来你从他朋友那里听说，他染发前问了好几个人意见，但只认真考虑了你的评价，因为“你说话最诚实”。"},
    {txt:"问他“怎么突然想染头发”", eff:3, fb:"他拉过旁边的椅子坐下，小声说：“写歌没灵感，想改变一下。上次在弘大看到一个音乐人的头发就是这个颜色，觉得挺酷的。”然后他凑近一点，压低声音：“这样看起来是不是更像搞音乐的了？”你笑着说像，他满意地回座位了。"},
    {txt:"假装没发现，等他主动问", eff:0, fb:"他等了整整一个上午，你都没提头发的事。午休时他故意在你面前晃了好几圈，去扔垃圾、去借橡皮、去交作业，每次经过都放慢脚步。最后他终于忍不住了，趴在你桌边问：“你是真没发现还是装的？我染头发了！昨天搞了两个小时！”"},
    {txt:"说“还是原来黑色的好看”", eff:-1, fb:"他脸上的笑容肉眼可见地消失了，手不自觉地摸了摸自己的头发。“哦。”他闷闷地应了一声，转身回到座位上，把卫衣的帽子拉起来戴上了，一整天都没摘。后来第二天他来上学时头发颜色变深了——他连夜去便利店买了染发剂想染回来，被他姐姐拦住了。"}
  ]},
  { id:36, title:"琴房的钥匙", desc:"放学后你留下来值日，扫地时在讲台下面发现了一把钥匙。普通的银色钥匙，但钥匙圈上挂着一个小小的钢琴挂件，有些掉漆，看得出来被用了很久。你立刻认出来这是李羲承的——他经常去琴房练琴，这把钥匙他一直挂在书包拉链上。你正想给他送去，就听到走廊里传来急促的脚步声，他从教室后门冲进来，书包都没放好就蹲下来在地上找东西，脸上带着焦急。", opts:[
    {txt:"举起钥匙晃了晃，笑着说“在找这个吗”", eff:3, fb:"他抬头看到你手里的钥匙，整个人松了口气，走过来接过去时手指不小心碰到你的手心。“这是我第三次丢这把钥匙了，”他说，“每次都是你找到。看来你注定要帮我保管重要的东西。”"},
    {txt:"把钥匙收好，想看看他着急的样子", eff:1, fb:"你假装不知道，继续扫地。看他在教室里翻箱倒柜，检查了每个抽屉、每张桌子下面，甚至趴在地上看讲台下面的缝隙。等他急得额头冒汗时你才把钥匙递出来：“给，在讲台底下找到的。”他接过钥匙，无奈地笑了：“下次别逗我了，我刚才以为要换琴房的锁了。”"},
    {txt:"开玩笑说“这么珍贵的东西，我留着当纪念好了”", eff:5, fb:"他说：“那钥匙是学校琴房的……但我可以给你配一把备用的。”第二天他真的给了你一把新钥匙，用一根银色的细链子穿着，钥匙圈上挂着一个和原来一模一样的钢琴挂件。“这样你可以随时来琴房听我练琴。不用再站在门口偷听了。”"},
    {txt:"偷偷放回他笔袋里，没告诉他", eff:0, fb:"他后来在自己的笔袋里找到了钥匙，有些困惑——明明搜过笔袋的。你坐在座位上忍住笑，装模作样地看书。他经过你座位时似乎猜到了什么，轻轻在你桌上放了一颗草莓糖，什么都没说就走了。"}
  ]},
  { id:37, title:"夏夜的花火", desc:"暑假，同学组织去汉江边看一年一度的烟花大会。你因为补习班拖堂迟到了，到的时候天色已经完全暗下来，烟花已经放了一半。你站在江边的人群中，踮着脚尖四处寻找班里的同学，江风吹得你头发乱飞，手机屏幕上显示好几条未读消息。忽然，有人在背后轻轻拉住了你的手腕。你转头，李羲承穿着一件简单的白色T恤，手里拿着两根没点燃的烟花棒，嘴角带着笑。“你迟到了整整二十分钟，”他说，“但最精彩的还没开始，我特意给你留的。”他把其中一根烟花棒递给你，火花在你们之间噼啪作响。", opts:[
    {txt:"接过烟花棒，在江边画出他的名字", eff:5, fb:"你用烟花在空中写了他的名字，虽然很快消散在夜风里，但他看得很认真，眼睛一眨不眨。然后他也用烟花画了一颗心，画完假装是画着玩的，把烟花棒举高看向别处。你们在江风里站了很久，直到最后一支烟花熄灭。"},
    {txt:"问他“你怎么不和大家一起看”", eff:3, fb:"他指了指不远处的野餐垫上，同学们聚在一起吃喝聊天。“烟花一个人看没意思，”他说，“而且我在等一个迟到的人。你说九点到，现在已经九点二十了。”他把带来的外套披在你肩上：“江边冷，下次别迟到。”"},
    {txt:"和他比赛谁先烧完烟花棒", eff:4, fb:"你们像小孩一样比了起来，火星在夜里四处飞溅。他赢了，他的烟花棒先烧到了底，但你硬撑着烧到了最后一秒。他赶紧握住你的手腕检查你的手指。忽然他安静下来，说：“如果时间能停在这会儿就好了。”烟花灭了，但你的心砰砰跳了很久。"},
    {txt:"说“烟花好吵，我头疼”", eff:-1, fb:"他立刻把烟花棒拿远了一点，然后从包里翻出降噪耳塞递给你。“我每次来看烟花都会带这个，”他说，“音乐人的耳朵比较敏感。”你把耳塞戴上，周围的声音确实小了很多。你后来有点后悔，因为那天晚上他本来想和你聊很多的。"}
  ]},
  { id:38, title:"空白的乐谱本", desc:"新年开学第一天，你在抽屉里翻到了一本崭新的空白乐谱本——那是你很久以前买的，淡蓝色的封面印着一架小钢琴，原本打算作为圣诞礼物送给他，但当时因为害羞，一直拖着没送。现在它静静地躺在你的抽屉里，边角有点卷了，但还是崭新的。你想起李羲承最近总是用普通的横线笔记本写谱，音符画在横线上歪歪扭扭的。你犹豫了很久，最终决定不再拖了。", opts:[
    {txt:"亲手递给他，说“正好看到，觉得适合你”", eff:4, fb:"他接过本子，翻开看了看，里面的纸张厚实，印着标准的五线谱。他安静了几秒，然后抬头看你：“你什么时候买的？这个牌子很贵。”你说不贵，他低头摩挲着封面，说：“正好我需要一个新的写谱本。旧的那本快写满了。”后来你看到他在上面写满了密密麻麻的音符。"},
    {txt:"放在他桌上，没有留名", eff:1, fb:"他拿着本子问了一圈是谁送的，每个人都摇头。问到你这儿时，你也摇头说不知道。他将信将疑地看着你，最后在本子扉页写了一句：“虽然不知道是谁，但谢谢你。这本子我会好好用。”后来你在他写满的那本乐谱本里看到，扉页上又多了一行字：“其实我知道是你。”"},
    {txt:"在里面第一页写了一句话再送", eff:5, fb:"你在扉页写了：“给未来的作曲家。希望以后能在唱片店看到你的名字。”他翻开时看到了，手指停在那行字上，久久没有翻页。然后他抬头寻找写字的人，对上你的视线时，他指了指那句话，隔着几排座位朝你竖了竖大拇指。那本乐谱本后来被他用得很旧，封面都磨白了，但扉页一直干干净净。"},
    {txt:"因为害羞，最终没送", eff:-1, fb:"那本乐谱本被你重新塞进了书包最深处，想着下次再送。后来好几个学期过去了，他一次偶然在文具店看到了类似的本子，随口说了一句：“这个乐谱本好看。我要是有一个就好了。”你听了心里闷闷的，但那本本子已经在家里放了太久，封面都泛黄了。"}
  ]},
  { id:39, title:"最后的信", desc:"高考结束后三天，你收到了一封挂号信。邮递员按门铃时你还在睡觉，签收时你看到寄件人写着“李羲承”。你拆开，里面是厚厚几页手写信纸，密密麻麻写满了字，有些地方还有涂改的痕迹。信里写了他高中三年对你的印象——从高一的某个清晨你在琴房门口偷听被闪光灯出卖，到高二体育课上那颗滚到你脚边的篮球，再到高三晚自习传的每一张纸条。他在信里写：“谢谢你成为我高中三年最忠实的听众。以后不管我在哪里弹琴，都希望你能坐在第一排。”信纸最后一页粘着一个银色U盘，标签上写着“THE LAST DEMO”。", opts:[
    {txt:"看完立刻给他打电话", eff:5, fb:"电话接通的很快，他似乎一直在等。他的声音有点紧张，和平常完全不一样：“信收到了？”你嗯了一声，他等了几秒，轻声说：“所以……你愿意继续当我的第一个听众吗？”你说了好，他在电话那头长出了一口气，然后你听到那边有人在喊他的名字，他压低声音说：“等我一下，我在打电话。”"},
    {txt:"回了一封更厚的手写信，把三年积攒的话全写了进去", eff:6, fb:"你花了一整夜，写满了十几页信纸，从高一的初见到毕业典礼的眼泪，每一个细节你都记得清清楚楚。你写到手指酸痛，信封塞得鼓鼓囊囊。他收到信后发了一条语音消息，声音有些哑：“我一边看一边哭，我妈以为我怎么了。这些信我都留着，以后拿出来看。”"},
    {txt:"把信反复读了三遍，然后小心藏进抽屉", eff:2, fb:"你没有立刻回复，每次想写回信又不知从何写起。一周后他忍不住又发来消息：“信收到了吗？邮局说已经签收了。”你说收到了，他说：“那……你怎么想？”你说：“信在抽屉里，我每天睡前看一遍。”他等了很久，说：“那我等你。不急。”"},
    {txt:"看完后不知道如何回应，把信收起来没回复", eff:-3, fb:"他等了一周、两周，手机屏幕亮了又暗，始终没有你的回复。最后他发来一句：“没关系，你不用回。我只是想让你知道这些。”然后他再也没有主动联系你。那封信后来被你夹在一本不常看的书里，每次搬家你都带着，却再也没有勇气拆开重读。"}
  ]},
  { id:40, title:"弘大的重逢", desc:"多年后的一个傍晚，你在弘大附近等人。朋友迟到了，你站在街边刷手机，被一阵吉他的声音吸引了注意力。街边有个年轻人在表演，唱的是你自己也听过无数遍的歌——《天台的风》。你抬头，看到弹吉他的那个人戴着帽子，帽檐压得很低，但当他抬起头调弦时，你隔着人群认出了那双眼睛——李羲承。他成熟了一些，下颌线条更分明，头发也长了一点，但拨动琴弦时微微皱眉的样子和高中时一模一样。他也看到了你，正在弹的和弦错了一个音，手指停在琴弦上。人群还在等他继续唱。", opts:[
    {txt:"站在原地，对他挥了挥手", eff:4, fb:"他弹完那首歌，立刻对旁边的伙伴说了句什么，跳下小舞台，拨开人群朝你跑来。他在你面前站定，微微喘着气，帽檐下的眼睛亮亮的。“好久不见。”他说。然后他挠了挠头，笑了一下：“我在弘大唱歌好几年了，第一次在人群里看到你。你还记得那首歌吗？”"},
    {txt:"等他表演结束后，走到他面前", eff:3, fb:"他正在收拾琴盒和音箱，看到一双鞋子停在他面前，慢慢抬起头。你们在弘大的路灯下聊了很久，从近况聊到以前高中时的糗事。他说他下周要发布新歌了，歌名是《天台的风2025》。“算是对以前的自己一个交代。你还记得那首歌的第一句歌词吗？”你说每句都记得。"},
    {txt:"在人群中喊了他的名字", eff:5, fb:"他在台上听到了，猛地抬头看向声音的方向。然后他干脆放下吉他，对着话筒说：“抱歉大家，我看到了一位很久不见的老朋友。”他在起哄声中跳下台，朝你走来。然后他回到台上，弹了一首你从来没听过的曲子——后来他说，那是刚才看到你时即兴想出来的。"},
    {txt:"转身离开，融进了人群里", eff:0, fb:"你犹豫了很久，最终没有打招呼。他唱完歌后抬起头，在人群里快速扫视，好像看到了一个熟悉的背影。他追了几步，但弘大的人太多了，你消失在了地铁口的方向。后来他在社交媒体上发了一张弘大夜景的照片，配文很简单：“好像看到你了。希望是你。”"}
  ]},
  { id:41, title:"天台的约定", desc:"毕业前最后一天下午，学校里到处都是拍照和道别的人。你一个人走上了教学楼的天台——这里还是和以前一样，风很大，可以看到整个校园和远处的操场。旧长椅上放着一把吉他，旁边的地上有一个浅蓝色的信封，信封上写着你的名字。你打开，里面是一张手写的乐谱，歌名是《天台的风》。乐谱下面还有一行小字：“这首歌早该给你了。以后不管我在哪里弹琴，都希望你坐在第一排。——羲承。”你拿着乐谱的手微微发抖。天台门口传来脚步声，你转头，李羲承站在那里，手里拿着两瓶你最爱喝的香蕉牛奶，瓶身上还挂着水珠。他应该是跑过来的，呼吸还有些急促。", opts:[
    {txt:"跑过去紧紧抱住他", eff:7, fb:"他被你撞得后退了一步，手里的香蕉牛奶差点掉了。然后他慢慢抬起手臂，轻轻环住了你，下巴抵在你的发顶。风从天台吹过，他的校服外套被吹得猎猎作响。“谢谢你，”他轻声说，声音有点闷，“谢谢你整个高中都在听我弹琴。从第一天在琴房门口到现在。”你在他怀里用力点头。"},
    {txt:"笑着接过乐谱，说“我会弹了以后弹给你听”", eff:5, fb:"他眼睛亮晶晶地看着你，像是没想到你会这么说。“真的吗？那我等那一天。”你们一起坐回那张旧长椅上，他把吉他拿过来，开始教你认五线谱上的音符。你的手指笨拙地按在琴弦上，他轻轻纠正你的指法。天慢慢黑了，但你们都不想走。"},
    {txt:"问他“以后还能来这个天台吗”", eff:4, fb:"他望向远处的操场，那里有人在踢球，喊叫声隐隐约约传过来。“大学放假了我们可以偷偷翻墙进来，”他说，“我知道哪里墙最矮。”你打了他一下，说他教坏你。他笑着躲开，然后认真地说：“就算不能来这个天台，我也会找到新的天台。然后在每个天台上给你弹琴。”"},
    {txt:"站在原地，低头反复看着那张乐谱", eff:0, fb:"他看着你专注的样子，等了很久。最后他轻轻把香蕉牛奶放在长椅上，瓶身碰着木头发出轻响。“牛奶放这儿了，记得喝。”他悄悄退后两步，转身走下了天台。等你看完乐谱抬起头，他已经不在天台上了。长椅上只剩下那两瓶挂着水珠的香蕉牛奶。"}
  ]},
  { id:42, title:"便利店夜话", desc:"晚上十点，你从补习班出来，拐进街角的便利店买宵夜。在冷藏柜前蹲着纠结选哪种三明治时，门铃响了。有人走到你旁边也蹲了下来——是李羲承，他还穿着校服，肩上背着吉他包。“这么晚还吃三明治？”他一边说一边从你手里拿过那个金枪鱼三明治看了看保质期，然后放回去，拿了一个鸡肉的递给你：“这个比较好吃，我试过所有的口味。”他站起来又拿了两瓶香蕉牛奶，全部放在收银台上一起结了账。", opts:[
    {txt:"问他“你怎么也这么晚还在外面”", eff:3, fb:"他在便利店外面的长椅上坐下，把吉他包放在膝盖上。“刚在地下练习室练完琴，出来发现只有这里还亮着灯。”他拧开牛奶瓶盖递给你。“以前半夜写不出歌的时候，就在这里坐到打烊。没想到今天碰到你了。”"},
    {txt:"道谢后在他旁边坐下，一起吃东西", eff:4, fb:"你们并排坐在便利店门口的塑料椅上，十月的夜风吹过来有点冷，他把校服外套脱下来搭在你们两个人肩上。你咬了一口三明治，他咬了一口自己那份饭团。他说：“我以后想开一家工作室，里面放一架钢琴，然后旁边就是便利店，可以随时买到香蕉牛奶。”"},
    {txt:"接过三明治说“下次我请你”", eff:2, fb:"他笑着说“那下次我要吃最贵的那个，带炸鸡的那个”。他站起来背上吉他，把你送到地铁站口。进站前他从包里翻出一颗糖塞进你口袋：“奖励你的，今天补习辛苦了。回家发消息给我报平安。”"},
    {txt:"说“太晚了不吃了”，转身就走", eff:-1, fb:"他拿着三明治的手悬在半空，然后慢慢放下来。他把两份食物都放进自己包里，一个人坐在便利店门口吃完了。后来他在聊天里提到那天晚上便利店门口的风很大，三明治有点凉，但牛奶是温的。"}
  ]},
  { id:43, title:"乐器行的试用", desc:"周六下午，你在学校附近的乐器行逛着看吉他，忽然听到试音区有人在弹一首很熟悉的旋律——是李羲承自己的歌。你探头一看，他正坐在一把浅色的民谣吉他前，闭着眼睛专注地弹着，旁边站着一个店员在认真听。曲子弹完后，店员拍手说：“这首曲子太好听了，是你自己写的吗？要不要考虑在我们这里教吉他？”李羲承睁开眼，正好看到站在展示架旁边的你，愣了一下。", opts:[
    {txt:"走过去说“我觉得你应该答应”", eff:4, fb:"他挠了挠头，有些不好意思地跟店员留了联系方式。出来以后他问你怎么会在这里，你说想看看吉他，他眼睛一亮：“你想学吉他？我可以教你，不收学费。不过第一堂课得请我喝东西。”"},
    {txt:"悄悄听完，等他出来才装作偶遇", eff:2, fb:"他走出乐器行时看到你，先是一愣，然后说“刚才你是不是在里面？我弹的时候余光好像看到一个影子。”你承认了，他嘴角微扬：“那首就是上次给你听的demo的完整版，你觉得怎么样？”"},
    {txt:"等他弹完，在门口拦住他夸赞", eff:5, fb:"他背着吉他出来时被你吓了一跳，然后听到你的夸奖，整个人笑得有点傻。“那个店员说可以让我周末在这里教课，我还在犹豫。你觉得呢？”你说这么好的机会不要错过，他点点头说“那我试试，第一节课你来当我的示范学生？”"},
    {txt:"觉得不关自己的事，转身去看别的", eff:0, fb:"他后来在乐器行门口站了一会儿，似乎在等人。你从另一侧的展示柜后面绕过去，假装在看琴弦。他最后一个人离开了，手里拿着店员的名片，边走边翻来覆去地看。"}
  ]},
  { id:44, title:"下雨天的共享耳机", desc:"又一个雨天。你在学校走廊的窗边等雨停，看着雨滴打在玻璃上滑下来。身后有人轻轻戳了戳你的肩膀。李羲承不知道什么时候站到了你旁边，手里拿着他那副白色的耳机，已经分好了左右。“等雨停很无聊吧，”他说，“我刚找到一首很好听的歌，不是我自己写的——是别人写的，但我觉得你会喜欢。”他把右耳的耳机递给你，自己戴上左耳，点开了播放键。是一首舒缓的独立音乐，歌手的声线温柔干净，和窗外的雨声混在一起格外好听。", opts:[
    {txt:"接过耳机，安静地和他一起听完整首歌", eff:4, fb:"歌放完后，他问你觉得怎么样。你说很好听，他在手机上把这首歌收藏进了歌单，歌单的名字是「雨天和你」。你看到了，但没有说破。他把那个歌单分享给了你，说“下次下雨天可以翻出来听”。"},
    {txt:"听完后问他“这是谁推荐的歌”", eff:2, fb:"他说：“没人推荐，我在音乐平台上随机听到的。但听到第一句歌词的时候就想到了你。”你问哪句，他不肯说，只是把手机屏幕按灭了，耳朵尖有一点粉红。"},
    {txt:"开玩笑说“你这是在和我分享你的私人歌单吗”", eff:5, fb:"他挑了挑眉：“被你发现了。我的私人歌单有几百首歌，但只分享给过一个人。”他顿了顿，“现在你已经听了好几首了。感觉怎么样？有没有哪首不喜欢的？我可以删掉。”"},
    {txt:"摆手说“不用了，我在想事情”", eff:0, fb:"他点点头，收回耳机，一个人靠在窗边听完了那首歌。雨停后他把耳机线收好，对你说了句“我先走了”，然后独自离开了走廊。你看到他的手机屏幕上还亮着那个歌单的页面。"}
  ]},
  { id:45, title:"校庆的后台", desc:"校庆晚会，李羲承的乐队又要上台表演。这次你被朋友拉着去帮忙搬道具，阴差阳错进了后台。后台比想象中乱多了，到处是衣服、乐器和跑来跑去的人。你在人群缝隙中看到他坐在角落的一把折叠椅上，对着镜子整理衬衫领口。他看起来很紧张，手指在膝盖上反复弹着上台要演奏的第一段和弦。一个乐队成员走过来跟他说还有五分钟上场，他点点头，深吸了一口气，然后看到了站在服装架旁边的你。", opts:[
    {txt:"走过去帮他整理了一下歪掉的领口", eff:5, fb:"你伸手把他衬衫领口翻正，手指不小心碰到他脖子，他整个人僵住了，喉结滚动了一下。“领口翻了，”你解释。他小声说了句谢谢，然后站起来，深呼吸。“你在这儿我就不紧张了。上台后我会看你坐的那边。”"},
    {txt:"远远朝他做个加油的手势", eff:3, fb:"他看到你的手势，对你点了点头，然后用力握了握拳头。上台后他在灯光下扫视了一圈，在观众席找到你的位置后才开始弹第一个和弦。整场表演都很稳，朋友说今天他发挥得特别好。"},
    {txt:"对他说“放松点，你已经是老手了”", eff:4, fb:"他苦笑了一下：“每次都紧张。上台前想吐，上台后就好了。不过刚才看到你在后台，好像比之前好了一点。”他站起来的时候轻轻碰了碰你的肩膀，“等我下台，别走。”"},
    {txt:"觉得后台太乱，出去等着了", eff:0, fb:"你推开后台的门回到观众席。他上台后扫了好几圈观众席，脸上有一种你读不懂的表情，像是在找谁。演出很棒，但他在台上的笑容比你之前看到的任何一次都少了一点。"}
  ]},
  { id:46, title:"新年钟声", desc:"跨年夜，同学们约在南山塔附近聚会。零点快到时大家挤在一起倒计时，有人在开香槟，有人在拍照。你被挤到了人群边缘，差点踩到台阶边缘时一只手抓住了你的手臂。李羲承不知道什么时候站到了你旁边，他把他的围巾解下来绕在你脖子上，打了个松松的结。“新年快乐。”他在倒数到零时凑近你的耳朵说，声音被周围的欢呼声和远处塔楼的钟声盖住了，但你听到了。", opts:[
    {txt:"在他耳边也回了一句“新年快乐”", eff:4, fb:"他听到后笑了一下，然后从口袋里掏出一个小小的信封。“新年礼物，”他说，“不是情人节礼物，所以别多想——虽然我也不知道有什么区别。”信封里是一张手写的乐谱卡片，封面上写着“写给新的一年”。"},
    {txt:"问他“你的新年愿望是什么”", eff:5, fb:"他低头想了想，然后说：“写一首让很多人听到的歌。然后……让某个特定的人第一个听到。”他没有看你说这句话，目光落在远处南山塔的灯光上。周围烟花炸开，你隐约觉得他说的“某个人”可能不是泛指。"},
    {txt:"把围巾还给他，说“你自己戴着，别感冒了”", eff:2, fb:"他把围巾又围回你脖子上，坚持说：“我不冷。刚才在室内待了很久，身体很热。”但他手指冰凉，不小心碰到你手背时你感觉到了。他立刻把手收回口袋，假装看烟花。"},
    {txt:"被周围的噪音吵得头疼，提前离开", eff:0, fb:"你走的时候他正在和另一个同学说话，没有注意到。后来他发消息问“你在哪，零点的香槟给你留了一杯”，你说先回家了。他回了一个“哦”，然后又发了一句“新年快乐，可惜你没听到钟声”。"}
  ]},
  { id:47, title:"转学的谣言", desc:"周一早上，班级里流传着一个消息——李羲承可能要转学去首尔的艺术高中。你听到这话时正在做早自习的英语阅读，手里的笔停了很久，再也没法集中注意力。整个上午你都没看到他在教室。午休时你在走廊尽头的饮水机前打水，有人从身后走过来，站在你旁边排队。你转头，是他。“你今天上午去哪了？”你脱口而出，声音比预想中更急。", opts:[
    {txt:"直接问他“听说你要转学，是真的吗”", eff:4, fb:"他愣了一下，然后摇头：“谁说的？我只是去首尔参加了一个音乐夏令营的面试，就两天。转学的事是误传。”他看你还一脸不信，又补了一句：“我不会转学的。我在这里还有很多没做完的事——还有没写完的歌。”"},
    {txt:"假装不在意，说“哦，听说了而已”", eff:0, fb:"他看了你一眼，似乎想从你脸上读到什么，但你没有给他机会。他接完水转身走了。下午你看到他一直在本子上写东西，下课的时候把一张折好的纸条放在你桌上——「我没有要转学。但如果我要走，会第一个告诉你。」"},
    {txt:"松一口气，说“那就好，班级里少一个人会很无聊”", eff:2, fb:"他挑了挑眉：“只是怕班级无聊？不是怕别的？”你没有接话，他自顾自地笑了，说：“放心吧，就算我要走，也会提前很久告诉你。而且我会每天给你发demo，你远程当我的听众。”"},
    {txt:"因为担心，一整个上午都没和他说话", eff:-1, fb:"他下午回来时发现你对他很冷淡，有些不解。放学时他拦住你问怎么了，你把谣言说了一遍。他听完后安静了几秒，然后说：“所以你担心了一天？”你点头，他摸了摸后颈：“下次有这种事直接来问我，别听别人传的。”"}
  ]},
{ id:48, title:"他的家人", desc:"学校开放日，你负责在校门口引导家长。你正帮一位阿姨指路时，看到一个中年女人牵着一个五六岁的小女孩走过来。女人在人群中张望，小女孩则好奇地东看西看。然后你听到一个熟悉的声音：“妈，这边！”李羲承小跑过来，先蹲下抱了抱小女孩——应该是他妹妹，然后站起来对他妈妈介绍学校的各个地方。他抬头时看到了你，招手让你过来：“这是我同学——她就是我跟你们说的，一直听我demo的那个人。”他妈妈看你的眼神顿时充满了兴趣。", opts:[
    {txt:"有礼貌地鞠躬问候，夸他妹妹可爱", eff:3, fb:"他妹妹抓着你的手指叫“姐姐”，李羲承在旁边笑着看，然后他妈妈忽然说了一句“这姑娘比照片上好看”，他立刻面红耳赤地打断：“妈！别说了！”你不知道他什么时候给他妈妈看过你的照片。"},
    {txt:"有些紧张地打了个招呼，然后想溜", eff:1, fb:"他拉住你的袖子没让你跑。“别紧张，我妈不咬人。”他把你介绍给他妈妈时语气特别郑重，好像介绍的是一个很重要的人。后来他发消息说“我妈说你很文静，让我多向你学习”——他在后面加了一长串省略号。"},
    {txt:"大方地和他妈妈聊了几句，夸他音乐天赋好", eff:4, fb:"他妈妈笑得合不拢嘴，说从小到大第一次听别人这么认真地夸她儿子。李羲承在旁边捂着脸，耳朵红得能滴血。临走时他妈妈塞给你一包自己做的打糕，说“下次来家里玩”。他说：“我妈从不随便给人吃的，她喜欢你。”"},
    {txt:"假装没看见，继续忙自己的引导工作", eff:0, fb:"他后来跟朋友说，本来想让你见见他妈妈和妹妹，但看你很忙就没打扰。你从朋友那里听到这句话时已经过了一周，想解释又不知道从何说起。"}
  ]},
  { id:49, title:"未发表的曲子", desc:"高考前一周，李羲承给你发了一个加密链接。密码是他的生日。你点开，里面只有一首曲子，标题是「未发表-直到高考结束」。介绍栏写着一行字：“这首歌写于高三每一个失眠的夜晚。等考完的那天，我会公开。但现在，你是唯一的听众。”曲子的旋律里有紧张、有期待、有不舍，还有一句没有歌词的哼唱——他的声音很轻，像是在对一个人说话。你听了一遍又一遍，直到深夜。", opts:[
    {txt:"立刻回他消息说“这首歌太棒了，考完一定要发”", eff:4, fb:"他秒回：“你是第一个说它棒的人。其实我放上去的时候手都在抖，怕你觉得不够好。”你说这首歌是他目前为止最好的作品，他沉默了一会儿，回了一句：“谢谢你。高考加油。考完后我来找你。”"},
    {txt:"问他“为什么是现在给我听”", eff:3, fb:"他回：“因为考前压力太大，写不出新东西。翻出这些片段重新编了一下，觉得想让你在考试前听到。算是一种祝福吧。”然后他又说：“如果这首歌能给你一点力量，那它就已经完成使命了。”"},
    {txt:"把链接收藏了，没有回复", eff:1, fb:"考完后他发了那张单曲的公开版，在简介里写“感谢高三的每一个夜晚，和第一个听到它的人”。你在评论区点了个赞，他私信你：“你听了对吧？我看到你的赞了。”你回了一个微笑的表情。"},
    {txt:"太忙没听，链接过期了", eff:-2, fb:"高考结束后你去找那个链接，发现已经失效了。你问他能不能再发一次，他说：“那个版本是高考前的限定版本，现在已经公开了——但公开版少了最后一段哼唱。”你不知道少了的那段哼唱是什么，他也不肯告诉你。"}
  ]},
  { id:50, title:"多年后的琴声", desc:"毕业多年后，你在一家唱片行的角落里翻到了一张独立音乐人的专辑。封面是一架旧钢琴和一片夕阳，专辑名叫《天台日记》。你翻到背面，制作人名单里写着“李羲承”。你的手停住了。店里的音响正好在播专辑的最后一首歌，前奏是一段很熟悉的钢琴旋律——你听了十几秒才想起来，那是多年前的某个清晨，你在琴房门口偷听到的曲子。你握着专辑站在唱片行里，周围人来人往，但你觉得时间忽然慢了下来。", opts:[
    {txt:"买下这张专辑，每一首都从头听到尾", eff:5, fb:"整张专辑循环了好几遍。最后一首歌的末尾有一段隐藏音轨，是一段嘈杂的录音，有人在调弦，有人在笑，然后有一个声音说：“这首歌给一个在琴房门口偷听的人。你每次经过我都知道。”那个声音很轻，但你认得出是谁。"},
    {txt:"拍下专辑封面，在社交媒体上发给他", eff:4, fb:"你很久没有和他联系了，对话框还停留在几年前的新年祝福。你把照片发过去，配文“在唱片行看到了这个”。几个小时后他回复：“那是我三年前出的专辑。你现在才看到？”你说是的，他发来一个笑脸：“没关系，刚好我下周在首尔有个小型演出，要来看吗？我给你留第一排。”"},
    {txt:"在唱片行的试听机前站着听完了整张专辑", eff:3, fb:"你在试听机前站了很久，耳机里是跨越多年的旋律。店员过来问你需要帮忙吗，你摇摇头，指着专辑说“我认识这个制作人”。店员说这张专辑已经卖了很久了，不常见有人这么认真地听。你没有解释。"},
    {txt:"把专辑放回架子上，转身离开", eff:0, fb:"你走出唱片行，外面的阳光有些刺眼。那张专辑的封面在你脑海里挥之不去——那把旧钢琴、那片天台、那个名字。你走出几步后停下来，又折返回去，但刚才那张专辑已经被别人买走了。只剩下空空的架位，和还在播放的最后一首歌。"}
  ]}
);
  // ============ 50个聊天话题 ============
  let CHAT_TOPICS = [
    { id:101, trigger:"你在干嘛？", reply:"刚练完琴，手指有点酸。新曲子有一段怎么弹都不满意，正烦躁呢。你在干嘛？", options:[
      {txt:"我在写作业，数学好难", reply:"数学我上次整理了一本错题集，明天带给你。不过你现在可以先休息一下，一直做题脑子会糊的。", eff:2},
      {txt:"要不要我帮你听听那段曲子？", reply:"你愿意听？太好了，我马上发给你。不过你别嫌弃，真的是半成品。", eff:3},
      {txt:"我也刚忙完，准备看个剧放松", reply:"看什么剧？我最近在追一部音乐题材的，里面的配乐写得特别好，推给你？", eff:1}
    ]},
    { id:102, trigger:"今天天气真好", reply:"是啊，首尔难得有这么蓝的天。我在琴房弹琴的时候阳光刚好照在琴键上，心情都变好了。你那边呢？", options:[
      {txt:"我在窗边晒太阳，差点睡着", reply:"上课睡着被老师抓到我可不管哦。不过换作是我，这种天气也想趴着什么都不干。", eff:1},
      {txt:"天气好就想出去玩", reply:"我也想去汉江边弹吉他。要不……下次一起去？", eff:3},
      {txt:"好天气让人有恋爱的冲动", reply:"……怎么突然说这个。不过春天确实容易让人胡思乱想，我写了好几首情歌的草稿。", eff:2}
    ]},
    { id:103, trigger:"你吃饭了吗？", reply:"还没，刚从小卖部买了个三角饭团。今天食堂人太多了，懒得挤。你呢，吃了吗？", options:[
      {txt:"我也没吃，一起点外卖？", reply:"外卖？校门口那家炸鸡可以送进来吗？要是能行的话我请你，上次你帮我听demo还没谢你。", eff:3},
      {txt:"我带了便当，分你一半？", reply:"你自己做的吗？那怎么好意思……不过既然你开口了，我就厚着脸皮接受了。下次换我带。", eff:2},
      {txt:"不吃饭怎么行，快去食堂", reply:"那你陪我一起去？一个人吃饭真的很无聊。而且有你在我可以多点一个菜。", eff:1}
    ]},
    { id:104, trigger:"你今天心情好吗？", reply:"还不错，早上灵感来了写了一段旋律，感觉比之前顺。不过后来上数学课就泄气了。你呢？", options:[
      {txt:"我心情一般，考试压力好大", reply:"考试的事情别太焦虑。我有一份重点整理，等下发你。我们一起复习的话效率应该更高。", eff:2},
      {txt:"看到你的消息心情就好了", reply:"……这种话你不能随便说。我会当真的。不过，听到你这么说，我今天剩下的时间都会很开心。", eff:3},
      {txt:"心情不好不坏，就那样", reply:"那就听听我的新demo吧，说不定能让你的心情稍微好一点。音乐有治愈的力量。", eff:1}
    ]},
    { id:105, trigger:"你在想什么？", reply:"说实话？在想一个人。刚才弹琴的时候有几个音怎么都弹不对，朋友说是因为分心。我可能确实在想别的事。", options:[
      {txt:"在想谁啊？我认识吗？", reply:"你当然认识。但我现在不想说名字，怕说出来以后连朋友都做不成。等时机合适了，我会第一个告诉你。", eff:3},
      {txt:"是不是在想新歌的歌词？", reply:"……被你看穿了。对，在想歌词。有一句怎么都想不好，是关于「等待」的。你帮我想想？", eff:2},
      {txt:"专心弹琴别分心", reply:"你说得对。但我发现有些事情不是想不想就能控制的。", eff:1}
    ]},
    { id:106, trigger:"晚安", reply:"这么早就睡了？我还有一段副歌没写完，打算再熬一会儿。你先睡吧，明天见。", options:[
      {txt:"别熬夜了，对身体不好", reply:"你这是在关心我吗？好吧，那我不熬了。但如果明天副歌还是写不出来，就怪你。晚安。", eff:2},
      {txt:"写完发给我，我明天听", reply:"好，那我更有动力了。明天你听完给我建议，别只说「还行」。", eff:3},
      {txt:"晚安，做个好梦", reply:"你也做个好梦。梦到我的话……算了，梦到好吃的也行。晚安。", eff:1}
    ]},
    { id:107, trigger:"今天放学有空吗？", reply:"有啊。今天社团活动取消了，本来想去琴房，但如果你有事找我，琴房可以改天。", options:[
      {txt:"一起去咖啡店写作业？", reply:"好啊。我知道一家新开的，他们家有架旧钢琴，老板说我可以随便弹。你写作业，我在旁边练琴。", eff:3},
      {txt:"没什么特别的事，就是想见你", reply:"……这种话真的让人没法接。不过，既然你想见我，那我现在就去你班级门口。五分钟后到。", eff:3},
      {txt:"帮我补习数学吧", reply:"没问题。你数学哪部分最头疼？我先准备一下。不过补习完了得请我吃东西，这是规矩。", eff:2}
    ]},
    { id:108, trigger:"我有点想你", reply:"……这条消息我看了好几遍。你是认真的还是在开玩笑？如果是认真的，那我现在心跳很快。如果是开玩笑，那我也会假装没看到。", options:[
      {txt:"我是认真的", reply:"那好。我也坦白——从高一开始，我每次弹琴都在想你会不会路过琴房。现在你知道了，轮到你了。", eff:4},
      {txt:"开玩笑的啦", reply:"哦。我就知道。不过就算是玩笑，也谢谢你。至少让我知道你会想我，哪怕是假设的。", eff:1},
      {txt:"你觉得呢？", reply:"我觉得……你最好别让我猜。我猜歌的和弦很容易，但猜女孩子的心思从来没对过。给我个痛快吧。", eff:2}
    ]},
    { id:109, trigger:"推荐一首歌给我吧", reply:"最近在听10cm的《喜欢》。那首歌的旋律很简单，但歌词写得特别好——「我喜欢你，像春天一样温暖」。你觉得呢？", options:[
      {txt:"我马上去听，听完告诉你", reply:"好。那首歌我第一次听的时候，脑子里就有画面了：樱花树下，一个人对另一个人说……", eff:2},
      {txt:"这首歌是在暗示什么吗？", reply:"你觉得呢。歌里说的「喜欢」，你觉得我推荐这首歌给你，是什么意思。自己品。", eff:3},
      {txt:"我更喜欢你的demo", reply:"我的demo和人家专业歌手的能比吗……不过你这么说，我真的很开心。", eff:2}
    ]},
    { id:110, trigger:"下雨了", reply:"嗯，窗外雨好大。你带伞了吗？没带的话我在教学楼一楼，可以送你到校门口。", options:[
      {txt:"我没带伞，你来接我", reply:"好，我马上到。你在哪个位置？别站在雨里，先找个屋檐躲一下。我跑过来，三分钟。", eff:3},
      {txt:"我带了伞，谢谢关心", reply:"那就好。不过雨太大，走路小心别踩水坑。上次你鞋子湿了一整天，我看着都觉得难受。", eff:2},
      {txt:"下雨天最适合听歌了", reply:"我也这么觉得。我现在在弹一首自己写的雨天的曲子，你要不要听？刚好外面在下雨，氛围正好。", eff:2}
    ]}
  ];

 CHAT_TOPICS.push(
  { id:111, trigger:"今天放学怎么走那么快？", reply:"我去琴房占位置。放学后音乐教室总是被人抢，今天想练一首新曲子，得早点去。你是不是也往那个方向走的？", options:[
    {txt:"对，我也经过琴房", reply:"那以后放学一起走吧，顺路。而且你可以顺便帮我听听新曲子，当我的移动听众。", eff:2},
    {txt:"我今天是去小卖部买东西", reply:"小卖部？那下次帮我带一瓶香蕉牛奶，我放学给你钱。不过你要是请我喝的话，我就给你弹一首专属曲目。", eff:3},
    {txt:"我今天只是想早点回家", reply:"好吧，那明天见。对了，路上注意安全，到家给我发个消息。", eff:1}
  ]},
  { id:112, trigger:"你昨天发的demo我听了", reply:"真的吗？感觉怎么样？我录了好几遍，第二段副歌的转音一直不满意，后来干脆换了另一种唱法。你听出来哪里不一样了吗？", options:[
    {txt:"换气的地方比之前自然多了", reply:"你听出来了！我专门练了三天。以前唱歌换气总是很急，老师说这样会破坏旋律的连贯性。你是第一个指出这个问题的人。", eff:3},
    {txt:"我觉得原版更好听", reply:"真的吗？那我两个版本都留着。你帮我决定吧，最终版用哪个。这个权利交给你了。", eff:2},
    {txt:"我听了好几遍，越听越喜欢", reply:"听了好几遍？那你比我妈还捧场。我妈听一遍就说'还行'然后去做饭了。下次我写新歌，直接发给你当首播。", eff:3}
  ]},
  { id:113, trigger:"你平时周末都做什么？", reply:"大部分时间在地下练习室练琴，偶尔去弘大看街头表演。其实挺单调的，朋友说我的生活和苦行僧一样。你呢？", options:[
    {txt:"我喜欢去咖啡店看书", reply:"哪家？推荐一下。我也想去那种安静的地方坐坐，带着我的笔记本写歌。咖啡店的白噪音据说能激发创作灵感。", eff:2},
    {txt:"我在家追剧和睡觉", reply:"听起来也不错。有时候练琴太累了我也想瘫着。如果有部好剧推荐给我，我可以一边练琴一边放着当背景音。", eff:1},
    {txt:"想出去玩但没人陪", reply:"那下次周末我叫你。我知道弘大有一家乐器行，顶楼有个天台可以看到整个街区。我经常一个人去那里弹吉他，两个人去应该更有意思。", eff:3}
  ]},
  { id:114, trigger:"你的钢琴学了多久了？", reply:"从六岁开始，到现在快十二年了。小时候是被妈妈逼着学的，坐在琴凳上哭过很多次。后来慢慢发现自己真的喜欢，就开始自己写曲子。到现在已经离不开钢琴了。", options:[
    {txt:"十二年，好厉害", reply:"厉害谈不上，只是坚持得比较久。其实音乐这事没有捷径，就是反复练。有时候一段旋律弹一百遍还是不满意，但不弹到满意又睡不着。", eff:1},
    {txt:"你小时候哭的样子好想看看", reply:"……那不行。我妈说那时候我哭得满脸鼻涕，还一边哭一边弹，琴键都是湿的。这种黑历史绝对不能让你看到证据。", eff:2},
    {txt:"那你有没有想过放弃？", reply:"有过。高二的时候有一段时间什么都写不出来，觉得自己没天赋。后来有个人告诉我，我弹的曲子很好听。就这一句话，让我撑过了最难的时候。那个人就是你。", eff:4}
  ]},
  { id:115, trigger:"今天考试好难", reply:"我也觉得！尤其是最后一道数学大题，我写了半页纸才发现公式用错了，全划掉重写，卷面分估计都没了。你考得怎么样？", options:[
    {txt:"我也是那道题卡了好久", reply:"看来不是我们两个的问题，是题目太变态了。放学后要不要一起去咖啡店对一下答案？顺便把错题整理出来，下次考前复习用。", eff:2},
    {txt:"我选择题最后几题全蒙的", reply:"哈哈我也是！有几题我看都没看懂，蒙了一串C。老师说不会就选C，希望老师说的对。过几天发成绩的时候我们再一起紧张。", eff:1},
    {txt:"考完就不想了，反正都过去了", reply:"你这个心态好。我每次考完都会纠结很久，晚上翻来覆去想那道题到底选A还是B。你得教我一下这种豁达的心态。", eff:2}
  ]},
  { id:116, trigger:"你说人为什么要长大呢？", reply:"突然这么哲学？不过我也想过这个问题。长大意味着可以做更多自己喜欢的事，比如我可以自己决定去哪个城市、学什么专业。但也有代价，比如不能再以学生的身份待在琴房里了。", options:[
    {txt:"我不想离开高中", reply:"我也不想。这里的天台、琴房、还有每天都会经过走廊的人——都舍不得。但我们总要往前走。走到下一个地方，也会有新的天台和新的琴房。", eff:3},
    {txt:"长大就可以自由恋爱了", reply:"……这个话题转得有点快。不过确实，在高中谈恋爱会被老师说、被家长问。但有些感情，不是不想说，是觉得还没到最好的时机。", eff:4},
    {txt:"我还没想好以后要做什么", reply:"没关系，很多人都没想好。我也是高一快结束时才确定要走音乐这条路。不用着急，先做好眼前的事，以后的路会慢慢清楚的。", eff:2}
  ]},
  { id:117, trigger:"你收到过情书吗？", reply:"……怎么突然问这个。收过几封，有些放在抽屉里，有些是朋友转交的。但说实话，我喜欢自己写曲子胜过写情书。所以如果以后我真的喜欢一个人，可能会用一首歌来代替信。", options:[
    {txt:"那你有写过给谁吗？", reply:"写过一首。不过还没给对方听。在U盘里存着，文件名改成了「待定」，其实心里早就知道是给谁的了。等我觉得时机合适了，就给。", eff:4},
    {txt:"那你的歌会比情书更打动人", reply:"希望如此。写歌比写情书更难，因为音符骗不了人。如果你在一首歌里听到了心跳声，那可能是我录音时太紧张了，也可能是别的原因。", eff:3},
    {txt:"你收的情书里有没有让你心动的？", reply:"有一封写得很真诚，说她在琴房门口站了好久，等了好久才鼓起勇气进来。不过那是别人的心意，我认真回了信，说了谢谢。有些缘分，需要一个特别的时机才能发生。", eff:2}
  ]},
  { id:118, trigger:"你信星座吗？", reply:"半信半疑。我是天秤座，朋友说天秤座优柔寡断，选个菜单都要纠结半天。但我觉得自己在音乐上挺果断的，一段旋律不行就直接推翻重写，从来不犹豫。", options:[
    {txt:"天秤座出了很多艺术家", reply:"是吗？我不知道。不过如果星座能解释我为什么每次弹琴都会想太多，那我认。有时候弹着弹着就走神，想到一个和曲子无关的人。", eff:2},
    {txt:"那你会看星座运势吗？", reply:"偶尔。今天早上看了一眼，说天秤座今天适合表达内心想法。所以我这不就在和你聊天了吗？运势说的也不全是瞎话。", eff:3},
    {txt:"不信，人的性格和星座没什么关系", reply:"你说得也有道理。但有时候星座是个好借口——比如我今天不想写作业，就说天秤座今天不宜动脑。虽然很牵强，但好用。", eff:1}
  ]},
  { id:119, trigger:"你有没有最害怕的事？", reply:"有。最怕有一天我写不出任何旋律，打开琴盖什么都弹不出来。那种感觉光是想象就让我喘不过气。音乐是我表达自己的方式，如果失去了它，我不知道该怎么和别人说话了。", options:[
    {txt:"你不会的，你写的每一首都很好听", reply:"谢谢你。这种话对我真的很重要。有时候半夜写不出歌，我就翻之前的聊天记录，看你以前给demo写的反馈。看着看着就又有动力了。", eff:3},
    {txt:"我也有害怕的事，怕被遗忘", reply:"你不会被遗忘的。至少我不会。就算以后去了不同的城市，你的声音、你走路的样子、你经过琴房时的脚步声——我都记得。用音乐家的记忆力保证。", eff:4},
    {txt:"害怕是正常的，说明你在乎", reply:"你说得对。害怕失去说明我真的在乎。所以我会继续写下去，写到写不动为止。只要还有一个人愿意听，我就有理由继续。", eff:2}
  ]},
  { id:120, trigger:"你觉得十年后的我们会是什么样子？", reply:"十年后……那时候我们都快三十岁了。我应该会在某个城市做音乐相关的工作，写歌、编曲、也许偶尔上台演出。你呢？你有什么十年后的想象？", options:[
    {txt:"我希望还能听到你的歌", reply:"那你一定会听到。不管我在哪里，都会把新歌发给你。这是我从高中就开始的承诺，十年后也不会变。你可以当我的终身听众。", eff:4},
    {txt:"希望我们还保持联系", reply:"不止是保持联系。我希望十年后我们能面对面坐着，喝咖啡或者喝奶茶，聊聊这些年的变化。然后我弹一首十年前写的曲子，你还能哼出它的旋律。", eff:3},
    {txt:"我还没想过那么远", reply:"没关系，十年后的事慢慢来。但如果你偶尔想到什么关于未来的画面，可以告诉我。我想把我的画面和你的画面拼在一起看看。", eff:2}
  ]},
  { id:121, trigger:"你喜欢猫还是狗？", reply:"都喜欢，但更喜欢狗。小时候养过一只白色的马尔济斯，叫'音符'。它特别喜欢趴在我的琴凳下面听我弹琴，有时候弹太久了它就用爪子扒拉我的腿，提醒我该休息了。", options:[
    {txt:"音符这个名字好可爱", reply:"是我妈起的。她说这只狗一听钢琴声就安静下来，所以叫音符。后来它老了，听力不太好了，但还是会趴在琴凳下面。我弹再难的曲子，它都睡得特别香。", eff:2},
    {txt:"我也养过狗，是只金毛", reply:"金毛好聪明！我邻居家就有一只，每次我弹吉他的时候它就在阳台上歪着头看。我觉得动物其实听得懂音乐，只是表达的方式和我们不一样。", eff:1},
    {txt:"那现在音符在哪？", reply:"它去年不在了。我写了一首曲子纪念它，叫《琴凳下的听众》。那首曲子我没有公开，只在琴房里弹给自己听。今天告诉你这件事，下次也许可以弹给你听。", eff:3}
  ]},
  { id:122, trigger:"你每次上台前会做什么？", reply:"先在后台找一面镜子，确认衬衫领口没有翻歪。然后找一个安静的角落坐五分钟，闭上眼睛把第一段旋律在脑子里过一遍。如果有熟人在台下，我会在人群中找那个人，看到了就不紧张了。", options:[
    {txt:"上次校庆你在找谁？", reply:"你看到我在找了？其实每次上台我都会找同一个人。如果找到了，整场表演都会很稳。如果没找到，就会有点心不在焉。上次校庆你没在后台，我在台上扫了好几圈。", eff:4},
    {txt:"下次我帮你整理领口", reply:"你上次帮过我了。那次之后我就想，要是每次上台前都有你在就好了。不过我也不能太依赖你，不然哪天你不在，我可能衬衫扣子都扣错。", eff:3},
    {txt:"你从来不会紧张到忘词吗？", reply:"当然会。有一次在外面演出，副歌部分直接忘了两句话，硬着头皮用'啦啦啦'糊过去的。下台后朋友说完全没听出来。所以紧张的时候假装不紧张，观众真的看不出来。", eff:2}
  ]},
  { id:123, trigger:"你有后悔过的事吗？", reply:"有。高二那年，有一次你在走廊上叫住我，问我能不能帮你看看英语作文。我当时急着去琴房占位，说'等会儿'就走了。后来你找了别人。那件小事我一直记得，不知道为什么就是忘不掉。", options:[
    {txt:"我都忘了这件事了", reply:"你没忘。我记得你当时拿着一本英语书站在饮水机旁边，穿了一件粉色的卫衣。我走的时候回头看了一眼，你已经转身了。那件卫衣后来再也没见你穿过。", eff:4},
    {txt:"那下次你帮我补回来", reply:"好，从现在开始，你每次需要帮忙我都认真帮。不管是英语作文还是别的什么。这句话没有期限。", eff:3},
    {txt:"后悔的事也是人生的一部分", reply:"你说得对。所以我现在尽量不让自己再有更多后悔的事。有时候想说的话就说了，想见的人就去见。因为不知道下次还有没有机会。", eff:2}
  ]},
  { id:124, trigger:"你喜欢喝什么饮料？", reply:"香蕉牛奶，你早知道了。除此之外就咖啡，美式的，练琴熬夜必备。其实我小时候喜欢喝草莓牛奶，后来有一次在便利店试了香蕉口味，就再也回不去了。你呢？", options:[
    {txt:"我也喜欢香蕉牛奶", reply:"看来我们在饮料上有共同的品味。以后如果开音乐工作室，冰箱里一定放满香蕉牛奶。来找我的客人不喝茶不喝咖啡，只喝香蕉牛奶。", eff:2},
    {txt:"我更喜欢奶茶", reply:"奶茶也好的。不过珍珠有时候会堵住吸管，很烦。下次你请我喝奶茶，我请你喝香蕉牛奶，我们互相品尝对方的品味。", eff:1},
    {txt:"我其实不太爱喝甜的", reply:"那下次给你试试美式。一开始可能觉得苦，喝到后面有回甘。就像练琴，刚学的时候很痛苦，后面慢慢就品出甜味了。", eff:2}
  ]},
  { id:125, trigger:"你有没有偷偷做过什么坏事？", reply:"初中的时候逃过一节补习班的课，跑去游戏厅打了一下午架子鼓游戏。回家被我妈发现，罚我练了三小时钢琴。结果练着练着写出了一段旋律，因祸得福。", options:[
    {txt:"逃课还能写出歌，天才啊", reply:"不是天才，是运气好。那种事只干过一次，后来就老实了。现在偶尔会想，如果当时没逃课，那段旋律是不是永远不会出现。人生真的很有意思。", eff:2},
    {txt:"那你现在还敢逃课吗？", reply:"不敢了。而且现在没有需要逃的课。但是如果有个人说'今天别练琴了出去走走'，我可能会听。前提是那个人是你。", eff:3},
    {txt:"我也逃过课，但是去买零食", reply:"零食和游戏厅，都是少年时代的快乐源泉。下次逃课这种坏事我们还是别做了。不过如果是为了去天台听风吹琴弦的声音，那个可以不算逃课。", eff:2}
  ]},
  { id:126, trigger:"你觉得自己最帅的瞬间是什么时候？", reply:"……这问题好自恋。我不觉得自己帅，但我觉得自己弹钢琴的时候比较自在。那种状态下我不会想自己帅不帅，只觉得时间过得很快。", options:[
    {txt:"你在台上弹吉他的时候确实很帅", reply:"那是灯光效果。化妆师给我涂粉底涂得像换了一张脸。不过如果你觉得帅，那我以后就多上台。反正台下有一个人在认真看，就够了。", eff:3},
    {txt:"我觉得你不弹琴的时候也挺帅的", reply:"……你这么说我接不住。那我反问你，你觉得你自己最好看的瞬间是什么时候？不能只让我一个人尴尬。", eff:4},
    {txt:"自信的人都很帅", reply:"那我以后尽量自信一点。以前总觉得自己写的歌不够好，但每次你听完都认真给反馈，那种被认真对待的感觉，比任何灯光都让人自信。", eff:2}
  ]},
  { id:127, trigger:"你过节一般怎么过？", reply:"我们家过节很传统。中秋节吃松饼，春节吃年糕汤。我奶奶每次都会塞给我一堆吃的，然后说'太瘦了多吃点'。其实我不瘦，但在奶奶眼里永远是小孩。你呢？", options:[
    {txt:"我们家也会聚在一起吃饭", reply:"过节的意义大概就是聚在一起吃顿饭吧。平时大家都忙，只有过节才有借口停下来。如果你过节无聊，可以发消息给我，我陪你聊天。", eff:2},
    {txt:"有时候觉得过节很累", reply:"我也觉得。亲戚们会问'有女朋友吗'、'以后干什么'，问得我头大。但我有个秘密武器——一说'我要练琴'，所有人都会立刻放过我。你下次可以试试说'我要弹钢琴'。", eff:1},
    {txt:"今年过节可以一起过吗？", reply:"一起过？你是说一群同学还是……两个人？如果是后者，我得提前跟我妈报备一下。不过我想她会很高兴的，上次她见过你之后一直问我你什么时候再来。", eff:4}
  ]},
  { id:128, trigger:"你觉得首尔怎么样？", reply:"首尔很大，也很吵。但有它自己的节奏。我喜欢夜晚的弘大，街头艺人弹吉他的声音和车流声混在一起，有一种乱糟糟的活力。以后如果搬去首尔，我想在弘大附近租一间小公寓，窗户可以看见街景。", options:[
    {txt:"我也想去首尔上大学", reply:"那就去吧。首尔的大学有很多好的专业，而且如果你来了，我就有理由把写歌的地点从练习室搬到咖啡店——因为你说你喜欢去咖啡店。", eff:3},
    {txt:"首尔太大了，我怕迷路", reply:"有导航不会迷路的。如果真的迷路了就打电话给我，我来接你。在首尔我跑了不少地方，地铁几号线到哪儿我都背下来了。", eff:2},
    {txt:"我们现在的城市也很好", reply:"是好。这里有高中三年所有的回忆，有天台和琴房，还有很多别的城市没有的东西。但人总要往外走一步，才能知道外面有什么。", eff:1}
  ]},
  { id:129, trigger:"你的吉他是什么颜色的？", reply:"原木色的，面板有点泛黄，是弹久了留下的痕迹。这把吉他是初中时我爸送我的，虽然旧了，但音色还是很好。每把吉他有自己的性格，这把的性格是'温柔但有点固执'。", options:[
    {txt:"温柔但固执，像你", reply:"你这是在夸我还是损我。不过你这么说也对。我对音乐很固执，一段旋律不改到满意不罢休。但对在意的人，我希望自己温柔一点。", eff:3},
    {txt:"你会换一把新吉他吗？", reply:"想换但舍不得。这把吉他陪了我很多年，琴身上有一道划痕是高一的时候不小心磕的，那时候正在写第一首完整的曲子。每一道痕迹都是一个记忆。", eff:2},
    {txt:"下次让我摸摸你的吉他", reply:"好啊，不过别弹太用力，琴弦会断。上次有个同学来玩，弹了一首重金属，把我的弦弹断了一根。你肯定不会这样，我教你一首简单的。", eff:1}
  ]},
  { id:130, trigger:"你有一句话一直没说出口吗？", reply:"有。憋了很久了，写进歌里又删掉，对着镜子练习了很多遍还是说不出来。因为说出来以后，所有事情都会改变。我怕那种改变，但又怕错过说出来的时机。", options:[
    {txt:"如果是对的人，说出来就不会后悔", reply:"你是在给我建议还是在暗示我什么？如果是建议，我收下了。如果是暗示——那我需要再考虑一下怎么回应。这种时候天秤座的优柔寡断就暴露了。", eff:4},
    {txt:"我也有一句话没说出口", reply:"那我们算是同病相怜。也许有一天，某个合适的时刻，我们都能把憋着的话说出来。不用很多字，几个字就够了。", eff:3},
    {txt:"有些话不说出口也是一种温柔", reply:"你说得对。有时候留着那句话，比说出来更让人珍惜。但我怕有一天错过了，再也没有机会说了。所以如果有那么一个瞬间，我觉得该说的时候，我不会犹豫。", eff:2}
  ]},
  { id:131, trigger:"你记得我们第一次说话是什么时候吗？", reply:"当然记得。是高一刚开学不久，你在音乐教室门口找丢失的英语书，我在里面弹琴。你推门进来的时候我弹错了一个音，然后你问有没有看到一本蓝色封面的书。我说没有，你道了谢就走了。后来我在钢琴下面找到了那本书，但你已经走了。第二天我把书放在你桌上，什么都没说。", options:[
    {txt:"原来那本书是你放的", reply:"你以为是谁？天使吗？我也想过留纸条，但不知道写什么。那是我第一次帮别人做一件事不说是自己做的。后来你好像一直不知道是我。", eff:3},
    {txt:"我当时以为是自己忘了放哪了", reply:"你确实忘了。它掉在琴凳下面，可能是前一天你去琴房的时候落下的。我那天弹的曲子是《River Flows in You》，你去的时候正好弹到副歌。所以以后每次弹那首，我都会想起有人推门进来。", eff:4},
    {txt:"这个记忆好珍贵", reply:"是啊，那时候我还不太认识你，只是觉得这个女生掉了东西一定很着急。现在回忆起来，那也许是我们第一次有交集——虽然当时谁都没有意识到。", eff:2}
  ]},
  { id:132, trigger:"你最喜欢哪个季节？", reply:"秋天。首尔的秋天很美，银杏叶把整条街铺成金黄色。而且秋天开学不久，还没有考试的压力，琴房外面的天空特别高特别蓝。这个季节让人想写一些温暖的旋律。", options:[
    {txt:"秋天也是我最喜欢的季节", reply:"看来我们又有一个共同点。那就约好今年秋天一起去看银杏叶吧。我知道一条街上全是银杏树，很适合散步。你要是想带相机就带着，虽然我不太会拍照。", eff:3},
    {txt:"我喜欢春天，樱花很美", reply:"春天也不错。樱花飘进琴房里的时候很好看，但花期太短了，总让人觉得没看够就没了。秋天给人的感觉更从容，像一首慢板的曲子。", eff:2},
    {txt:"每个季节都有它好的地方", reply:"你这个答案很哲学。确实，每个季节都有好的一面。但如果非要选一个季节和某个人一起度过，我会选秋天。因为秋天适合弹琴，也适合把憋了很久的话说出口。", eff:4}
  ]},
  { id:133, trigger:"你做过最疯狂的梦是什么？", reply:"梦到自己在鸟巢开了一场十万人演唱会。我弹钢琴的时候全场都安静了，然后我对着麦克风说了一句话，但醒来以后怎么都想不起那句话是什么。可能是想说谢谢一个人。", options:[
    {txt:"说不定有一天真的会实现", reply:"如果真的实现了，我会在演唱会中途停下来，指着第一排最中间的座位说'这个位置是留给一个人的'。那个人不一定要上台，但一定在观众席里。", eff:3},
    {txt:"你会对谁说谢谢？", reply:"醒来后我想了很久。可能是对妈妈说谢谢，也可能是对一个一直在听我音乐的人说谢谢。那个梦太真实了，我到现在还记得舞台灯光的温度和空气里干冰的味道。", eff:2},
    {txt:"我也梦到过你弹琴", reply:"真的？在你梦里我弹得好吗？如果弹错了你就当没听见。梦里的钢琴水平不是我能控制的，但你可以随便点歌。", eff:2}
  ]},
  { id:134, trigger:"你觉得缘分会持续多久？", reply:"我不知道缘分有没有保质期。但我相信缘分不是随机发生的。两个人在同一个学校、同一个班级、同一间琴房里相遇，是需要很多巧合组合在一起才能实现的。", options:[
    {txt:"那我们算是有缘分吗？", reply:"当然算。你想想，全校那么多人，偏偏是你每个清晨经过琴房。偏偏是我每次弹琴的时候你刚好在门外。这种概率低到不可思议。所以我不信这是偶然。", eff:4},
    {txt:"缘分如果不用心经营就会断掉", reply:"你说得对。所以我现在在努力维系着一些重要的缘分。比如每天早上去琴房练琴——其实有时候想多睡一会儿，但想到可能会有人经过，就还是去了。", eff:3},
    {txt:"缘分这个词听起来很浪漫", reply:"浪漫是浪漫，但也让人紧张。因为太珍贵的东西总是怕失去。所以我现在尽量珍惜每一次对话、每一个瞬间。万一以后走散了，至少没有遗憾。", eff:2}
  ]},
  { id:135, trigger:"你觉得自己是大人还是小孩？", reply:"在法律上我还没成年，所以算是小孩。但有时候我觉得自己已经过了孩子的年纪。因为孩子不会半夜因为一段旋律辗转反侧，也不会因为一个人的一句话开心一整天。", options:[
    {txt:"在父母眼里我们永远是小孩", reply:"是啊，我妈现在还问我'作业写完了吗'，好像我只有十岁。但有些时候，我觉得自己比她想的成熟多了。比如我知道自己想要什么，也知道谁对我很重要。", eff:2},
    {txt:"长大是一瞬间的事吗？", reply:"我觉得是的。可能是第一次写出一首完整的歌的时候，也可能是第一次意识到某个人对你来说不太一样的时候。那个瞬间你不会觉得自己在长大，但回头看就知道了。", eff:3},
    {txt:"我希望自己永远不要变成无趣的大人", reply:"你不会的。一个会为了听琴声故意绕路的人，怎么可能变成无趣的大人。就算八十岁了，你还是会记得十七岁那年的某个清晨，和琴房里传来的旋律。", eff:4}
  ]},
  { id:136, trigger:"今天食堂的炸猪排好硬", reply:"你也吃到了？我以为只有我那块这么硬，切了半天切不断。最后我用筷子戳着整块咬着吃，旁边的人都在笑我。以后食堂出炸猪排我们得提前通知彼此避雷。", options:[
    {txt:"我咬得腮帮子都酸了", reply:"下次我们自带午餐吧。你做你的便当，我做我的三明治，然后在食堂交换一半。这样就算食堂的菜不好吃，也有可吃的。", eff:2},
    {txt:"但配的酱料还不错", reply:"那个酱确实好，酸酸甜甜的。我正在想能不能把那个酱料配方研究出来，以后做炸鸡的时候用。如果能成功，第一时间让你试吃。", eff:1},
    {txt:"不如放学后去外面吃好的", reply:"好主意，补偿一下今天中午的味蕾。我知道一家炸猪排店，他们家的猪排外酥里嫩，和今天食堂的根本不是一个物种。要不要一起去？", eff:3}
  ]},
  { id:137, trigger:"你有没有一首歌是写不下去的？", reply:"有，很多。其实我电脑里有一个文件夹叫'废弃片段'，里面存了大概四五十段没写完的旋律。有些只写了开头，有些写了一大半但副歌怎么改都不对。写不完的歌比写完的多。", options:[
    {txt:"我可以听听那些废弃片段吗？", reply:"你要听？那些可都是半成品，有些还有我试唱时走音的录音。不过如果你坚持要听，我可以挑一两段不那么丢人的给你。", eff:2},
    {txt:"写不下去就留着，以后可能会有灵感", reply:"你说得对。有时候放下一段时间，再回来听就能发现当时的问题在哪里。有一首歌我放了大半年，后来重新听才发现换个调就顺了。", eff:1},
    {txt:"那些写不完的歌里，有没有写给谁的？", reply:"有。有一首写了很久很久，歌名都改了三次。不是写不完，是不敢写完。因为怕写完之后要面对歌里说的那些话。等我不怕的时候，一定让你第一个听。", eff:4}
  ]},
  { id:138, trigger:"你知道自己有什么小习惯吗？", reply:"别人告诉我的有：想事情的时候用笔敲桌子，紧张的时候摸后颈，弹琴到投入的时候眼睛会闭起来。还有人说我不自觉哼歌，走在路上也是。我自己完全没察觉。", options:[
    {txt:"你上课敲桌子的节奏是某首歌的", reply:"被你发现了。上次数学课我敲的是《天台的风》副歌的节奏，因为那道题想不出来，脑子自动切换到音乐模式了。以后你可以根据我敲的节奏判断我在想哪首歌。", eff:2},
    {txt:"你哼歌的时候声音很好听", reply:"真的吗？我以为自己哼得很小声没人能听到。以后在你旁边我尽量控制一下，不过如果哼起来了你别打断，让我把那段旋律哼完。", eff:2},
    {txt:"紧张的时候摸后颈，这个我注意过", reply:"你观察得这么仔细？那以后我紧张的时候你帮我看看是不是后颈红了。如果红了就提醒我一下，我好调整呼吸。", eff:3}
  ]},
  { id:139, trigger:"你最想对十年前的自己说什么？", reply:"十年前我才七岁，还在被妈妈逼着练琴。我会对那个小孩说：别哭了，好好练，以后你会感谢这段日子。而且以后你会遇到一些人，她们会成为你写歌的理由。所以别怕。", options:[
    {txt:"七岁的你听到这些话会信吗？", reply:"可能不会。他太小了，只知道手指酸、想出去玩。但如果他信了，也许可以少哭几次。不过哭也没关系，眼泪也是成长的养分。", eff:2},
    {txt:"那你对十年后的你想说什么？", reply:"想说：喂，你现在的歌写得怎么样了？如果还在写的话，别忘了把新歌发给一个人。如果忘了的话，现在就去发。别让十七岁的约定过期。", eff:4},
    {txt:"你小时候应该是个可爱的孩子", reply:"我妈说我是'磨人精'，又爱哭又倔。但每次我弹完一首曲子，她都会抱我一下。所以我相信，被逼着练琴的小孩也是被爱着的。谢谢你关心那个小孩。", eff:3}
  ]},
  { id:140, trigger:"如果有人把你写进歌里你会怎样？", reply:"我会很感动。因为写歌的人把自己的情绪和想法缝进了每一个音符里。如果有人愿意花这个时间把我变成一段旋律，那说明我在她心里有一定的分量。", options:[
    {txt:"要是那个人就在和你聊天呢？", reply:"……你说真的吗？如果是真的，那我想听。不管是什么风格、写得好不好，我都会认真听，然后保存下来。因为是写给我的。", eff:5},
    {txt:"你觉得被写进歌里浪漫吗？", reply:"很浪漫。比写情书更浪漫。因为歌可以被反复播放，情书总有一天会磨损。一段旋律可以保留几十年，头发白了还能哼出来。", eff:3},
    {txt:"那你写过的歌里，有没有真实的人物？", reply:"有。虽然我从来不写名字，但每一首歌的背后都有一个人、一个地方或一个时刻。有些歌被粉丝分析歌词含义，但只有我自己知道，那是在写某个特定的清晨和某个特定的人。", eff:4}
  ]},
  { id:141, trigger:"你喜欢的颜色是什么？", reply:"深蓝色。不是那种很亮的蓝，是傍晚天空快黑之前的那种蓝。在这种颜色下弹琴特别有感觉，仿佛整个世界都在安静地听你演奏。我的第一把电吉他就是深蓝色的。", options:[
    {txt:"深蓝色让人平静", reply:"是的。有时候写歌写烦了，就穿件深蓝色的衣服出去走走。好像那种颜色能吸收所有的噪音和焦虑。下次送你一个深蓝色的东西，你觉得什么好？", eff:2},
    {txt:"我喜欢粉色", reply:"粉色也很好。深蓝色配粉色其实挺好看的，像傍晚天空里的晚霞。你看，连我们喜欢的颜色都能搭配在一起。", eff:2},
    {txt:"深蓝色和你安静的时候很像", reply:"……你这是在分析我？不过你说得挺准的。安静的时候我确实像傍晚，话少但心里在响着旋律。谢谢你看懂这一层。", eff:3}
  ]},
  { id:142, trigger:"你偷过懒吗？", reply:"当然偷过。上个月音乐作业要交一首改编曲，我拖到最后一天晚上才开始弄，熬到凌晨三点。结果因为太困把和弦配错了，被老师当堂纠正。丢脸丢大了。", options:[
    {txt:"我也经常拖到最后一天", reply:"那我们都有拖延症。以后要不要互相监督？比如你说你的作业截止日期，我说我的表演日期，到了前一天就互相提醒。免得又出现凌晨三点赶作业的情况。", eff:2},
    {txt:"熬夜写歌不值得，注意身体", reply:"你比我妈还啰嗦。不过这种啰嗦我听进去了。以后尽量不熬那么晚，毕竟身体不好就没法弹琴。你也是，别老熬夜复习。", eff:1},
    {txt:"那首改编曲后来改好了吗？", reply:"改好了，重新配了和弦，老师后来在课堂上表扬了。但我心里知道，那首歌能改好是因为有人在课间问我'你的音乐作业交了吗'——是你提醒了我。", eff:3}
  ]},
  { id:143, trigger:"你说过最丢脸的话是什么？", reply:"小学时候在全校面前说要当钢琴家，结果弹错了十几个音，下台就哭了。还有高一的时候有一次和你说话，把'再见'说成了'再练'，改口说'我是说下次再练琴'，然后就跑了。", options:[
    {txt:"再练？我不记得这件事", reply:"你不记得最好。那天我回到座位上后懊恼了整整一节课，在本子上写满了'不能说错话不能说错话'。后来每次和你说话前都会在脑子里先过一遍。", eff:3},
    {txt:"钢琴家这个梦想还在吗？", reply:"还在。虽然现在知道当钢琴家很难，但我还是想靠音乐过一辈子。不一定非得成为什么家，能写歌、能弹琴、能有几个人在听，就够了。", eff:2},
    {txt:"你在我面前从来没说过丢脸的话", reply:"因为你总是很认真地听。在你面前我觉得说不说错话都没关系，说完就笑一下继续聊。这大概就是信任吧。", eff:4}
  ]},
  { id:144, trigger:"你今天穿的什么颜色？", reply:"校服啊，白色衬衫和深蓝色裤子。但袜子穿了一双灰色的，上面有个小洞——早上出门太急没注意。你别告诉别人，我人设会崩的。", options:[
    {txt:"我不会说出去的，这是我们的秘密", reply:"好，你替我保密袜子的事，我替你保密你不经意间哼我demo的事。扯平了。以后互相掌握对方一个微不足道的秘密。", eff:2},
    {txt:"你要不要放学去买新袜子？", reply:"和你一起去？买袜子这种日常到极点的活动好像有点奇怪，但如果是和你一起，好像也挺有意思的。你帮我挑一双不会出洞的。", eff:3},
    {txt:"穿破袜子的人设也挺可爱的", reply:"可爱？你管这叫可爱？不过我大概懂你的意思——不完美的一面有时候更真实。好吧，那我以后可以偶尔暴露一点不完美。", eff:2}
  ]},
  { id:145, trigger:"你最想去的地方是哪里？", reply:"爱尔兰。那里有很多风笛和小提琴，草原上的风声可以填满整首歌。以后如果有机会，我想去那里住一段时间，写一张专辑，专辑名字就叫《风里有音符》。", options:[
    {txt:"你去的时候带上我吧", reply:"好。不过爱尔兰有点远，你得先征得你爸妈同意。我可以用音乐人的身份自荐——就说我需要一个最懂我音乐的旅行同伴，那个人就是你。", eff:4},
    {txt:"爱尔兰的音乐很有名", reply:"对啊。那里的传统音乐有一种说不出的苍凉感，听着就像站在悬崖边上迎着大西洋的风。我想把我的歌也写出那种感觉。", eff:2},
    {txt:"我想去的地方就在你旁边", reply:"……你这样说我真的会脸红。不过谢谢你。有时候我总觉得远方才是最好的，但你说的可能是对的——最好的地方也许就是某个日常的位置。比如琴房门口，比如便利店门口的长椅。", eff:5}
  ]},
  { id:146, trigger:"你有没有因为音乐哭过？", reply:"有。不是练琴辛苦哭了，是第一次写出完整的旋律时，弹着弹着就哭了。因为终于写出了一首属于自己的曲子。后来给一个人听了，她说副歌部分很打动人，我又眼眶热了一次。", options:[
    {txt:"那个人是我吗？", reply:"是你。当时你还写了半页纸的反馈，字迹有点歪，但每个建议都说到了我心里。那张纸我一直留着，放在乐谱本最前面。有时候写不下去就翻出来看看。", eff:4},
    {txt:"音乐家也会哭啊", reply:"会。音乐家也是人，只是把眼泪变成了音符。有时候一首歌里放了多少感情，只有写的人自己知道。听的人能感受到一半，已经很了不起了。", eff:2},
    {txt:"我希望你以后只为感动哭", reply:"嗯，以后我尽量不为难过的事哭，只为写出一段好旋律，或者为一个人对我说的话。那种眼泪是暖的。", eff:3}
  ]},
  { id:147, trigger:"你相信平行宇宙吗？", reply:"信。我觉得在某个平行宇宙里，我没有学钢琴，没有写歌，也没有在这个学校遇到你。那个宇宙的我过得应该很普通，但一定少了某种重要的东西。", options:[
    {txt:"那这个宇宙里的你幸福吗？", reply:"幸福。虽然有时候写歌很痛苦、练琴很累，但这个宇宙里有一个会认真听我每一首demo的人。在其他宇宙里可能没有，所以我选择留在这个宇宙。", eff:4},
    {txt:"如果真的有平行宇宙，你想去哪个？", reply:"不去。我只想待在这个宇宙里，因为这里有已经发生的故事。那些故事是我写的歌的土壤，拔掉就写不出现在的旋律了。", eff:3},
    {txt:"说不定另一个宇宙里我们是陌生人", reply:"那太可惜了。不过我猜，即使在另一个宇宙，如果在走廊上擦肩而过，我也一定会停下来，因为你走路的声音有一种……说不上来，但我认得出来。", eff:4}
  ]},
  { id:148, trigger:"毕业以后你会忘了我吗？", reply:"……怎么可能忘。你是我见过最认真的听众。而且高中三年有很多事情，没有你的话根本不会发生。我不会忘记，也不会让这段记忆模糊掉。", options:[
    {txt:"你说的，不可以忘", reply:"我说的。如果哪天我觉得自己快忘了，就翻出以前的聊天记录和demo反馈，从头看一遍。不过应该用不上，因为有些东西想忘也忘不掉。", eff:3},
    {txt:"我也会记得你", reply:"那就好。以后不管去了哪座城市，如果我们再见面，你还能说出我demo的名字，我就把那首歌再弹一遍给你听。这是未来的约定。", eff:4},
    {txt:"毕业不是结束", reply:"对，毕业只是一个逗号。后面还有很多可以写的故事。这首歌还没唱完，副歌才刚开始。", eff:3}
  ]},
  { id:149, trigger:"你现在在想什么？", reply:"在想一首歌的结尾。这首歌写了很久，主歌和副歌都有了，但结尾一直空着。因为这首歌是关于一个一直陪伴我的人，而我们的故事还没结束，所以结尾没法写。", options:[
    {txt:"那就等故事有了结局再写", reply:"但可能我们的故事很长很长，需要很多年才会有结局。也许这首歌要等到我们七老八十才能完成。那时候的结尾一定是温暖的，因为经历了那么多。", eff:4},
    {txt:"没有结尾的歌也是一种美", reply:"你说得对。留白的结尾让听众自己想象。但我还是想给它一个句号，一个确定的、不模糊的结尾。希望将来有一天，我们能一起把那最后一段旋律写上去。", eff:3},
    {txt:"写一首新的吧，这首先留着", reply:"好，先留着。就像把还没说完的话存在银行里，以后有合适的时机再取出来。谢谢你一直在听这首歌的每一个版本。", eff:2}
  ]},
  { id:150, trigger:"如果明天就是世界末日，你今天会做什么？", reply:"我会带着吉他去天台，把所有写给某个人但还没给她听的歌都弹一遍。然后给那个人发一条消息，消息内容只有几个字。不是告别，是我想了三年都没说出口的那句话。", options:[
    {txt:"你会发什么？", reply:"就四个字。但我不现在说。如果明天真的是世界末日，那你会知道的。如果不是，那就留到合适的时候再说。但不管哪种情况，你都是第一个知道的人。", eff:5},
    {txt:"那我也去天台，和你一起弹", reply:"好。我们一起坐在天台边上，你把歌词本带着，我弹你唱。世界末日的时候能这样度过，也不算遗憾。不过我更希望没有末日，我们还有很长的未来。", eff:4},
    {txt:"但愿明天不是末日", reply:"放心吧，明天太阳还会升起来，琴房还会开门。我们还是会在走廊上碰到，你还是会经过琴房。故事还没结束，我不会让它结束。", eff:3}
  ]}
);
  function getRandomChatTopic() {
    const available = CHAT_TOPICS.filter(c => !usedChatIds.includes(c.id));
    if (available.length === 0) { usedChatIds = []; return CHAT_TOPICS[Math.floor(Math.random()*CHAT_TOPICS.length)]; }
    const topic = available[Math.floor(Math.random()*available.length)];
    usedChatIds.push(topic.id);
    return JSON.parse(JSON.stringify(topic));
  }

  function getRandomEvent() {
    if (usedEventIds.length >= EVENT_POOL.length) usedEventIds = [];
    const available = EVENT_POOL.filter(e => !usedEventIds.includes(e.id));
    const evt = available[Math.floor(Math.random() * available.length)];
    usedEventIds.push(evt.id);
    return JSON.parse(JSON.stringify(evt));
  }

  function generateTurn() {
    if (gameFinished) return null;
    const base = getRandomEvent();
    currentEventObj = base;
    currentOptions = base.opts;
    return { header: `📖 第 ${turn} 回合 · ${base.title}`, story: base.desc, relation: `💗 关系：${stage} · 心意值 ${Math.floor(affection)}`, options: currentOptions };
  }

  let currentState = null;

  function renderGame() {
    if (gameFinished) return;
    if (!currentState) currentState = generateTurn();
    const container = document.getElementById("dynamicContent");
    let optHtml = "";
    currentState.options.forEach((opt, idx) => { optHtml += `<div class="choice-btn" data-opt="${idx}">${opt.txt}</div>`; });
    container.innerHTML = `<div class="round-header">${currentState.header}</div><div class="story-box">${currentState.story}</div><div class="relation-box">${currentState.relation}</div><div class="choices" id="actionList">${optHtml}</div>`;
    document.querySelectorAll('.choice-btn').forEach(btn => {
      btn.addEventListener('click', (e) => { if (isChoosing) return; handleChoice(parseInt(btn.dataset.opt)); });
    });
    isChoosing = false; chatUsedThisTurn = false; checkAutoMessages();
  }

  function showPopup(feedback, callback) {
    isChoosing = true;
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    const overlay = document.createElement('div'); overlay.className = 'chat-overlay';
    overlay.innerHTML = `<div class="chat-popup"><strong>💬 李羲承：</strong>${feedback}</div>`;
    document.body.appendChild(overlay);
    let canClose = false;
    setTimeout(() => { canClose = true; }, 2500);
    const closePopup = () => {
      if (canClose && document.body.contains(overlay)) {
        overlay.remove();
        document.querySelectorAll('.choice-btn').forEach(b => b.disabled = false);
        isChoosing = false;
        if (callback) callback();
      }
    };
    overlay.addEventListener('click', closePopup);
    setTimeout(closePopup, 4000);
  }

  function handleChoice(index) {
    if (gameFinished || isChoosing) return;
    const selected = currentState.options[index];
    if (!selected) return;
    affection += selected.eff; affection = Math.min(100, Math.max(0, affection)); updateStage();
    showPopup(selected.fb, () => {
      turn++;
      if (turn >= 11 + Math.floor(Math.random() * 4) || turn > 14) { triggerEnding(); return; }
      if (checkEarlyEnding()) return;
      currentState = generateTurn(); renderGame();
    });
  }

  function checkEarlyEnding() {
    if (affection >= 92 && turn >= 8) { triggerEnding("双向奔赴","毕业典礼后的傍晚，李羲承在天台上为你弹了一首写了三年的歌。歌名是你的名字。"); return true; }
    if (affection <= 6 && turn >= 7) { triggerEnding("平行线","直到毕业，你们的交集也寥寥无几。"); return true; }
    return false;
  }

  function triggerEnding(forceTitle, forceDesc) {
    if (gameFinished) return; gameFinished = true;
    let et, ed;
    if (forceTitle) { et=forceTitle; ed=forceDesc; }
    else if (affection>=85){ et="夏天的告白"; ed="毕业那天，李羲承在樱花树下叫住了你。他从琴盒里拿出一张CD。他深吸一口气，终于说出了那句话。"; }
    else if (affection>=70){ et="朋友以上"; ed="你们考去了同一座城市的不同大学。他每个月都会坐地铁来看你，带着新写的demo。"; }
    else if (affection>=55){ et="未完成的乐章"; ed="高考后他给了你一个信封，里面是一首未完成的钢琴曲手稿。"; }
    else if (affection>=40){ et="擦肩而过"; ed="毕业那天，他看了你一眼，似乎想走过来。你后来翻到他的留言。"; }
    else if (affection>=25){ et="迟到的感谢"; ed="他只回了一行：谢谢，保重。"; }
    else if (affection>=15){ et="熟悉的陌生人"; ed="他发布了歌，你偷偷关注。再也没人知道你曾是他最早的听众。"; }
    else if (affection>=5){ et="空白的同学录"; ed="他的那一页是空白的。"; }
    else { et="独角戏"; ed="暗恋是你一个人的兵荒马乱。"; }
    document.getElementById("dynamicContent").innerHTML = `<div class="ending-screen"><h2>🍃 ${et}</h2><p style="margin:20px 0;line-height:1.7;">${ed}</p><button class="reset-btn" id="resetGameBtn">重新开始</button></div>`;
    document.getElementById("resetGameBtn").addEventListener("click",()=>location.reload());
    document.getElementById("chatBadge").style.display="none"; hasNewMessage=false;
  }

  function checkAutoMessages() {
    if (gameFinished) return;
    pendingAutoMessage=null; hasNewMessage=false;
    document.getElementById("chatBadge").style.display="none";
    if (turn===3 && affection>=30) { pendingAutoMessage="今天在琴房练了一首新曲子，忽然想到你上次说我弹的《River Flows in You》很好听。这首新曲子还没给别人听过，你想听听看吗？"; hasNewMessage=true; }
    else if (turn===5 && affection>=45) { pendingAutoMessage="最近写歌总是卡在第二段副歌。朋友说我是因为有心事。其实我就是想写一首能让某个特定的人听到的歌。你觉得写给谁比较好？"; hasNewMessage=true; }
    else if (turn>=11 && affection>=65) { pendingAutoMessage="有些话憋了很久了。从高一的琴房开始，到现在的天台，你一直是我最忠实的听众。我想认真问你：你愿意做我新歌的第一个听众吗——不只是这首歌，是以后所有的歌。"; hasNewMessage=true; }
    if (hasNewMessage) document.getElementById("chatBadge").style.display="flex";
  }

  // ============ 修复后的聊天系统 ============
  function openChat() {
    if (gameFinished) return;
    if (chatUsedThisTurn) { alert("这回合已经聊过了，下个回合再来吧。"); return; }
    chatUsedThisTurn = true;
    hasNewMessage = false;
    document.getElementById("chatBadge").style.display = "none";
    chatMessages = [];
    currentChatStep = 0;
    chatSequence = [];

    if (pendingAutoMessage) {
      chatMessages.push({ side: "left", text: pendingAutoMessage });
      const topic = getRandomChatTopic();
      chatSequence = [
        { side: "left", text: "（他似乎在等你的回复）" },
        { options: topic.options }
      ];
      pendingAutoMessage = null;
    } else {
      const topic = getRandomChatTopic();
      chatMessages.push({ side: "right", text: topic.trigger });
      chatSequence = [
        { side: "left", text: topic.reply },
        { options: topic.options }
      ];
    }
    renderChatScreen();
  }

  function renderChatScreen() {
    const oldOverlay = document.getElementById('chatScreenOverlay');
    if (oldOverlay) oldOverlay.remove();

    const overlay = document.createElement('div');
    overlay.className = 'chat-screen-overlay';
    overlay.id = 'chatScreenOverlay';
    overlay.innerHTML = `
      <div class="chat-phone">
        <div class="chat-phone-header">
          <button class="back-btn" id="chatBackBtn">←</button>
          <span>💬 李羲承</span>
        </div>
        <div class="chat-messages" id="chatMsgArea"></div>
        <div class="chat-options" id="chatOptArea"></div>
      </div>`;
    document.body.appendChild(overlay);
    document.getElementById('chatBackBtn').addEventListener('click', closeChat);
    updateChatDisplay();
  }

  function updateChatDisplay() {
    const msgArea = document.getElementById('chatMsgArea');
    const optArea = document.getElementById('chatOptArea');
    if (!msgArea || !optArea) return;

    msgArea.innerHTML = chatMessages.map(m => `<div class="chat-bubble ${m.side}">${m.text}</div>`).join('');
    msgArea.scrollTop = msgArea.scrollHeight;

    if (chatSequence && currentChatStep < chatSequence.length) {
      const step = chatSequence[currentChatStep];
      if (step.options) {
        optArea.innerHTML = step.options.map((opt, i) => 
          `<div class="chat-option-btn" onclick="window._handleChatOption(${i})">${opt.txt}</div>`
        ).join('');
      } else if (step.side) {
        optArea.innerHTML = '';
        setTimeout(() => {
          chatMessages.push(step);
          currentChatStep++;
          updateChatDisplay();
        }, 800);
      }
    } else {
      optArea.innerHTML = '<div style="color:#b35477;font-size:0.8rem;text-align:center;width:100%;">聊天结束</div>';
      setTimeout(closeChat, 2500);
    }
  }

  // 挂到window上以便onclick调用
  window._handleChatOption = function(idx) {
    const step = chatSequence[currentChatStep];
    if (!step || !step.options || idx >= step.options.length) return;
    const chosen = step.options[idx];
    chatMessages.push({ side: "right", text: chosen.txt });
    if (chosen.eff) { affection += chosen.eff; affection = Math.min(100, Math.max(0, affection)); updateStage(); }
    currentChatStep++;
    chatMessages.push({ side: "left", text: chosen.reply });
    updateChatDisplay();
  };

  function closeChat() {
    const overlay = document.getElementById('chatScreenOverlay');
    if (overlay) overlay.remove();
    chatSequence = null;
    renderGame();
  }

  function saveGame() {
    if (gameFinished) return;
    localStorage.setItem("crushFinalSave",JSON.stringify({player,affection,stage,turn,usedEventIds,usedChatIds,currentState,gameFinished,pendingAutoMessage,hasNewMessage,chatUsedThisTurn}));
    alert("存档成功");
  }
  function loadGame() {
    const raw=localStorage.getItem("crushFinalSave"); if (!raw) { alert("没有存档"); return; }
    const data=JSON.parse(raw);
    player=data.player; affection=data.affection; stage=data.stage; turn=data.turn;
    usedEventIds=data.usedEventIds; usedChatIds=data.usedChatIds||[]; currentState=data.currentState; gameFinished=data.gameFinished;
    pendingAutoMessage=data.pendingAutoMessage||null; hasNewMessage=data.hasNewMessage||false; chatUsedThisTurn=data.chatUsedThisTurn||false;
    updateStage();
    if (!gameFinished) { renderGame(); if (hasNewMessage) document.getElementById("chatBadge").style.display="flex"; }
  }

  function showCreation() {
    const overlay=document.createElement('div'); overlay.className='overlay';
    overlay.innerHTML=`<div class="create-card"><h2>🍃 暗恋这件小事</h2><p style="text-align:center;color:#b35d7c;margin-bottom:16px;">填写你的信息</p>
      <div class="input-row"><label>🌸 姓名</label><input id="pName" placeholder="例如：小夏"></div>
      <div class="input-row"><label>🎂 年龄</label><input id="pAge" placeholder="例如：17"></div>
      <div class="input-row"><label>📚 班级</label><input id="pClass" placeholder="例如：高二3班"></div>
      <div class="input-row"><label>✨ 身份</label><input id="pIdentity" placeholder="例如：普通学生"></div>
      <div class="input-row"><label>🎨 外貌</label><input id="pAppearance" placeholder="例如：清秀干净"></div>
      <div class="input-row"><label>💭 性格</label><input id="pPersonality" placeholder="例如：温柔细腻"></div>
      <div class="input-row"><label>🎧 爱好</label><input id="pHobby" placeholder="例如：听歌/阅读"></div>
      <div class="input-row"><label>💞 初始关系</label><select id="pRelation"><option>完全陌生</option><option>同班同学</option><option>前后桌</option><option>社团成员</option><option>邻班</option></select></div>
      <button class="start-main-btn" id="confirmStart">开始</button></div>`;
    document.body.appendChild(overlay);
    document.getElementById('confirmStart').addEventListener('click',()=>{
      player.name=document.getElementById('pName').value||"小夏"; player.age=document.getElementById('pAge').value||"17";
      player.classInfo=document.getElementById('pClass').value||"高二3班"; player.identity=document.getElementById('pIdentity').value||"普通学生";
      player.appearance=document.getElementById('pAppearance').value||"清澈"; player.personality=document.getElementById('pPersonality').value||"细腻";
      player.hobby=document.getElementById('pHobby').value||"听歌";
      const rel=document.getElementById('pRelation').value; let bonus=0;
      if (rel==="同班同学") bonus=6; else if (rel==="前后桌") bonus=9; else if (rel==="社团成员") bonus=7; else if (rel==="邻班") bonus=3;
      affection=18+bonus; updateStage(); turn=1; gameFinished=false; usedEventIds=[]; usedChatIds=[];
      pendingAutoMessage=null; hasNewMessage=false; chatUsedThisTurn=false;
      currentState=generateTurn(); renderGame(); overlay.remove();
    });
  }

  function clock() { document.getElementById("liveClock").innerText=`🌸 ${new Date().toLocaleTimeString('zh-CN',{hour12:false})}`; }
  setInterval(clock,1000); clock();

  window.onload=()=>{
    showCreation();
    document.getElementById('saveGameBtn').addEventListener('click',saveGame);
    document.getElementById('loadGameBtn').addEventListener('click',loadGame);
    document.getElementById('chatPhoneBtn').addEventListener('click',openChat);
  };
})();
</script>
</body>
</html>
