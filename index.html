<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>暗恋这件小事</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Noto Sans SC', 'Poppins', system-ui, sans-serif;
    }
    body {
      background: linear-gradient(145deg, #f3e8ed 0%, #f9f0f4 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .game-container {
      max-width: 620px;
      width: 100%;
      background: #fffcfd;
      border-radius: 48px;
      box-shadow: 0 20px 35px rgba(130, 90, 110, 0.15);
      overflow: hidden;
      border: 1px solid #f0c4d5;
      position: relative;
    }
    .top-bar {
      background: #fbc8da;
      padding: 12px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      color: #9e4468;
      font-weight: bold;
      position: relative;
    }
    .clock {
      background: #fff0f5;
      padding: 5px 14px;
      border-radius: 40px;
      font-size: 0.8rem;
    }
    .save-btns {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .save-btns button {
      background: #ffffffd0;
      border: none;
      padding: 5px 12px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 0.7rem;
      color: #b04e70;
      cursor: pointer;
    }
    .phone-icon {
      background: #ffffffd0;
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 4px;
      position: relative;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      transition: 0.15s;
    }
    .phone-icon:active {
      transform: scale(0.92);
    }
    .phone-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: #ff5e8a;
      color: white;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 0.65rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
    .content-panel {
      padding: 20px 22px 18px;
    }
    .round-header {
      background: #fff0f5;
      border-radius: 28px;
      padding: 10px 18px;
      border-left: 6px solid #f09db9;
      font-weight: 700;
      color: #a55272;
      font-size: 0.85rem;
      margin-bottom: 18px;
    }
    .story-box {
      background: #fef5f8;
      border-radius: 32px;
      padding: 24px;
      line-height: 1.8;
      color: #3a2f34;
      box-shadow: 0 3px 10px #f7d2e0;
      white-space: pre-wrap;
      margin-bottom: 14px;
      font-size: 0.95rem;
      min-height: 180px;
    }
    .relation-box {
      background: #ffeaf2;
      border-radius: 32px;
      padding: 10px 16px;
      font-weight: 600;
      color: #b86082;
      text-align: center;
      margin-bottom: 18px;
    }
    .choices {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 8px;
    }
    .choice-btn {
      background: #fff2f7;
      border: 1.5px solid #f6b7ce;
      padding: 12px 18px;
      border-radius: 60px;
      font-weight: 700;
      color: #b35477;
      cursor: pointer;
      font-size: 0.85rem;
      transition: 0.1s;
      text-align: center;
      flex: 1 0 auto;
      max-width: 260px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.03);
    }
    .choice-btn:active {
      background: #fcd6e4;
      transform: scale(0.97);
    }
    .choice-btn:disabled {
      opacity: 0.6;
      pointer-events: none;
    }
    .chat-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      backdrop-filter: blur(2px);
    }
    .chat-popup {
      background: #fff7fa;
      border-radius: 36px;
      padding: 22px 24px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 15px 30px rgba(180, 90, 120, 0.25);
      border: 1px solid #f5a5c0;
      font-size: 1rem;
      line-height: 1.6;
      animation: fadeIn 0.25s ease;
    }
    .chat-screen-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      backdrop-filter: blur(3px);
    }
    .chat-phone {
      background: #fffbfd;
      border-radius: 40px;
      max-width: 420px;
      width: 95%;
      height: 620px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 50px rgba(100, 60, 80, 0.3);
      overflow: hidden;
      border: 2px solid #f0c4d5;
    }
    .chat-phone-header {
      background: #fbc8da;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #9e4468;
      font-weight: bold;
    }
    .chat-phone-header .back-btn {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: #9e4468;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fff5f8;
    }
    .chat-bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      line-height: 1.5;
      word-break: break-word;
      animation: fadeIn 0.2s ease;
    }
    .chat-bubble.left {
      background: #fff0f5;
      align-self: flex-start;
      border-bottom-left-radius: 6px;
      color: #4a2f38;
    }
    .chat-bubble.right {
      background: #fbc8da;
      align-self: flex-end;
      border-bottom-right-radius: 6px;
      color: #3a2028;
    }
    .chat-options {
      padding: 12px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      border-top: 1px solid #f5d0e0;
      background: #fffafc;
    }
    .chat-option-btn {
      background: #fff2f7;
      border: 1px solid #f6b7ce;
      padding: 8px 14px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.8rem;
      color: #b35477;
      cursor: pointer;
      flex: 1 0 auto;
      text-align: center;
    }
    .chat-option-btn:active {
      background: #fcd6e4;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .ending-screen {
      text-align: center;
      padding: 28px 20px;
      background: #fff4f8;
      border-radius: 42px;
    }
    .reset-btn {
      background: #f7a2be;
      border: none;
      margin-top: 20px;
      padding: 10px 28px;
      border-radius: 60px;
      font-weight: bold;
      color: white;
      cursor: pointer;
    }
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fceff4fb;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }
    .create-card {
      background: #fffafd;
      max-width: 480px;
      width: 100%;
      border-radius: 56px;
      padding: 28px;
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.08);
    }
    .create-card h2 {
      color: #b75a7c;
      text-align: center;
    }
    .input-row {
      margin-bottom: 14px;
    }
    .input-row label {
      font-weight: 700;
      color: #a04568;
      font-size: 0.8rem;
      display: block;
      margin-bottom: 4px;
    }
    .input-row input,
    .input-row select {
      width: 100%;
      padding: 10px 14px;
      border-radius: 40px;
      border: 1px solid #f2b7cc;
      background: #fff5f9;
      font-size: 0.9rem;
    }
    .start-main-btn {
      background: #fdafc7;
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      font-weight: bold;
      color: white;
      margin-top: 20px;
      cursor: pointer;
      font-size: 1rem;
    }
  </style>
</head>
<body>
<div class="game-container" id="gameRoot">
  <div class="top-bar">
    <div class="clock" id="liveClock">🌸 --:--:--</div>
    <div class="save-btns">
      <button id="saveGameBtn">💾</button>
      <button id="loadGameBtn">📂</button>
      <button class="phone-icon" id="chatPhoneBtn" title="消息">💬<span class="phone-badge" id="chatBadge" style="display:none;">!</span></button>
    </div>
  </div>
  <div class="content-panel" id="dynamicContent"></div>
</div>
<script>
(function() {
  // ==================== 核心状态 ====================
  let player = { name:"", age:"", classInfo:"", identity:"", appearance:"", personality:"", hobby:"" };
  let affection = 20;
  let stage = "陌生";
  let turn = 1;
  const MAX_TURNS = 13;
  let gameFinished = false;
  let usedEventIds = [];
  let usedChatIds = [];        // 记录已经用过的聊天ID
  let currentEventObj = null;
  let currentOptions = [];
  let isChoosing = false;
  let chatUsedThisTurn = false;
  let hasNewMessage = false;
  let chatMessages = [];
  let currentChatStep = 0;
  let chatSequence = null;
  let pendingAutoMessage = null;

  function updateStage() {
    if (affection >= 82) stage = "暧昧期";
    else if (affection >= 68) stage = "心动";
    else if (affection >= 55) stage = "好朋友";
    else if (affection >= 42) stage = "熟悉";
    else if (affection >= 28) stage = "认识";
    else if (affection >= 15) stage = "知道对方";
    else stage = "陌生";
  }

  // ==================== 50个事件池 ====================
  const EVENT_POOL = [];
  const rawEvents = [
    { id:1, title:"清晨的琴房", desc:"早上七点十分，整栋教学楼还笼罩在淡淡的晨曦里。你因为要补交作业提前到校，经过三楼音乐教室时，忽然听到一阵清澈的钢琴声。门虚掩着，你透过缝隙看到李羲承坐在那架老旧的黑色钢琴前，修长的手指在琴键上流淌出《River Flows in You》的旋律。晨光从窗户斜斜地打在他的侧脸上，他微微闭着眼睛，仿佛完全沉浸在自己的世界里。空气中飘着淡淡的灰尘和音符，你不由自主地停下了脚步，连呼吸都放轻了。", opts:[
      {txt:"悄悄站在门口听完，不忍心打扰", eff:3, fb:"他弹完最后一个音，缓缓睁开眼睛，转头时恰好对上了你的视线。他微微一愣，然后露出一个有些腼腆的笑容，手指从琴键上轻轻抬起。“早啊，”他说，“这么早就来了？”"},
      {txt:"推门走进去，鼓掌说“真好听，是你自己编的吗”", eff:5, fb:"他被突然的掌声吓了一跳，耳朵尖微微泛红。他不好意思地挠了挠后脑勺，小声说：“只是随便弹弹……不过后半段是我自己加的。”你看到他眼睛里有光，那是一种被认可后的喜悦。"},
      {txt:"怕被发现，屏住呼吸悄悄转身离开", eff:0, fb:"你小心翼翼地后退，生怕发出一点声响。走下楼梯时，琴声似乎停顿了几秒，但很快又继续响起。你后来经常后悔，如果当时走进去，会不会一切都不一样。"},
      {txt:"拿出手机想录下来，但忘了关闪光灯", eff:-2, fb:"咔嚓一声，闪光灯在昏暗的走廊里格外刺眼。琴声戛然而止，他转过头，眉头微微皱起，语气有些冷淡：“请删掉，我不喜欢被偷拍。”你窘得满脸通红，连道歉都说不利索。"}
    ]},
    { id:2, title:"食堂的泡菜锅", desc:"中午十二点，食堂里人声鼎沸，各种饭菜的味道混在一起。你端着餐盘在人群中穿梭，几乎所有的座位都坐满了人。正当你不知所措时，看到角落靠窗的位置上，李羲承独自一人坐在那里，面前放着一份泡菜锅和一碗米饭。他抬头时正好与你四目相对，便自然地朝你招了招手：“这儿有空位，过来坐吧。”他说话的声音不大，但周围几个女生同时投来了羡慕的目光。", opts:[
      {txt:"开心地坐过去，自然地聊起今天的菜色", eff:4, fb:"你坐下后，他把自己碗里仅有的几片牛肉轻轻夹到了你的盘子里。“你太瘦了，多吃点。”他说话时没有看你，只是低头扒饭，但耳朵又红了。"},
      {txt:"害羞地点点头，坐得离他远远的", eff:1, fb:"你坐在了他斜对角最远的位置，中间几乎可以再坐两个人。他看了你一眼，欲言又止，最终只是安静地吃着自己面前的泡菜锅。"},
      {txt:"道谢后，端着餐盘去了朋友那一桌", eff:0, fb:"你朝他笑了笑说“谢谢”，然后转身走向了朋友的桌子。坐下后你忍不住回头看了一眼，他正低着头，用筷子轻轻戳着碗里的豆腐，不知道在想什么。"},
      {txt:"摇头说“我在找人，不好意思”", eff:-1, fb:"他举在半空中的手顿了顿，然后慢慢放下。“哦，好。”他的声音很轻，重新低下头继续吃饭，但吃得比刚才慢了很多。你后来发现他那天其实是一个人吃完的。"}
    ]},
    { id:3, title:"暴雨中的共享伞", desc:"下午最后一节课快结束时，窗外突然下起了瓢泼大雨。雨点急促地敲打着玻璃窗，天空阴沉得像傍晚。你没带伞，站在教学楼一楼的走廊上，看着其他同学一个个被接走或撑伞离开。雨水溅湿了你的帆布鞋，风一吹，有点冷。这时身后传来脚步声，李羲承撑着一把深蓝色的长柄伞走了出来。他看了看你，又看了看外面的大雨，把伞往你这边递了递：“一起走吧，我正好去校门口坐公交。”他的肩膀已经沾了些雨珠。", opts:[
      {txt:"接过伞柄，尽量把伞往他那边倾斜", eff:5, fb:"你努力把伞举高，但身高差让你有些吃力。他发现后轻轻握住了伞柄的上方，把伞纠正过来，结果他自己的半边肩膀完全暴露在雨中，校服外套很快湿透了。你着急地说“你都淋湿了”，他却只是笑：“没事，我喜欢雨。”"},
      {txt:"低着头，一路沉默地走到校门口", eff:1, fb:"雨声很大，打在伞面上噼里啪啦。你们并肩走着，谁也没有开口。偶尔你的肩膀会碰到他湿漉漉的校服袖子。到校门口时，他把伞收了收，轻声说：“路上小心，别感冒了。”然后转身走进了雨里。"},
      {txt:"提议先去旁边的便利店等雨小一点", eff:4, fb:"你们小跑进便利店，他收了伞，抖了抖身上的水珠。他买了两罐热咖啡，把其中一罐贴了贴你的脸颊：“暖和一下。”你们就站在玻璃窗前，看着外面的雨，有一搭没一搭地聊着刚考完的月考。"},
      {txt:"后退一步说“不用了，我等我妈来接”", eff:-1, fb:"他拿着伞的手停在半空，然后慢慢收了回去。“嗯，那别站在风口。”他独自撑开伞，走进了大雨里。深蓝色的伞面很快消失在雨幕中。你后来等了很久，妈妈并没有来。"}
    ]},
    { id:4, title:"自习课的耳机", desc:"周三的自习课，教室里安静得只剩下翻书和写字的沙沙声。你正在和一道数学题奋战，忽然感觉后背被什么东西轻轻戳了一下。你回头，看到李羲承手里捏着一只白色的耳机，正朝你眨眼睛。他凑近一点，压低声音说：“我刚写好的一段旋律，帮我听听？”他的手机屏幕上显示着一个音频文件，文件名是“demo_03”。他的眼神里有种小心翼翼的期待，像怕被拒绝，又像忍不住想分享。", opts:[
      {txt:"接过耳机，和他一人一只，认真听完", eff:6, fb:"是一段很温柔的钢琴旋律，中间加入了一点哼唱。你甚至能听出他换气时的小心。听完后你在草稿纸上写：“这段副歌特别好听，像春天的风。”他看完后，把那张草稿纸小心地折起来，放进了自己的笔袋里。"},
      {txt:"紧张地摇头说“老师会发现的”", eff:0, fb:"你小声拒绝了，他点点头，收回了耳机。但你余光看到他一个人把耳机塞进耳朵，趴在桌上，用笔在本子上写写画画，不知道是在修改旋律还是在写别的。那节课你再也没法集中注意力。"},
      {txt:"听完后，在本子上认真写了一段反馈递给他", eff:4, fb:"你写了整整半页纸，从旋律到节奏，甚至建议他可以在某个地方加入大提琴。他看得很认真，嘴角慢慢扬起。然后他在你的本子上回了一句话：“这是我第一次给别人听demo，谢谢你的建议。”"},
      {txt:"不小心扯掉了耳机线，音乐外放了出来", eff:-2, fb:"一段钢琴曲突然在安静的教室里响起，前排的同学纷纷回头。纪律委员站起来巡视。他手忙脚乱地关掉手机，脸涨得通红。老师看了你们一眼，没说什么，但他那节课再也没抬过头。"}
    ]},
    { id:5, title:"体育课的篮球", desc:"周四下午的体育课，老师宣布自由活动。男生们一窝蜂涌向篮球场，女生们大多坐在树荫下聊天。你正和闺蜜说着话，突然一颗篮球蹦跳着滚到了你的脚边。你抬头，看到李羲承正朝你这边跑来，额头上还带着亮晶晶的汗珠。他今天穿了件白色的运动T恤，跑起来的时候头发被风吹起来，露出好看的额头。“不好意思——”他喊道。", opts:[
      {txt:"捡起球，用力扔给他，并喊道“投得不错嘛”", eff:4, fb:"他单手稳稳接住球，朝你笑了笑，露出一排整齐的牙齿。“要不要过来一起打？”他指了指球场，“我们少一个人。”旁边的男生开始起哄。你犹豫了一下，他已经在朝你招手了。"},
      {txt:"把球踢到一边，继续和闺蜜聊天", eff:-1, fb:"球滚到了更远的地方。他跑过来捡球时，脚步明显慢了一下，看了你一眼，然后抱着球默默跑回了球场。闺蜜戳了戳你：“他刚才是不是想叫你？”你装作若无其事，但心里有点后悔。"},
      {txt:"抱着球跑过去，说“加我一个”", eff:5, fb:"他明显有些意外，但很快笑了起来，把球传给你。你们临时组了队，他防守时故意放水让你投进了好几个。每次你进球，他都比你还开心，甚至和你击掌庆祝。那节体育课是你高中最快乐的记忆之一。"},
      {txt:"站在原地没动，等他过来自己拿", eff:1, fb:"他小跑到你面前，微微喘着气，弯腰捡起球。“谢了。”他简短地说了一句，然后跑回去。你注意到他转身时，似乎想说什么，但被队友的呼喊打断了。"}
    ]},
    { id:6, title:"月考后的安慰", desc:"月考成绩单贴在走廊的公告栏上，鲜红的排名像针一样扎眼。你数学考砸了，比上次退步了二十多名。你趴在课桌上，把脸埋进手臂里，周围同学的说笑声显得格外刺耳。有人轻轻敲了敲你的桌子。你抬起头，看到李羲承站在你旁边，手里拿着自己的成绩单。他看了一眼你的卷子，没有说任何安慰的空话，只是指了指自己的成绩：“我上次数学也考得很差，后来发现是方法不对。要不要我帮你看看错题？”他的声音很平静，没有任何居高临下的同情。", opts:[
      {txt:"抬起头，挤出一个笑容说“好，谢谢你”", eff:4, fb:"他拉过旁边空着的椅子，在你身边坐下。他一道一道地帮你分析错题，用笔在草稿纸上画图讲解，偶尔会问你“这里懂了吗”。他的字迹很工整，讲解也很有条理。那天放学后，他又给你发了一份自己整理的公式总结。"},
      {txt:"继续趴着，摇了摇头不理他", eff:-2, fb:"他站了一会儿，没有再说话。你听到他轻轻叹了口气，然后走开了。等你终于抬起头时，发现桌角多了一颗草莓糖，下面压着一张便签纸，上面写着：“下次会好的。——羲承”。"},
      {txt:"红着眼睛抱怨“数学真的太变态了”", eff:2, fb:"他听完后竟然笑了一下，说：“我也这么觉得。但你知道吗，我现在每天多花半小时做数学，上次就及格了。”他拿出自己的笔记本给你看，上面密密麻麻全是错题整理。他说：“我把这个借给你，看完肯定有用。”"},
      {txt:"逞强地坐直身体说“我没事，就是昨晚没睡好”", eff:1, fb:"他没有戳穿你的逞强，只是点了点头。“那……好好休息。”他走开后，你的手机亮了一下，是他发来的消息：“熬夜不好，下次考前一起复习吧，我帮你划重点。”"}
    ]},
    { id:7, title:"深夜的短信", desc:"晚上十点四十七分，你刚洗完澡准备睡觉，手机屏幕突然亮了起来。是李羲承发来的消息，头像还是那只白色的简笔画小猫。消息内容很短：“睡了吗？新写了一段副歌，卡住了，想问问你的感觉。”下面紧跟着一个音频文件，时长一分多钟。你点开，是一段有些忧郁的钢琴旋律，但结尾处似乎没有完成，悬在半空。", opts:[
      {txt:"秒回“快发来，我正好醒着”", eff:5, fb:"他很快发来了音频。你戴上耳机认真听了几遍，然后发了一段长长的语音，从旋律到情绪都分析了一遍。他听完后回了一句话：“你是我见过最懂我音乐的人。”然后他又补了一句：“晚安，明天见。”你抱着手机很久没睡着。"},
      {txt:"回复“太晚了，明天再帮你听”", eff:0, fb:"消息发出去后，他回复了一个“嗯”字，然后头像就灰了。第二天你看到他，他似乎想问你什么，但最终只是打了个招呼。你后来才知道，他那晚为了等你的意见，一直熬到了凌晨两点。"},
      {txt:"开玩笑说“可以啊，咨询费一次一杯奶茶”", eff:3, fb:"他回了一长串省略号，然后发来一个捂脸的表情。“成交。”他说，“明天午休，老地方，我请你喝香芋味的。”后来你真的在抽屉里发现了一杯温热的香芋奶茶。"},
      {txt:"太困了，看了一眼消息就睡着了", eff:-1, fb:"第二天早上你才看到消息，赶紧回复道歉。他回了一个“没关系”的表情包，但整个上午都没怎么说话。后来你从他朋友那里听说，他为了那首歌熬了一整夜，最后自己改了十几版。"}
    ]},
    { id:8, title:"音乐课的点名", desc:"音乐课在周三下午第一节。老师姓崔，是个爱开玩笑的中年男人。今天他让大家自愿上台唱歌作为平时成绩。几个活跃的同学唱了K-pop热曲后，崔老师忽然看向你：“上次你写的音乐鉴赏不错，今天上来唱一首？”你还没来得及拒绝，李羲承忽然举手：“老师，我可以帮她伴奏。”全班瞬间安静，然后爆发出一阵意味深长的起哄声。他拿着吉他，已经走到了钢琴旁边，正认真地调着弦，耳朵有点红。", opts:[
      {txt:"大方地走上台，选了一首慢板抒情曲", eff:4, fb:"你开口的时候声音有些抖，但李羲承的吉他声稳稳地托住了你。他偶尔抬头看你，用口型说“别紧张”。唱到最后一段，你们的声音和琴声完全融合在一起。崔老师带头鼓掌：“你们两个的声音很搭啊。”"},
      {txt:"紧张得声音发抖，几乎唱不下去", eff:1, fb:"你唱到一半差点忘词，声音越来越小。李羲承放慢了节奏，用吉他轻轻带着你。他在间奏时小声说：“没关系，跟着我。”你勉强唱完，下去后他把水递给你：“下次多练练就好了。”"},
      {txt:"灵机一动说“老师，我能请李羲承和我合唱吗”", eff:6, fb:"全班再次沸腾。他愣了一下，然后笑着点了点头。你们合唱了一首《Some》，副歌部分他甚至帮你和了高音。唱完后他小声对你说：“我第一次在课堂上唱歌，你是第一个敢拉我上台的人。”"},
      {txt:"摇头坚决不上台", eff:0, fb:"气氛有点尴尬。崔老师打圆场让你下节课再补。李羲承收起吉他，回到座位上时看了你一眼，眼神里有点遗憾。下课后他经过你身边，轻轻说：“其实你声音很好听，不唱可惜了。”"}
    ]},
    { id:9, title:"公交车上的座位", desc:"首尔的早高峰，公交车里挤得像沙丁鱼罐头。你抓着吊环，随着车子摇摇晃晃，书包勒得肩膀生疼。忽然感觉有人拍了拍你的肩膀。你转头，看到李羲承从他好不容易占到的座位上站起来，手里还拿着单词本。“你坐吧，”他说，“我快到了。”但他胸前的校牌显示他才刚上车不久。他侧身给你让出空间，旁边的乘客不满地皱了皱眉。", opts:[
      {txt:"感激地坐下，仰头问他“那你怎么办”", eff:3, fb:"他笑了笑，把单词本塞进口袋，抓住你旁边的扶手。“站着也能背单词，”他说，“而且我平衡感很好。”果然，车子转弯时他纹丝不动。他站了三站路才下车，下车前还朝你挥了挥手。"},
      {txt:"坚持不坐，按着他肩膀让他坐回去", eff:2, fb:"你力气不大，但他顺从地坐了回去。他有点无奈地看着你，然后从包里拿出一个便携小风扇递给你：“那这个给你，车里太闷了。”风扇吹出凉风，你看见他额头上其实也有细汗。"},
      {txt:"开玩笑说“我其实不重，可以坐你腿上吗”", eff:5, fb:"话一出口你就后悔了，脸红到了脖子根。他愣住了，然后从耳朵到脖子都染上了粉色。旁边的大婶投来惊讶的目光。他结结巴巴地说：“那、那还是你坐吧。”然后提前一站下了车。"},
      {txt:"直接坐下，戴上耳机没有道谢", eff:-1, fb:"你坐下后就开始看手机，没有注意到他站在你旁边一直拉着扶手。他几次想开口说什么，但看到你戴着耳机就放弃了。下车时他什么都没说，径直走了。"}
    ]},
    { id:10, title:"校园祭的舞台", desc:"校园祭是全校最热闹的日子。李羲承和他的乐队“晚风”是压轴表演嘉宾。夜幕降临时，操场上的舞台灯光亮起，他穿着一件简单的白衬衫和黑色长裤，抱着一把浅色的电吉他站在立式话筒前。台下挤满了人，很多女生举着写有他名字的灯牌。他调了调弦，凑近话筒轻声说：“最后一首歌，送给……送给这个夏天。”然后他弹出了第一个和弦，全场沸腾。", opts:[
      {txt:"挤到最前排，用力挥舞荧光棒", eff:4, fb:"演出时他一直在寻找什么，直到目光落在你身上。他对着你笑了一下，然后闭上眼睛沉浸在最后的solo里。演出结束后他跳下舞台，在人群的包围中朝你走来，把拨片塞进你手里：“给你。”"},
      {txt:"站在最后一排，安静地看完表演", eff:1, fb:"你离舞台很远，看不清他的表情，但能听到他的声音。演出结束后，你给他发了一条消息：“表演很棒。”他秒回：“你在现场？我没看到你。”你没有回复，只是把那张远距离的照片存进了手机。"},
      {txt:"演出结束后去后台找他，送上一小束花", eff:6, fb:"后台很乱，到处都是乐器和线缆。他正用毛巾擦汗，看到你拿着花进来，整个人愣住了。然后他快步走过来，接过花束，低头闻了闻。“这是我今天收到的最好的礼物。”他说，“谢谢你来看我。”"},
      {txt:"觉得人太多太吵，提前离场了", eff:-2, fb:"你不知道的是，他在唱最后一首歌之前，其实在台下搜寻了很久。后来他问朋友“她是不是没来”，朋友说好像看到你走了。他沉默了一会儿，把吉他收进琴盒，那天晚上没有参加庆功宴。"}
    ]},
    { id:11, title:"图书馆的偶遇", desc:"期中考试前，图书馆里一座难求。你抱着一摞参考书在书架间寻找空位，终于在靠窗的角落发现一个空桌子，但旁边坐着一个熟悉的身影。李羲承戴着黑色的头戴式耳机，面前摊着一本厚厚的英文原版书，正认真地写着什么。他完全没有注意到你，阳光透过百叶窗在他脸上投下细碎的光影。你犹豫了一下，不知道该不该坐过去。", opts:[
      {txt:"轻轻敲桌面问“这里有人吗”", eff:3, fb:"他摘下耳机，抬头看到是你，眼神亮了一下。“没人，”他一边说一边把自己摊开的书往旁边挪了挪，“坐吧。”然后他站起身，帮你从最高的书架上拿下了你够不着的那本参考书。"},
      {txt:"不想打扰他，绕到另一边的空位坐下", eff:0, fb:"你坐在了离他三张桌子远的地方。过了一会儿，他无意中抬头时发现了你。他微微一愣，然后低头继续看书。但后来你发现，他中间出去过一次，回来时在你的桌角放了一瓶香蕉牛奶。"},
      {txt:"把写有“你戴耳机看书的样子很帅”的纸条放在他手边", eff:5, fb:"你迅速放下纸条然后假装看书。余光瞥见他拿起纸条，展开，然后整个人僵住了。他慢慢转过头看你，嘴角一点点扬起。他在那张纸条的背面写了什么，推了过来：“你偷看我的样子也很可爱。”"},
      {txt:"抱着的书太多，不小心全砸在他脚边", eff:-1, fb:"巨大的声响打破了图书馆的安静。你窘得满脸通红，蹲下去捡书。他也蹲下来帮忙，手指不经意间碰到了你的手背。“没关系，”他小声说，“我以前也常掉东西。”管理员警告地看了你们一眼。"}
    ]},
    { id:12, title:"他的生日", desc:"十月十五日，李羲承的生日。你提前一周就开始准备礼物，最后决定送他一盒自己烤的曲奇，虽然卖相一般，但你在每一块上都用糖霜画了一个小小的音符。早上到了学校，你抱着那个精心包装的纸盒，在走廊里来来回回走了好几趟，就是没有勇气走进教室。他正坐在座位上，被几个送礼物的人围着。", opts:[
      {txt:"趁他不在时，把盒子放进他抽屉", eff:4, fb:"午休他回来时，发现了那个盒子。他小心翼翼地拆开包装，看到里面的音符曲奇，愣了很久。然后他四处张望，最后在走廊上找到了你。“这是你做的？”他举起一块曲奇，“我不舍得吃了。”"},
      {txt:"深吸一口气，走到他面前递给他", eff:6, fb:"他正在拆别的礼物，看到你过来，放下了手里的东西。“生日快乐，”你说，声音有点抖。他接过盒子，当着你的面打开，眼睛瞬间亮了。“这是你自己做的？天哪。”他立刻拿起一块放进嘴里，含含糊糊地说，“好吃。”"},
      {txt:"托朋友转交，不敢自己去", eff:1, fb:"朋友回来告诉你：“他收到后问我‘这是谁给的’，我说是你，他笑了一下，然后又问‘她为什么自己不来’。”你听完后后悔不已，但已经不好意思再去解释了。"},
      {txt:"因为饼干烤糊了一部分，最后没送出去", eff:-1, fb:"你把那盒烤焦的曲奇塞进了书包最深处，想着放学后扔了。但那天下午，他经过你座位时突然问：“今天是我生日，你不打算表示一下吗？”你支支吾吾说不出话，他有点失望地走开了。"}
    ]},
    { id:13, title:"补习班的同路", desc:"你在学校附近的英语补习班上课，晚上九点才下课。首尔初秋的夜晚已经有些凉意。你背着沉重的书包走出补习班大楼，在路灯下看到一个熟悉的身影靠在墙边。李羲承穿着连帽卫衣，耳朵里塞着耳机。他看到你出来，摘下耳机：“我数学补习班也在附近，刚下课。”但他手指尖有点凉，似乎等了有一会儿了。", opts:[
      {txt:"开心地走过去说“那以后可以一起走了”", eff:4, fb:"他点点头，把耳机分了你一只。“今天老师拖堂，我多等了十分钟。”他漫不经心地说，但暴露了他其实是特意在等你。路上他哼了一段新旋律，说是刚才等的时候想到的。"},
      {txt:"点点头，然后沉默地并肩走", eff:0, fb:"你们安静地走过两条街，偶尔肩膀会碰到一起。他先开口打破了沉默：“你英语学得怎么样？”然后你们聊了一些无关紧要的学习话题，直到在地铁站分开。"},
      {txt:"问他“你经常来这边吗？以前没碰见过”", eff:3, fb:"他摸了摸后颈，有点不自然地说：“嗯……其实我上周看到你来上课，这周就特意算好了时间。”说完他立刻加快了脚步，走到你前面，不让你看他脸上的表情。"},
      {txt:"说“哦”，然后戴上耳机自己走", eff:-2, fb:"你沉浸在自己的音乐里，没注意他放慢了脚步。他跟在后面走了一段路，后来拐进了另一条巷子。第二天他发消息说：“昨晚路上不太安全，本来想送你回家的。”"}
    ]},
    { id:14, title:"窗边的座位", desc:"新学期换座位，你被分到了靠窗的位置。坐下后你发现，斜前方坐着的是李羲承。他坐在你左前方两个位置，靠窗，阳光正好打在他的桌面上。他上课时偶尔会托着腮看向窗外，春天外面有一棵樱花树，花瓣偶尔会飘进来，落在他的肩上。他有个习惯，思考问题时会用手指轻轻敲桌面，像在打节拍。", opts:[
      {txt:"用铅笔在课本空白处画下他的侧影", eff:4, fb:"你画得很认真，连他耳后的碎发和校服领口的弧度都画了下来。下课时他路过你座位，无意中瞥见了那幅画。“这是我？”他弯下腰仔细看，“画得真好……能送给我吗？”"},
      {txt:"趁他不注意，偷偷用手机拍了一张", eff:1, fb:"你忘了关闪光灯。白光一闪，周围几个同学都看了过来。他转过头，看到你举着手机，先是一愣，然后嘴角微微扬起。“要拍就光明正大地拍嘛，”他说，“需要我摆个姿势吗？”"},
      {txt:"写了一张纸条问“你上课在想什么”传给他", eff:5, fb:"纸条传到他手里时，他展开看了一眼，然后提笔写了好一会儿。纸条传回来时，上面多了一段五线谱，旁边写着：“在想这段副歌。你觉得怎么样？”你在下面画了一个笑脸和一颗星星。"},
      {txt:"专心听课，不看他", eff:0, fb:"你努力把注意力集中在黑板上，但余光总是不自觉地往左前方飘。你不知道的是，他偶尔也会趁老师写板书时，微微侧头，用余光看你。"}
    ]},
    { id:15, title:"运动会接力", desc:"五月运动会，天气已经开始热了。班级接力赛是压轴项目，李羲承被安排在最后一棒。他站在起跑线上，穿着印有班级号码的运动背心，露出线条匀称的手臂，正做着简单的热身。你站在跑道内侧的加油区，手里紧紧攥着一瓶水。发令枪响，各班选手飞奔而出。到第四棒时你们班落后第二名大概十米。他接过棒，像离弦的箭一样冲了出去。经过你身边时，他似乎看了你一眼。", opts:[

  function getRandomChatTopic() {
    const available = CHAT_TOPICS.filter(c => !usedChatIds.includes(c.id));
    if (available.length === 0) { usedChatIds = []; return CHAT_TOPICS[Math.floor(Math.random()*CHAT_TOPICS.length)]; }
    const topic = available[Math.floor(Math.random()*available.length)];
    usedChatIds.push(topic.id);
    return JSON.parse(JSON.stringify(topic));
  }

  function getRandomEvent() {
    if (usedEventIds.length >= EVENT_POOL.length) usedEventIds = [];
    const available = EVENT_POOL.filter(e => !usedEventIds.includes(e.id));
    const evt = available[Math.floor(Math.random() * available.length)];
    usedEventIds.push(evt.id);
    return JSON.parse(JSON.stringify(evt));
  }

  function generateTurn() {
    if (gameFinished) return null;
    const base = getRandomEvent();
    currentEventObj = base;
    currentOptions = base.opts;
    return {
      header: `📖 第 ${turn} 回合 · ${base.title}`,
      story: base.desc,
      relation: `💗 关系：${stage} · 心意值 ${Math.floor(affection)}`,
      options: currentOptions
    };
  }

  let currentState = null;

  function renderGame() {
    if (gameFinished) return;
    if (!currentState) currentState = generateTurn();
    const container = document.getElementById("dynamicContent");
    let optHtml = "";
    currentState.options.forEach((opt, idx) => {
      optHtml += `<div class="choice-btn" data-opt="${idx}">${opt.txt}</div>`;
    });
    container.innerHTML = `
      <div class="round-header">${currentState.header}</div>
      <div class="story-box">${currentState.story}</div>
      <div class="relation-box">${currentState.relation}</div>
      <div class="choices" id="actionList">${optHtml}</div>
    `;
    document.querySelectorAll('.choice-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        if (isChoosing) return;
        const idx = parseInt(btn.dataset.opt);
        handleChoice(idx);
      });
    });
    isChoosing = false;
    chatUsedThisTurn = false;
    checkAutoMessages();
  }

  function showPopup(feedback, callback) {
    isChoosing = true;
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    const overlay = document.createElement('div');
    overlay.className = 'chat-overlay';
    overlay.innerHTML = `<div class="chat-popup"><strong>💬 李羲承：</strong>${feedback}</div>`;
    document.body.appendChild(overlay);
    let canClose = false;
    setTimeout(() => { canClose = true; }, 2500);
    overlay.addEventListener('click', () => {
      if (canClose) { overlay.remove(); document.querySelectorAll('.choice-btn').forEach(b => b.disabled = false); isChoosing = false; if (callback) callback(); }
    });
    setTimeout(() => {
      if (document.body.contains(overlay)) { overlay.remove(); document.querySelectorAll('.choice-btn').forEach(b => b.disabled = false); isChoosing = false; if (callback) callback(); }
    }, 4000);
  }

  function handleChoice(index) {
    if (gameFinished || isChoosing) return;
    const selected = currentState.options[index];
    if (!selected) return;
    affection += selected.eff;
    affection = Math.min(100, Math.max(0, affection));
    updateStage();
    showPopup(selected.fb, () => {
      turn++;
      if (turn >= 11 + Math.floor(Math.random() * 4) || turn > 14) { triggerEnding(); return; }
      if (checkEarlyEnding()) return;
      currentState = generateTurn();
      renderGame();
    });
  }

  function checkEarlyEnding() {
    if (affection >= 92 && turn >= 8) { triggerEnding("双向奔赴","毕业典礼后的傍晚，李羲承在天台上为你弹了一首写了三年的歌。歌名是你的名字。"); return true; }
    if (affection <= 6 && turn >= 7) { triggerEnding("平行线","直到毕业，你们的交集也寥寥无几。"); return true; }
    return false;
  }

  function triggerEnding(forceTitle, forceDesc) {
    if (gameFinished) return;
    gameFinished = true;
    let et, ed;
    if (forceTitle) { et=forceTitle; ed=forceDesc; }
    else if (affection>=85){ et="夏天的告白"; ed="毕业那天，李羲承在樱花树下叫住了你。"; }
    else if (affection>=70){ et="朋友以上"; ed="你们考去了同一座城市的不同大学。"; }
    else if (affection>=55){ et="未完成的乐章"; ed="高考后他给了你一个信封。"; }
    else if (affection>=40){ et="擦肩而过"; ed="因为几次误会，你们渐渐疏远。"; }
    else if (affection>=25){ et="迟到的感谢"; ed="他只回了一行：谢谢，保重。"; }
    else if (affection>=15){ et="熟悉的陌生人"; ed="他后来在音乐平台上发布了自己的歌。"; }
    else if (affection>=5){ et="空白的同学录"; ed="他的那一页是空白的。"; }
    else { et="独角戏"; ed="暗恋是你一个人的兵荒马乱。"; }
    document.getElementById("dynamicContent").innerHTML = `<div class="ending-screen"><h2>🍃 ${et}</h2><p>${ed}</p><button class="reset-btn" id="resetGameBtn">重新开始</button></div>`;
    document.getElementById("resetGameBtn").addEventListener("click",()=>location.reload());
    document.getElementById("chatBadge").style.display="none";
    hasNewMessage=false;
  }

  function checkAutoMessages() {
    if (gameFinished) return;
    pendingAutoMessage = null; hasNewMessage = false;
    document.getElementById("chatBadge").style.display = "none";
    if (turn === 3 && affection >= 30) {
      pendingAutoMessage = "今天在琴房练了一首新曲子，忽然想到你上次说我弹的《River Flows in You》很好听。这首新曲子还没给别人听过，你想听听看吗？";
      hasNewMessage = true;
    } else if (turn === 5 && affection >= 45) {
      pendingAutoMessage = "最近写歌总是卡在第二段副歌。朋友说我是因为有心事。其实我就是想写一首……能让某个特定的人听到的歌。你觉得写给谁比较好？";
      hasNewMessage = true;
    } else if (turn >= 11 && affection >= 65) {
      pendingAutoMessage = "有些话憋了很久了。从高一的琴房开始，到现在的天台，你一直是我最忠实的听众。我想认真问你一个问题：如果可以，你愿意做我新歌的第一个听众吗——不只是这首歌，是以后所有的歌。";
      hasNewMessage = true;
    }
    if (hasNewMessage) document.getElementById("chatBadge").style.display = "flex";
  }

  function openChat() {
    if (gameFinished) return;
    if (chatUsedThisTurn) { alert("这回合已经聊过了，下个回合再来吧。"); return; }
    chatUsedThisTurn = true;
    hasNewMessage = false;
    document.getElementById("chatBadge").style.display = "none";
    chatMessages = [];
    currentChatStep = 0;
    chatSequence = [];

    if (pendingAutoMessage) {
      chatMessages.push({side:"left", text:pendingAutoMessage});
      chatSequence = getAutoChatSequence();
      pendingAutoMessage = null;
    } else {
      const topic = getRandomChatTopic();
      chatMessages.push({side:"left", text:topic.trigger});
      chatSequence = [
        {side:"left", text:topic.reply},
        {options: topic.options}
      ];
    }
    renderChatScreen();
  }

  function getAutoChatSequence() {
    const topic = getRandomChatTopic();
    return [
      {side:"left", text:"（他似乎在等你的回复）"},
      {options: topic.options}

  function renderChatScreen() {
    const overlay = document.createElement('div');
    overlay.className = 'chat-screen-overlay';
    overlay.id = 'chatScreenOverlay';
    overlay.innerHTML = `
      <div class="chat-phone">
        <div class="chat-phone-header"><button class="back-btn" id="chatBackBtn">←</button><span>💬 李羲承</span></div>

    document.body.appendChild(overlay);

    updateChatDisplay();

  function updateChatDisplay() {
    const msgArea = document.getElementById('chatMsgArea');
    const optArea = document.getElementById('chatOptArea');
    if (!msgArea || !optArea) return;
    msgArea.innerHTML = chatMessages.map(m => `<div class="chat-bubble ${m.side}">${m.text}</div>`).join('');
    msgArea.scrollTop = msgArea.scrollHeight;
    if (chatSequence && currentChatStep < chatSequence.length) {
      const step = chatSequence[currentChatStep];
      if (step.options) {
        optArea.innerHTML = step.options.map((opt, i) => `<div class="chat-option-btn" data-chatidx="${i}">${opt.txt}</div>`).join('');
        document.querySelectorAll('.chat-option-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const idx = parseInt(btn.dataset.chatidx);
            handleChatOption(idx);
          });
        });
      } else if (step.side) {
        optArea.innerHTML = '';
        setTimeout(() => { chatMessages.push(step); currentChatStep++; updateChatDisplay(); }, 800);
      }
    } else {
      optArea.innerHTML = '<div style="color:#b35477;font-size:0.8rem;text-align:center;width:100%;">聊天结束</div>';
      setTimeout(closeChat, 2500);
    }
  }

  function handleChatOption(idx) {
    const step = chatSequence[currentChatStep];
    if (!step || !step.options) return;
    const chosen = step.options[idx];
    chatMessages.push({side:"right", text:chosen.txt});
    if (chosen.eff) { affection += chosen.eff; affection = Math.min(100, Math.max(0, affection)); updateStage(); }
    currentChatStep++;
    chatMessages.push({side:"left", text:chosen.reply});
    updateChatDisplay();
  }

  function closeChat() {
    const overlay = document.getElementById('chatScreenOverlay');
    if (overlay) overlay.remove();
    chatSequence = null;
    renderGame();
  }

  function saveGame() {
    if (gameFinished) return;
    const save = { player, affection, stage, turn, usedEventIds, usedChatIds, currentState, gameFinished, pendingAutoMessage, hasNewMessage, chatUsedThisTurn };
    localStorage.setItem("crushFinalSave", JSON.stringify(save));
    alert("存档成功");
  }
  function loadGame() {
    const raw = localStorage.getItem("crushFinalSave");
    if (!raw) { alert("没有存档"); return; }
    const data = JSON.parse(raw);
    player = data.player; affection = data.affection; stage = data.stage; turn = data.turn;
    usedEventIds = data.usedEventIds; usedChatIds = data.usedChatIds || [];
    currentState = data.currentState; gameFinished = data.gameFinished;
    pendingAutoMessage = data.pendingAutoMessage || null;
    hasNewMessage = data.hasNewMessage || false;
    chatUsedThisTurn = data.chatUsedThisTurn || false;
    updateStage();
    if (!gameFinished) { renderGame(); if (hasNewMessage) document.getElementById("chatBadge").style.display="flex"; }
  }

  function showCreation() {
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.innerHTML = `<div class="create-card"><h2>🍃 暗恋这件小事</h2><p style="text-align:center;color:#b35d7c;margin-bottom:16px;">填写你的信息</p>
      <div class="input-row"><label>🌸 姓名</label><input id="pName" placeholder="例如：小夏"></div>
      <div class="input-row"><label>🎂 年龄</label><input id="pAge" placeholder="例如：17"></div>
      <div class="input-row"><label>📚 班级</label><input id="pClass" placeholder="例如：高二3班"></div>
      <div class="input-row"><label>✨ 身份</label><input id="pIdentity" placeholder="例如：普通学生"></div>
      <div class="input-row"><label>🎨 外貌</label><input id="pAppearance" placeholder="例如：清秀干净"></div>
      <div class="input-row"><label>💭 性格</label><input id="pPersonality" placeholder="例如：温柔细腻"></div>
      <div class="input-row"><label>🎧 爱好</label><input id="pHobby" placeholder="例如：听歌/阅读"></div>
      <div class="input-row"><label>💞 初始关系</label><select id="pRelation"><option>完全陌生</option><option>同班同学</option><option>前后桌</option><option>社团成员</option><option>邻班</option></select></div>
      <button class="start-main-btn" id="confirmStart">开始</button></div>`;
    document.body.appendChild(overlay);
    document.getElementById('confirmStart').addEventListener('click', () => {
      player.name = document.getElementById('pName').value || "小夏";
      player.age = document.getElementById('pAge').value || "17";
      player.classInfo = document.getElementById('pClass').value || "高二3班";
      player.identity = document.getElementById('pIdentity').value || "普通学生";
      player.appearance = document.getElementById('pAppearance').value || "清澈";
      player.personality = document.getElementById('pPersonality').value || "细腻";
      player.hobby = document.getElementById('pHobby').value || "听歌";
      const rel = document.getElementById('pRelation').value;
      let bonus = 0;
      if (rel==="同班同学") bonus=6; else if (rel==="前后桌") bonus=9; else if (rel==="社团成员") bonus=7; else if (rel==="邻班") bonus=3;
      affection = 18 + bonus;
      updateStage(); turn=1; gameFinished=false; usedEventIds=[]; usedChatIds=[];
      pendingAutoMessage=null; hasNewMessage=false; chatUsedThisTurn=false;
      currentState = generateTurn(); renderGame(); overlay.remove();
    });
  }

  function clock() { document.getElementById("liveClock").innerText = `🌸 ${new Date().toLocaleTimeString('zh-CN', {hour12: false})}`; }
  setInterval(clock, 1000); clock();

  window.onload = () => {
    showCreation();
    document.getElementById('saveGameBtn').addEventListener('click', saveGame);
    document.getElementById('loadGameBtn').addEventListener('click', loadGame);
    document.getElementById('chatPhoneBtn').addEventListener('click', openChat);
  };
})();
</script>
</body>
</html>
